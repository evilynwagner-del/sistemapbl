function limparFiltrosLiq(){
  ['liq-fori','liq-fadv','liq-fliq'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='todos';});
  ['liq-fdi','liq-fdf','liq-fbusca'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var ag=document.getElementById('liq-fagrup');if(ag)ag.checked=false;
  navigate('reliquidados');
}

function importRelLiq(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var data=[];rows.forEach(function(r){var adv=normAdv(r['ADVOGADO']||r['Advogado']||'');var val=parseFloat(r['VALOR']||r['Valor']||0)||0;var liq=String(r['LIQUIDAÇÃO']||r['Liquidação']||r['LIQUIDACAO']||'').trim();var proc=String(r['PROCESSOS']||r['Processo']||'').trim();var datRaw=r['DATA']||r['Data']||'';var dat='';if(datRaw){try{var d=new Date(datRaw);if(!isNaN(d))dat=d.toISOString().slice(0,10);}catch(e){}}if(!adv||adv==='ADVOGADO')return;data.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total',data:dat});});relLiqImportData=data;var el=document.getElementById('rel-liq-status');if(el)el.textContent=data.length+' processos';showToast(data.length+' processos importados!');input.value='';});}
function renderRelLiq(){
  var tipo=document.getElementById('liq-tipo').value;
  var advFiltId=document.getElementById('liq-adv').value;
  var dtIni=document.getElementById('liq-di').value;
  var dtFim=document.getElementById('liq-df').value;
  var usandoImport=relLiqImportData&&relLiqImportData.length>0&&(tipo==='todos'||tipo==='Total'||tipo==='Parcial');
  var html='';
  if(usandoImport){
    var fi=relLiqImportData.filter(function(r){if(tipo!=='todos'&&r.tipo!==tipo)return false;if(advFiltId!=='todos'){var l=S.lawyers.find(function(x){return x.id===advFiltId;});if(l){var fn=normAdv(l.name).split(' ')[0];if(!r.adv.startsWith(fn))return false;}}if(dtIni&&r.data&&r.data<dtIni)return false;if(dtFim&&r.data&&r.data>dtFim)return false;return true;});
    if(fi.length){var tv=fi.reduce(function(s,r){return s+r.val;},0),tt=fi.filter(function(r){return r.tipo==='Total';}).reduce(function(s,r){return s+r.val;},0),tp=fi.filter(function(r){return r.tipo==='Parcial';}).reduce(function(s,r){return s+r.val;},0),qt=fi.filter(function(r){return r.tipo==='Total';}).length,qp=fi.filter(function(r){return r.tipo==='Parcial';}).length;
    var byA={};fi.forEach(function(r){if(!byA[r.adv])byA[r.adv]={nome:r.advNome,tot:0,par:0,qt:0,qp:0};if(r.tipo==='Total'){byA[r.adv].tot+=r.val;byA[r.adv].qt++;}else{byA[r.adv].par+=r.val;byA[r.adv].qp++;}});
    var ar=Object.keys(byA).sort().map(function(k){var a=byA[k];var t=a.tot+a.par;var pct=(tv?t/tv*100:0).toFixed(1);return'<tr><td>'+a.nome+'</td><td class="r">'+a.qt+'</td><td class="r">'+fmt(a.tot)+'</td><td class="r">'+a.qp+'</td><td class="r">'+fmt(a.par)+'</td><td class="r"><strong>'+fmt(t)+'</strong></td><td class="r">'+pct+'%</td></tr>';}).join('');
    var pr=fi.map(function(r){var sb=r.tipo==='Total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';return'<tr><td>'+r.advNome+'</td><td style="font-size:10px">'+r.proc+'</td><td>'+sb+'</td><td class="r">'+fmt(r.val)+'</td><td>'+fmtDate(r.data)+'</td></tr>';}).join('');
    html+='<div class="metrics" style="margin-bottom:16px"><div class="mc"><div class="ml">Total processos</div><div class="mv">'+fi.length+'</div></div><div class="mc gold"><div class="ml">Total liquidado</div><div class="mv gold">'+fmt(tv)+'</div></div><div class="mc"><div class="ml">Liq. Total ('+qt+')</div><div class="mv">'+fmt(tt)+'</div></div><div class="mc blue"><div class="ml">Liq. Parcial ('+qp+')</div><div class="mv blue">'+fmt(tp)+'</div></div></div>'+
    '<div class="st">Resumo por advogado</div><div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px"><table class="tbl"><thead><tr><th>Advogado</th><th class="r">Qt Total</th><th class="r">Vl Total</th><th class="r">Qt Parcial</th><th class="r">Vl Parcial</th><th class="r">Total</th><th class="r">%</th></tr></thead><tbody>'+ar+'</tbody><tfoot><tr class="foot"><td>TOTAL</td><td class="r">'+qt+'</td><td class="r">'+fmt(tt)+'</td><td class="r">'+qp+'</td><td class="r">'+fmt(tp)+'</td><td class="r">'+fmt(tv)+'</td><td class="r">100%</td></tr></tfoot></table></div>'+
    '<div class="st">Detalhe por processo</div><div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Advogado</th><th>N° Processo</th><th>Tipo</th><th class="r">Valor</th><th>Data</th></tr></thead><tbody>'+pr+'</tbody><tfoot><tr class="foot"><td colspan="3">TOTAL</td><td class="r">'+fmt(tv)+'</td><td></td></tr></tfoot></table></div>';}
    else{html+='<div class="empty">Nenhum registro com os filtros aplicados.</div>';}
  }
  if(!usandoImport||(tipo==='liquidado_total'||tipo==='liquidado_parcial')){
    var tcf=tipo==='liquidado_total'?'liquidado_total':tipo==='liquidado_parcial'?'liquidado_parcial':'';
    var fc=S.processos.filter(function(p){if(p.status==='pendente')return false;if(tcf&&p.status!==tcf)return false;if(advFiltId!=='todos'&&p.advogadoId!==advFiltId)return false;var recs=p.recebimentos||[];if(dtIni||dtFim){var ok=recs.some(function(r){if(!r.data)return false;if(dtIni&&r.data<dtIni)return false;if(dtFim&&r.data>dtFim)return false;return true;});if(!ok)return false;}return true;});
    if(fc.length){var tCo=fc.reduce(function(s,p){return s+(p.valorCompra||0);},0),tRe=fc.reduce(function(s,p){return s+((p.recebimentos||[]).reduce(function(sr,r){return sr+(r.valor||0);},0));},0),tFa=tRe-tCo,tCn=fc.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
    var cr=fc.map(function(p){var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;var rp=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);var fa=rp-(p.valorCompra||0);var de=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;var lr=(p.recebimentos||[]).slice(-1)[0];var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';return'<tr><td>'+esc(p.cliente)+'</td><td style="font-size:10px">'+esc(p.numero)+'</td><td>'+an+'</td><td>'+sb+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+fmt(rp)+'</td><td class="r" style="color:'+(fa>=0?'#1D6B3A':'#A32D2D')+'">'+fmt(fa)+'</td><td class="r">'+de+'%</td><td>'+(lr?fmtDate(lr.data):'—')+'</td><td>'+(lr?lr.banco:'—')+'</td></tr>';}).join('');
    html+=(usandoImport?'<div class="st" style="margin-top:24px">Processos do cadastro</div>':'')+
    '<div class="metrics" style="margin-bottom:16px;margin-top:8px"><div class="mc"><div class="ml">Processos</div><div class="mv">'+fc.length+'</div></div><div class="mc gold"><div class="ml">Total Recebido</div><div class="mv gold">'+fmt(tRe)+'</div></div><div class="mc"><div class="ml">Vl. Compra</div><div class="mv">'+fmt(tCo)+'</div></div><div class="mc blue"><div class="ml">Faturamento</div><div class="mv blue">'+fmt(tFa)+'</div></div></div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Tipo</th><th class="r">Vl. Condenação</th><th class="r">Vl. Compra</th><th class="r">Vl. Liquidado</th><th class="r">Faturamento</th><th class="r">Deságio %</th><th>Último Rec.</th><th>Banco</th></tr></thead><tbody>'+cr+'</tbody><tfoot><tr class="foot"><td colspan="4">TOTAL</td><td class="r">'+fmt(tCn)+'</td><td class="r">'+fmt(tCo)+'</td><td class="r">'+fmt(tRe)+'</td><td class="r">'+fmt(tFa)+'</td><td></td><td></td><td></td></tr></tfoot></table></div>';}
    else if(!usandoImport){html='<div class="empty">Nenhum processo encontrado com os filtros aplicados.</div>';}
  }
  if(!html)html='<div class="empty">Nenhum dado encontrado.</div>';
  document.getElementById('rel-liq-content').innerHTML=html;
}
function imprimirRelLiq(){renderRelLiq();setTimeout(function(){window.print();},300);}

function pagePrevisaoEntradas(){
  return'<div class="page-title">'+I.previsao+' Previsão de Entradas <button class="print-btn no-print" onclick="imprimirPrev()">Imprimir / PDF</button></div>'+
  '<div class="filter-bar no-print">'+
    '<div class="fg"><label>Advogado</label><select id="prev-adv"><option value="todos">Todos</option>'+S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('')+'</select></div>'+
    '<div class="fg"><label>Matéria</label><input type="text" id="prev-mat" placeholder="Ex: RPV, Precatório..."/></div>'+
    '<input class="search-input" id="prev-q" placeholder="Buscar cliente ou processo..."/>'+
    '<button class="btn bp" onclick="renderPrev()">Filtrar</button>'+
  '</div>'+
  '<div id="prev-content"><div class="empty">Clique em Filtrar para gerar a previsão.</div></div>';
}
function renderPrev(){
  var adv=document.getElementById('prev-adv').value;
  var mat=(document.getElementById('prev-mat').value||'').toLowerCase();
  var q=(document.getElementById('prev-q').value||'').toLowerCase();
  var f=S.processos.filter(function(p){return p.status==='pendente'&&(adv==='todos'||p.advogadoId===adv)&&(!mat||!(p.materia||'').toLowerCase().includes(mat)?false:true)&&(!q||(p.cliente||'').toLowerCase().includes(q)||(p.numero||'').toLowerCase().includes(q));});
  // fix mat filter
  f=S.processos.filter(function(p){
    if(p.status!=='pendente')return false;
    if(adv!=='todos'&&p.advogadoId!==adv)return false;
    if(mat&&!(p.materia||'').toLowerCase().includes(mat))return false;
    if(q&&!(p.cliente||'').toLowerCase().includes(q)&&!(p.numero||'').toLowerCase().includes(q))return false;
    return true;
  });
  var tP=f.reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var tC=f.reduce(function(s,p){return s+(p.valorCompra||0);},0);
  var tCn=f.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
  var tF=tP-tC;
  var rows=f.map(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var pg=(p.valorCliente||0)-(p.valorCompra||0);
    var de=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;
    var di=p.dataCompra?Math.floor((new Date()-new Date(p.dataCompra))/(864e5)):0;
    return'<tr><td>'+esc(p.cliente)+'</td><td style="font-size:10px">'+esc(p.numero)+'</td><td>'+an+'</td><td>'+esc(p.materia||'')+'</td><td>'+fmtDate(p.dataCompra)+'</td><td class="r">'+di+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCliente)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r" style="color:#1D6B3A">'+fmt(pg)+'</td><td class="r">'+de+'%</td></tr>';
  }).join('');
  var html=f.length?
    '<div class="metrics" style="margin-bottom:16px"><div class="mc blue"><div class="ml">Processos pendentes</div><div class="mv blue">'+f.length+'</div></div><div class="mc"><div class="ml">Vl. Condenação</div><div class="mv">'+fmt(tCn)+'</div></div><div class="mc gold"><div class="ml">Previsão de Entrada</div><div class="mv gold">'+fmt(tP)+'</div></div><div class="mc"><div class="ml">Prev. Faturamento</div><div class="mv">'+fmt(tF)+'</div></div></div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Matéria</th><th>Data Compra</th><th class="r">Dias</th><th class="r">Vl. Condenação</th><th class="r">Vl. Cliente</th><th class="r">Vl. Compra</th><th class="r">Prev. Ganho</th><th class="r">Deságio %</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr class="foot"><td colspan="6">TOTAL</td><td class="r">'+fmt(tCn)+'</td><td class="r">'+fmt(tP)+'</td><td class="r">'+fmt(tC)+'</td><td class="r">'+fmt(tF)+'</td><td></td></tr></tfoot></table></div>':
    '<div class="empty">Nenhum processo pendente encontrado.</div>';
  document.getElementById('prev-content').innerHTML=html;
}
function imprimirPrev(){renderPrev();setTimeout(function(){window.print();},300);}

function pageMinhaComissao(){
  if(!currentUser||!currentUser.lawyerId)return'<div class="empty">Sem dados.</div>';
  var lid=currentUser.lawyerId;
  var l=S.lawyers.find(function(x){return x.id===lid;});
  if(!l)return'<div class="card"><div class="empty">Perfil não configurado pelo administrador ainda.</div></div>';
  var c=calc(lid);var e=c.entry;

  // Deduplicar legado vs S.liqManual (mesmo nº de processo nas duas fontes)
  function normProc(s){return String(s||'').replace(/[^0-9]/g,'');}
  var procsManualSet={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var np=normProc(m.processo);
    if(np)procsManualSet[np]=true;
  });
  var legadoFiltrado=(e.processos||[]).filter(function(p){
    var np=normProc(p.numero||p.processo||p.proc||p.ref);
    return !np || !procsManualSet[np];
  });

  // Processos legado (do import — se houver) — só os que não estão em S.liqManual
  var procRowsLegado=legadoFiltrado.map(function(p){
    var isPar=p.tipo==='Parcial';
    var com=isPar?0:(p.valor<10000?50:100);
    var bd=isPar?'<span style="background:#fff3cd;color:#856404;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">PARCIAL</span>':'<span style="background:#d4edda;color:#155724;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">TOTAL</span>';
    return '<tr><td style="padding:4px 8px;font-size:11px;color:var(--mt)">'+
      (p.ref||'---')+'</td><td style="padding:4px 8px">—</td><td style="padding:4px 8px">'+bd+'</td><td style="padding:4px 8px;font-size:11px;text-align:right">'+fmt(p.valor)+'</td>'+
      '<td style="padding:4px 8px;font-size:11px;text-align:right;color:'+(isPar?'var(--mt)':'var(--v)')+';font-weight:600">'+(isPar?'—':'R$ '+com)+'</td></tr>';
  }).join('');

  // Lançamentos manuais agrupados por processo+titularidade
  var grpManual={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var key=(m.processo||'(sem nº)')+'|'+(m.titularidade||'');
    if(!grpManual[key])grpManual[key]={proc:m.processo||'(sem nº)',titularidade:m.titularidade,total:0,qtd:0,temTotal:false,ultData:''};
    grpManual[key].total+=(m.valor||0);
    grpManual[key].qtd++;
    if(m.liquidacao==='Total')grpManual[key].temTotal=true;
    if((m.data||'')>grpManual[key].ultData)grpManual[key].ultData=(m.data||'');
  });
  var procRowsManual=Object.keys(grpManual).map(function(k){
    var g=grpManual[k];
    var com=g.temTotal?(g.total<10000?50:100):0;
    var bdSt=g.temTotal?'<span style="background:#d4edda;color:#155724;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">100% LIQUIDADO</span>':'<span style="background:#fff3cd;color:#856404;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">EM ANDAMENTO ('+g.qtd+' parc.)</span>';
    var corCart=g.titularidade==='FIDC PBL'?'#185FA5':g.titularidade==='PBL Originadora'?'#B8860B':'#1D6B3A';
    var bdCart='<span style="background:'+corCart+';color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">'+esc(g.titularidade||'')+'</span>';
    return '<tr><td style="padding:4px 8px;font-size:11px;color:var(--mt)">'+esc(g.proc)+'</td><td style="padding:4px 8px">'+bdCart+'</td><td style="padding:4px 8px">'+bdSt+'</td><td style="padding:4px 8px;font-size:11px;text-align:right">'+fmt(g.total)+'</td>'+
      '<td style="padding:4px 8px;font-size:11px;text-align:right;color:'+(g.temTotal?'var(--v)':'var(--mt)')+';font-weight:600">'+(g.temTotal?'R$ '+com:'—')+'</td></tr>';
  }).join('');

  var totalLinhas=legadoFiltrado.length+Object.keys(grpManual).length;
  var procDetail=totalLinhas>0?
    '<div style="margin:4px 0 8px;border:1px solid var(--bd);border-radius:6px;overflow:hidden">'+
    '<table style="width:100%;border-collapse:collapse">'+
    '<thead><tr style="background:var(--vl)">'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Processo</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Origem</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Status</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:right;color:var(--v)">Valor</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:right;color:var(--v)">Comissão</th></tr></thead>'+
    '<tbody>'+procRowsLegado+procRowsManual+'</tbody></table>'+
    '<div style="padding:6px 8px;font-size:10px;color:var(--mt);background:var(--row-alt);border-top:1px solid var(--bd)">⚠️ A comissão por processo só é liberada quando o processo está <strong>100% liquidado</strong> (todas as parcelas recebidas). Lançamentos parciais somam apenas para o prêmio por volume.</div>'+
    '</div>':'';

  var totalLiq=c.volLiqTotalParcial||0;
  var labelLiq='Prêmio liquidação (Total+Parcial: '+fmt(totalLiq)+') — '+
    (totalLiq>=400000?'a partir de R$400k, +R$100 a cada R$100k':'meta R$400k para iniciar prêmio');
  var qtdProcTotal=(e.processos||[]).length+Object.keys(grpManual).length;
  var items=[
    {l:'Pró-labore fixo',v:c.lawyer.prolabore},
    {l:'Processos 100% liquidados ('+c.qtdProcTot+' de '+qtdProcTotal+') — R$50 abaixo de R$10k / R$100 acima',v:c.cP},
    {l:'Processos validados ('+c.qtdProcVal+')',v:c.cPV},
    {l:'Contratos validados ('+c.qtdContVal+')',v:c.cCV},
    {l:'Capa a capa ('+c.qtdCapa+')',v:c.cCapa},
    {l:'Auditoria ('+c.qtdAud+')',v:c.cAud},
    {l:'Bônus entradas',v:c.cEnt},
    {l:labelLiq,v:c.cLiq},
    {l:'Campanhas',v:c.cCamp}
  ];
  var m='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="mc"><div class="ml">Total a receber</div><div class="mv">'+fmt(c.total)+'</div></div><div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div><div class="mc gold"><div class="ml">Comissões</div><div class="mv gold">'+fmt(c.total-c.lawyer.prolabore)+'</div></div></div>';
  var rows=items.map(function(it,idx){return'<div style="display:flex;flex-direction:column;padding:8px 0;border-bottom:.5px solid var(--bd);font-size:13px"><div style="display:flex;justify-content:space-between"><div style="color:var(--mt)">'+it.l+'</div><div>'+fmt(it.v)+'</div></div>'+(idx===1?procDetail:'')+'</div>';}).join('');
  var per=document.getElementById('period-lbl')?document.getElementById('period-lbl').textContent:'';
  return'<div class="page-title">'+I.comissao+' Olá, '+esc(c.lawyer.name)+'</div>'+
    '<div style="font-size:12px;color:var(--mt);margin-bottom:16px">Período: '+per+'</div>'+m+
    '<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}

<script>

  var data=document.getElementById('lm-data').value;

function delLiqManual(id){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode excluir.");return;}
  if(!isFullAccess(currentUser)){alert('Apenas Admin pode excluir.');return;}
  if(!confirm('Excluir lançamento?'))return;

// Importa planilha .xlsx direto para S.liqManual (lançamentos manuais)
function importLiqXlsx(input){
  if(!isFullAccess(currentUser)){alert('Apenas Admin pode importar.');return;}
  if(!input.files||!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var added=0,skipped=0,advNoMatch=[];
    rows.forEach(function(r){
      // Lê colunas da planilha (várias variações de header)
      var titRaw=String(getCol(r,['TITULARIDADE','Titularidade','titularidade'])||'').trim().toUpperCase();
      var datRaw=getCol(r,['DATA','Data','data']);
      var proc=String(getCol(r,['PROCESSOS','Processos','PROCESSO','Processo','processo'])||'').trim();
      var advRaw=String(getCol(r,['ADVOGADO','Advogado','advogado'])||'').trim();
      var val=parseValor(getCol(r,['VALOR','Valor','valor'])||0)||0;
      var liqRaw=String(getCol(r,['LIQUIDAÇÃO','Liquidação','LIQUIDACAO','Liquidacao','liquidacao'])||'').trim().toUpperCase();

      // Pula linhas vazias / cabeçalho repetido
      if(!advRaw || advRaw==='ADVOGADO' || !val) {skipped++;return;}

      // Normaliza titularidade
      var tit='';
      if(titRaw.indexOf('FIDC')>=0) tit='FIDC PBL';
      else if(titRaw.indexOf('CERTJUD')>=0 || titRaw.indexOf('CERT JUD')>=0) tit='CERTJUD';
      else if(titRaw.indexOf('PBL')>=0) tit='PBL Originadora';
      else {skipped++;return;}

      // Converte data
      var dat='';
      if(datRaw){
        try{
          if(typeof datRaw==='number'){
            // Excel serial date
            var d=new Date(Math.round((datRaw-25569)*86400*1000));
            if(!isNaN(d))dat=d.toISOString().slice(0,10);
          } else {
            var d2=new Date(String(datRaw));
            if(!isNaN(d2))dat=d2.toISOString().slice(0,10);
          }
        }catch(e){}
      }
      if(!dat) dat=todayStr();

      // Casa advogado pelo primeiro nome (case-insensitive, sem acentos)
      var advKey=advRaw.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      var firstName=advKey.split(/\s+/)[0];
      var lawyer=S.lawyers.find(function(l){
        var n=(l.name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
        var fn=n.split(/\s+/)[0];
        return fn===firstName || n===advKey || n.indexOf(firstName)===0;
      });
      if(!lawyer){
        skipped++;
        if(advNoMatch.indexOf(advRaw)<0)advNoMatch.push(advRaw);
        return;
      }

      // Liquidação: Parcial ou Total (default Total)
      var liq=liqRaw.indexOf('PARCIAL')>=0 ? 'Parcial' : 'Total';

      S.liqManual.push({
        id:uid(),
        titularidade:tit,
        data:dat,
        processo:proc,
        advogadoId:lawyer.id,
        valor:val,
        liquidacao:liq,
        criadoPor:currentUser.id,
        importado:true
      });
      added++;
    });
    saveData();
    var el=document.getElementById('imp-liq-status');
    if(el)el.textContent=added+' importados';
    var msg=added+' lançamentos importados.';
    if(skipped>0)msg+='\n'+skipped+' linhas puladas.';
    if(advNoMatch.length)msg+='\nAdvogados não encontrados: '+advNoMatch.slice(0,8).join(', ')+(advNoMatch.length>8?'...':'');
    alert(msg);
    input.value='';
    navigate('reliquidados');
  });
}

var TIPOS_DISTRIB=[
  {id:'proc_val',label:'Processo',val:5,grupo:'processo',desc:'Validação de processo'},
  {id:'cont_val',label:'Contrato',val:2,grupo:'processo',desc:'Validação de contrato'},
  {id:'capa',label:'Capa a Capa',val:10,grupo:'precatorio',desc:'Validação capa a capa de precatórios'},
  {id:'auditoria',label:'Auditoria',val:10,grupo:'precatorio',desc:'Auditoria de precatórios'}
];

// Calcula comissão total a partir de uma lista de tipos (array de IDs)
function comissaoTipos(tipos){
  if(!tipos || !tipos.length) return 0;
  return tipos.reduce(function(s,id){
    var t=TIPOS_DISTRIB.find(function(x){return x.id===id;});
    return s+(t?t.val:0);
  },0);
}

// Retorna label combinado dos tipos selecionados
function labelTipos(tipos){
  if(!tipos || !tipos.length) return '—';
  return tipos.map(function(id){
    var t=TIPOS_DISTRIB.find(function(x){return x.id===id;});
    return t?t.label:id;
  }).join(' + ');
}

// Determina em qual carteira o processo cai:
// REGRA: vai para o validador, EXCETO se o inseridor for Johnathan (PJ) — nesse caso fica com Johnathan.
function definirCarteira(validadorId, inseridorId){
  if(!inseridorId) return validadorId;
  var ins=S.lawyers.find(function(l){return l.id===inseridorId;});
  if(ins && ins.pjInsercao) return inseridorId;
  return validadorId;
}

function pageDistrib(){
  var hasFullAccess=isFullAccess(currentUser);
  var podeExcluir=hasFullAccess;
  var advOpts=S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+(l.pjInsercao?' (PJ)':'')+'</option>';}).join('');

  // Checkboxes agrupados por categoria (processo / precatório)
  function buildChecks(grupo, corHover){
    return TIPOS_DISTRIB.filter(function(t){return t.grupo===grupo;}).map(function(t){
      return '<label style="display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;cursor:pointer;background:var(--card);font-size:13px;transition:all .15s" '+
        'onmouseover="if(!this.querySelector(\'input\').checked)this.style.background=\''+corHover+'\'" onmouseout="if(!this.querySelector(\'input\').checked)this.style.background=\'var(--card)\'">'+
        '<input type="checkbox" name="dv-tipo" value="'+t.id+'" data-grupo="'+grupo+'" onchange="dvAtualizaResumo()" style="cursor:pointer;width:16px;height:16px;accent-color:var(--v)"/>'+
        '<span style="flex:1"><strong>'+t.label+'</strong></span>'+
        '<span style="color:var(--v);font-weight:700;font-size:12px">R$ '+t.val+'</span>'+
        '</label>';
    }).join('');
  }
  var checksProc=buildChecks('processo','var(--vl)');
  var checksPrec=buildChecks('precatorio','var(--dl)');

  // Estado dos filtros (preservado entre re-renders)
  var fAdv=document.getElementById('dv-fadv')?document.getElementById('dv-fadv').value:'todos';
  var fTipo=document.getElementById('dv-ftipo')?document.getElementById('dv-ftipo').value:'todos';
  var fBusca=document.getElementById('dv-fbusca')?(document.getElementById('dv-fbusca').value||'').toLowerCase():'';
  var fPeriodo=document.getElementById('dv-fperiodo')?document.getElementById('dv-fperiodo').value:'todos';
  var fDataIni=document.getElementById('dv-fdi')?document.getElementById('dv-fdi').value:'';
  var fDataFim=document.getElementById('dv-fdf')?document.getElementById('dv-fdf').value:'';
  var fMateria=document.getElementById('dv-fmat')?document.getElementById('dv-fmat').value:'todos';

  // Calcular período baseado no preset
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var hojeStr=hoje.toISOString().slice(0,10);
  var di=fDataIni, df=fDataFim;
  if(fPeriodo==='hoje'){di=hojeStr;df=hojeStr;}
  else if(fPeriodo==='semana'){
    var d7=new Date(hoje);d7.setDate(hoje.getDate()-6);
    di=d7.toISOString().slice(0,10);df=hojeStr;
  } else if(fPeriodo==='mes'){
    var dm=new Date(hoje.getFullYear(),hoje.getMonth(),1);
    di=dm.toISOString().slice(0,10);df=hojeStr;
  } else if(fPeriodo==='mes_anterior'){
    var dma1=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);
    var dma2=new Date(hoje.getFullYear(),hoje.getMonth(),0);
    di=dma1.toISOString().slice(0,10);df=dma2.toISOString().slice(0,10);
  }

  // Materias únicas para filtro
  var materiasSet={};
  S.distribValidacao.forEach(function(m){if(m.materia)materiasSet[m.materia]=true;});
  var materiasList=Object.keys(materiasSet).sort();
  var matOpts='<option value="todos"'+(fMateria==='todos'?' selected':'')+'>Todas</option>'+
    materiasList.map(function(x){return'<option value="'+esc(x)+'"'+(fMateria===x?' selected':'')+'>'+esc(x)+'</option>';}).join('');

  // Para filtro por tipo: se algum registro do grupo tem o tipo, o grupo inteiro entra
  var gruposTipo={};
  if(fTipo!=='todos'){
    S.distribValidacao.forEach(function(m){
      if(m.tipo===fTipo) gruposTipo[m.grupoId||m.id]=true;
    });
  }

  var lista=S.distribValidacao.slice().filter(function(m){
    if(fAdv!=='todos' && m.advogadoId!==fAdv && m.inseridorId!==fAdv) return false;
    if(fTipo!=='todos' && !gruposTipo[m.grupoId||m.id]) return false;
    if(fMateria!=='todos' && (m.materia||'')!==fMateria) return false;
    if(di && (m.data||'')<di) return false;
    if(df && (m.data||'')>df) return false;
    if(fBusca){
      var hay=((m.cliente||'')+' '+(m.numero||'')+' '+(m.obs||'')+' '+(m.materia||'')).toLowerCase();
      if(hay.indexOf(fBusca)<0) return false;
    }
    return true;
  }).sort(function(a,b){return(b.data||'').localeCompare(a.data||'');});

  // Métricas (agrupadas por grupoId — uma validação combinada conta como 1)
  var gruposNaLista={};
  lista.forEach(function(m){gruposNaLista[m.grupoId||m.id]=true;});
  var qtdValidacoes=Object.keys(gruposNaLista).length;
  var totalLista=lista.reduce(function(s,m){return s+comissaoTipos([m.tipo]);},0);
  var totalGeral=S.distribValidacao.reduce(function(s,m){return s+comissaoTipos([m.tipo]);},0);

  // Contagem por advogado (validador) — quantas validações distintas
  var porAdv={};
  S.lawyers.forEach(function(l){porAdv[l.id]={qtd:0,com:0,nome:l.name,grupos:{}};});
  lista.forEach(function(m){
    if(!porAdv[m.advogadoId])return;
    porAdv[m.advogadoId].com+=comissaoTipos([m.tipo]);
    porAdv[m.advogadoId].grupos[m.grupoId||m.id]=true;
  });
  Object.keys(porAdv).forEach(function(k){porAdv[k].qtd=Object.keys(porAdv[k].grupos).length;});
  var rankAdv=Object.keys(porAdv).map(function(k){return porAdv[k];}).filter(function(x){return x.qtd>0;}).sort(function(a,b){return b.qtd-a.qtd;});
  var rankAdvHtml=rankAdv.length?rankAdv.map(function(x,i){
    return '<tr style="'+(i%2?'background:var(--row-alt)':'')+'"><td style="padding:7px 10px">'+esc(x.nome)+'</td><td style="padding:7px 10px;text-align:right;font-weight:600">'+x.qtd+'</td><td style="padding:7px 10px;text-align:right;color:var(--v);font-weight:700">R$ '+x.com.toFixed(2).replace('.',',')+'</td></tr>';
  }).join(''):'<tr><td colspan="3" style="padding:14px;text-align:center;color:var(--mt)">Nenhum advogado com validações no período.</td></tr>';

  // Tabela agrupada
  var gruposMap={};
  var ordemGrupos=[];
  lista.forEach(function(m){
    var k=m.grupoId||m.id;
    if(!gruposMap[k]){gruposMap[k]={primeiro:m,tipos:[],tiposIds:[],ids:[],totalVal:0};ordemGrupos.push(k);}
    gruposMap[k].tiposIds.push(m.tipo);
    gruposMap[k].ids.push(m.id);
    var t=TIPOS_DISTRIB.find(function(x){return x.id===m.tipo;});
    if(t){gruposMap[k].tipos.push(t.label);gruposMap[k].totalVal+=t.val;}
  });

  var rows=ordemGrupos.map(function(k,i){
    var g=gruposMap[k];
    var m=g.primeiro;
    var validador=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    var inseridor=m.inseridorId?(S.lawyers.find(function(l){return l.id===m.inseridorId;})||{name:'---'}).name:'—';
    var carteiraId=definirCarteira(m.advogadoId,m.inseridorId);
    var carteira=(S.lawyers.find(function(l){return l.id===carteiraId;})||{name:'---'}).name;
    var carteiraEspecial=carteiraId!==m.advogadoId;
    var bg=i%2===0?'':'background:var(--row-alt)';
    var del=podeExcluir?'<button onclick="delDistribGrupo('+JSON.stringify(k)+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;line-height:1;padding:4px 8px" title="Excluir validação">×</button>':'';
    var carteiraCell=carteiraEspecial
      ? '<span style="background:var(--dl);color:var(--d);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600" title="Inseridor PJ — fica na carteira do inseridor">'+esc(carteira)+' ⚡</span>'
      : esc(carteira);
    var tiposCell=g.tiposIds.map(function(tid){
      var t=TIPOS_DISTRIB.find(function(x){return x.id===tid;});
      if(!t)return '';
      var cor=t.grupo==='precatorio'?'background:var(--dl);color:var(--d)':'background:var(--vl);color:var(--v)';
      return '<span style="display:inline-block;'+cor+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px 2px">'+esc(t.label)+'</span>';
    }).join('');
    return'<tr style="'+bg+'">'+
      '<td style="padding:8px">'+fmtDate(m.data)+'</td>'+
      '<td style="padding:8px">'+esc(m.cliente||'—')+'</td>'+
      '<td style="padding:8px;font-size:11px;color:var(--mt)">'+esc(m.numero||'—')+'</td>'+
      '<td style="padding:8px;font-size:11px">'+esc(m.materia||'—')+'</td>'+
      '<td style="padding:8px">'+esc(validador)+'</td>'+
      '<td style="padding:8px;color:var(--mt)">'+esc(inseridor)+'</td>'+
      '<td style="padding:8px">'+carteiraCell+'</td>'+
      '<td style="padding:8px">'+tiposCell+'</td>'+
      '<td style="padding:8px;text-align:right;color:var(--v);font-weight:700">R$ '+g.totalVal.toFixed(2).replace('.',',')+'</td>'+
      '<td style="padding:8px;font-size:11px;color:var(--mt)">'+esc(m.obs||'')+'</td>'+
      '<td>'+del+'</td>'+
    '</tr>';
  }).join('');

  var qtdTotal=S.distribValidacao.length;
  var qtdGruposTotal=Object.keys(S.distribValidacao.reduce(function(o,m){o[m.grupoId||m.id]=1;return o;},{})).length;

  return'<div class="page-title">'+I.resumo+' Validações PBL'+
    '<span class="section-badge" style="background:var(--vl);color:var(--v);font-size:11px;padding:3px 9px;border-radius:10px;margin-left:8px;font-weight:600">'+qtdGruposTotal+' validações</span>'+
    '<button class="btn no-print" style="margin-left:auto;font-size:12px" onclick="exportDistribXlsx()" title="Exportar para Excel">📥 Excel</button>'+
    '<button class="btn no-print" style="margin-left:8px;font-size:12px" onclick="window.print()" title="Imprimir relatório">🖨️ Imprimir</button>'+
    '</div>'+

    // FORMULÁRIO
    '<div class="card no-print">'+
      '<div style="font-size:12px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Registrar nova validação</div>'+
      '<div class="g3">'+
        '<div class="fg"><label>Data *</label><input type="date" id="dv-data" value="'+todayStr()+'"/></div>'+
        '<div class="fg"><label>Cliente *</label><input type="text" id="dv-cli" placeholder="Nome do cliente"/></div>'+
        '<div class="fg"><label>Nº Processo</label><input type="text" id="dv-num" placeholder="0000000-00.0000.0.00.0000"/></div>'+
      '</div>'+
      '<div class="g3" style="margin-top:10px">'+
        '<div class="fg"><label>Validador * (recebe a comissão)</label><select id="dv-adv" onchange="dvAtualizaCarteira()"><option value="">Selecione...</option>'+advOpts+'</select></div>'+
        '<div class="fg"><label>Inseridor (opcional)</label><select id="dv-ins" onchange="dvAtualizaCarteira()"><option value="">— sem inseridor —</option>'+advOpts+'</select></div>'+
        '<div class="fg"><label>Matéria</label><input type="text" id="dv-mat" placeholder="Ex: RPV, Trabalhista, Cível..." list="mat-list"/>'+
          '<datalist id="mat-list">'+materiasList.map(function(x){return'<option value="'+esc(x)+'"/>';}).join('')+'</datalist>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:14px">'+
        '<label style="font-size:12px;color:var(--mt);display:block;margin-bottom:8px">Tipo de validação * <span style="font-weight:400">(marque um ou mais — pode combinar dentro do mesmo grupo)</span></label>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
          '<div style="padding:12px;background:var(--row-alt);border-radius:10px;border:1px solid var(--bd)">'+
            '<div style="font-size:11px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📄 Processo comum</div>'+
            '<div style="display:flex;flex-direction:column;gap:6px">'+checksProc+'</div>'+
            '<div style="font-size:11px;color:var(--mt);margin-top:6px;font-style:italic">Pode ser só processo, só contrato, ou os dois</div>'+
          '</div>'+
          '<div style="padding:12px;background:var(--dl);border-radius:10px;border:1px solid var(--bd)">'+
            '<div style="font-size:11px;font-weight:700;color:var(--d);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📜 Precatório</div>'+
            '<div style="display:flex;flex-direction:column;gap:6px">'+checksPrec+'</div>'+
            '<div style="font-size:11px;color:var(--mt);margin-top:6px;font-style:italic">Pode ser só capa a capa, só auditoria, ou os dois</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="fg" style="margin-top:12px"><label>Observação</label><input type="text" id="dv-obs" placeholder="Ex: pendência, RPV, detalhe específico..."/></div>'+
      '<div id="dv-prev" style="margin-top:12px;padding:12px 14px;background:var(--vl);border-radius:8px;font-size:13px;color:var(--v);display:none">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'+
          '<div><strong>📁 Carteira:</strong> <span id="dv-prev-carteira">—</span></div>'+
          '<div><strong>💰 Comissão:</strong> <span id="dv-prev-comissao" style="color:var(--v);font-weight:700">R$ 0,00</span></div>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:10px">'+
        '<div style="font-size:11px;color:var(--mt)">⚡ O processo entra na carteira do advogado responsável e a comissão é contabilizada automaticamente.</div>'+
        '<button class="btn bp" onclick="addDistrib()">+ Registrar Validação</button>'+
      '</div>'+
    '</div>'+

    // PAINEL DE FILTROS / RELATÓRIO
    '<div class="card no-print" style="margin-top:14px">'+
      '<div style="font-size:12px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">🔍 Filtrar / gerar relatório</div>'+
      '<div class="g4">'+
        '<div class="fg"><label>Período</label>'+
          '<select id="dv-fperiodo" onchange="dvPeriodoChange()">'+
            '<option value="todos"'+(fPeriodo==='todos'?' selected':'')+'>Tudo</option>'+
            '<option value="hoje"'+(fPeriodo==='hoje'?' selected':'')+'>Hoje</option>'+
            '<option value="semana"'+(fPeriodo==='semana'?' selected':'')+'>Últimos 7 dias</option>'+
            '<option value="mes"'+(fPeriodo==='mes'?' selected':'')+'>Mês atual</option>'+
            '<option value="mes_anterior"'+(fPeriodo==='mes_anterior'?' selected':'')+'>Mês anterior</option>'+
            '<option value="custom"'+(fPeriodo==='custom'?' selected':'')+'>Personalizado</option>'+
          '</select>'+
        '</div>'+
        '<div class="fg"><label>De</label><input type="date" id="dv-fdi" value="'+esc(fDataIni)+'" onchange="document.getElementById(\'dv-fperiodo\').value=\'custom\';renderDistribTable()"/></div>'+
        '<div class="fg"><label>Até</label><input type="date" id="dv-fdf" value="'+esc(fDataFim)+'" onchange="document.getElementById(\'dv-fperiodo\').value=\'custom\';renderDistribTable()"/></div>'+
        '<div class="fg"><label>Advogado</label><select id="dv-fadv" onchange="renderDistribTable()"><option value="todos"'+(fAdv==='todos'?' selected':'')+'>Todos</option>'+S.lawyers.map(function(l){return'<option value="'+l.id+'"'+(fAdv===l.id?' selected':'')+'>'+l.name+'</option>';}).join('')+'</select></div>'+
      '</div>'+
      '<div class="g3" style="margin-top:10px">'+
        '<div class="fg"><label>Tipo</label><select id="dv-ftipo" onchange="renderDistribTable()"><option value="todos"'+(fTipo==='todos'?' selected':'')+'>Todos</option>'+TIPOS_DISTRIB.map(function(t){return'<option value="'+t.id+'"'+(fTipo===t.id?' selected':'')+'>'+t.label+'</option>';}).join('')+'</select></div>'+
        '<div class="fg"><label>Matéria</label><select id="dv-fmat" onchange="renderDistribTable()">'+matOpts+'</select></div>'+
        '<div class="fg"><label>Buscar</label><input type="text" id="dv-fbusca" value="'+esc(fBusca)+'" placeholder="Cliente, processo, observação..." oninput="renderDistribTable()"/></div>'+
      '</div>'+
    '</div>'+

    // RESUMO / KPIs
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:18px 0 12px">'+
      '<div class="card" style="padding:14px;margin:0"><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em">Validações</div><div style="font-size:22px;font-weight:700;color:var(--v);margin-top:4px">'+qtdValidacoes+'</div></div>'+
      '<div class="card" style="padding:14px;margin:0"><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em">Lançamentos</div><div style="font-size:22px;font-weight:700;color:var(--tx);margin-top:4px">'+lista.length+'</div></div>'+
      '<div class="card" style="padding:14px;margin:0"><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em">Comissão filtrada</div><div style="font-size:22px;font-weight:700;color:var(--v);margin-top:4px">R$ '+totalLista.toFixed(2).replace('.',',')+'</div></div>'+
      '<div class="card" style="padding:14px;margin:0"><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em">Total geral</div><div style="font-size:22px;font-weight:700;color:var(--mt);margin-top:4px">R$ '+totalGeral.toFixed(2).replace('.',',')+'</div></div>'+
    '</div>'+

    // RANKING POR ADVOGADO
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;align-items:flex-start">'+
      '<div class="card" style="margin:0">'+
        '<div style="font-size:12px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">📊 Ranking por advogado</div>'+
        '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
          '<thead><tr style="background:var(--v);color:#fff"><th style="padding:8px 10px;text-align:left">Advogado</th><th style="padding:8px 10px;text-align:right">Validações</th><th style="padding:8px 10px;text-align:right">Comissão</th></tr></thead>'+
          '<tbody>'+rankAdvHtml+'</tbody>'+
        '</table></div>'+
      '</div>'+

      // TABELA PRINCIPAL
      '<div>'+
        '<div style="font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">📋 Histórico detalhado</div>'+
        '<div style="overflow-x:auto;border-radius:8px;border:1px solid var(--bd)" id="dv-tbl-wrap">'+
          '<table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--card)">'+
          '<thead><tr style="background:var(--v);color:#fff">'+
            '<th style="padding:10px;text-align:left">Data</th>'+
            '<th style="padding:10px;text-align:left">Cliente</th>'+
            '<th style="padding:10px;text-align:left">Nº Processo</th>'+
            '<th style="padding:10px;text-align:left">Matéria</th>'+
            '<th style="padding:10px;text-align:left">Validador</th>'+
            '<th style="padding:10px;text-align:left">Inseridor</th>'+
            '<th style="padding:10px;text-align:left">Carteira</th>'+
            '<th style="padding:10px;text-align:left">Tipo</th>'+
            '<th style="padding:10px;text-align:right">Comissão</th>'+
            '<th style="padding:10px;text-align:left">Obs.</th>'+
            '<th class="no-print"></th>'+
          '</tr></thead>'+
          '<tbody id="dv-tbody">'+(rows||'<tr><td colspan="11" style="text-align:center;padding:24px;color:var(--mt)">Nenhum registro encontrado.</td></tr>')+'</tbody>'+
        '</table></div>'+
      '</div>'+
    '</div>';
}

function dvPeriodoChange(){
  var v=document.getElementById('dv-fperiodo').value;
  if(v!=='custom' && v!=='todos'){
    // limpa as datas — serão recalculadas no render
    document.getElementById('dv-fdi').value='';
    document.getElementById('dv-fdf').value='';
  }
  renderDistribTable();
}

// Lê os tipos marcados no formulário
function dvTiposSelecionados(){
  var nodes=document.querySelectorAll('input[name="dv-tipo"]:checked');
  return Array.prototype.map.call(nodes,function(n){return n.value;});
}

// Atualiza preview de carteira E comissão
function dvAtualizaResumo(){
  var advId=document.getElementById('dv-adv').value;
  var insId=document.getElementById('dv-ins').value;
  var tipos=dvTiposSelecionados();
  var prev=document.getElementById('dv-prev');
  var lblC=document.getElementById('dv-prev-carteira');
  var lblV=document.getElementById('dv-prev-comissao');

  // destacar checkboxes marcados (cor conforme grupo)
  document.querySelectorAll('input[name="dv-tipo"]').forEach(function(n){
    var grupo=n.getAttribute('data-grupo');
    var cor=grupo==='precatorio'?'var(--dl)':'var(--vl)';
    var corBorda=grupo==='precatorio'?'var(--d)':'var(--v)';
    n.parentElement.style.background=n.checked?cor:'var(--card)';
    n.parentElement.style.borderColor=n.checked?corBorda:'var(--bd)';
  });

  if(!advId && !tipos.length){prev.style.display='none';return;}
  prev.style.display='block';

  if(advId){
    var carteiraId=definirCarteira(advId,insId);
    var carteira=(S.lawyers.find(function(l){return l.id===carteiraId;})||{name:'?'}).name;
    var especial=carteiraId!==advId;
    lblC.innerHTML=esc(carteira)+(especial?' <span style="color:var(--d);font-weight:600">(inseridor PJ — processo fica com o inseridor)</span>':'');
  } else {
    lblC.textContent='— selecione um validador —';
  }

  var soma=tipos.reduce(function(s,id){var t=TIPOS_DISTRIB.find(function(x){return x.id===id;});return s+(t?t.val:0);},0);
  var detalhe=tipos.map(function(id){var t=TIPOS_DISTRIB.find(function(x){return x.id===id;});return t?t.label+' (R$'+t.val+')':'';}).filter(Boolean).join(' + ');
  lblV.innerHTML='<strong style="color:var(--v)">R$ '+soma.toFixed(2).replace('.',',')+'</strong>'+(detalhe?' <span style="color:var(--mt)">— '+detalhe+'</span>':'');
}

// Compatibilidade
function dvAtualizaCarteira(){dvAtualizaResumo();}

function renderDistribTable(){
  // re-renderiza preservando filtros
  var mc=document.getElementById('main-content');
  var fa=document.getElementById('dv-fadv').value;
  var ft=document.getElementById('dv-ftipo').value;
  var fb=document.getElementById('dv-fbusca').value;
  var fp=document.getElementById('dv-fperiodo').value;
  var fdi=document.getElementById('dv-fdi').value;
  var fdf=document.getElementById('dv-fdf').value;
  var fmat=document.getElementById('dv-fmat')?document.getElementById('dv-fmat').value:'todos';
  mc.innerHTML=pageDistrib();
  document.getElementById('dv-fadv').value=fa;
  document.getElementById('dv-ftipo').value=ft;
  document.getElementById('dv-fbusca').value=fb;
  document.getElementById('dv-fperiodo').value=fp;
  document.getElementById('dv-fdi').value=fdi;
  document.getElementById('dv-fdf').value=fdf;
  if(document.getElementById('dv-fmat'))document.getElementById('dv-fmat').value=fmat;
  var fbInp=document.getElementById('dv-fbusca');if(fbInp)fbInp.focus();
}

function addDistrib(){
  var data=document.getElementById('dv-data').value;
  var cli=(document.getElementById('dv-cli').value||'').trim();
  var num=(document.getElementById('dv-num').value||'').trim();
  var adv=document.getElementById('dv-adv').value;
  var ins=document.getElementById('dv-ins').value;
  var mat=(document.getElementById('dv-mat').value||'').trim();
  var tipos=dvTiposSelecionados();
  var obs=(document.getElementById('dv-obs').value||'').trim();
  if(!data||!cli||!adv){alert('Preencha Data, Cliente e Validador.');return;}
  if(!tipos.length){alert('Marque ao menos um tipo de validação.');return;}

  var carteiraId=definirCarteira(adv,ins);
  var carteiraNome=(S.lawyers.find(function(l){return l.id===carteiraId;})||{name:''}).name;
  var grupoId=uid();

  var distribIds=[];
  tipos.forEach(function(tipo){
    var distribId=uid();
    distribIds.push(distribId);
    S.distribValidacao.push({
      id:distribId,
      grupoId:grupoId,
      data:data,
      cliente:cli,
      numero:num,
      materia:mat,
      advogadoId:adv,
      inseridorId:ins||null,
      carteiraId:carteiraId,
      tipo:tipo,
      obs:obs,
      criadoPor:currentUser.id,
      criadoEm:new Date().toISOString()
    });
  });

  // Cria/atualiza processo na carteira
  var procExistente=null;
  if(num){
    var numLimpo=num.replace(/\D/g,'');
    if(numLimpo.length>5){
      procExistente=S.processos.find(function(p){return(p.numero||'').replace(/\D/g,'')===numLimpo;});
    }
  }
  if(procExistente){
    procExistente.advogadoId=carteiraId;
    if(mat && !procExistente.materia)procExistente.materia=mat;
    if(!procExistente.distribIds)procExistente.distribIds=[];
    procExistente.distribIds=procExistente.distribIds.concat(distribIds);
  } else {
    S.processos.push({
      id:uid(),
      numero:num||'(s/ número)',
      cliente:cli,
      advogadoId:carteiraId,
      atendente:'',reu:'',materia:mat,foro:'',comarca:'',vara:'',estado:'',
      dataCompra:data,
      valorCondenacao:0,valorCliente:0,percCompra:0,valorCompra:0,
      status:'pendente',
      recebimentos:[],
      origem:'validacao_pbl',
      distribIds:distribIds
    });
  }

  saveData();
  var soma=tipos.reduce(function(s,id){var t=TIPOS_DISTRIB.find(function(x){return x.id===id;});return s+(t?t.val:0);},0);
  showToast('Validação registrada — R$'+soma.toFixed(2).replace('.',',')+' para '+carteiraNome+' ✓');
  navigate('distrib');
}

function delDistrib(id){
  if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode excluir.");return;}
  if(!confirm('Excluir esta validação?'))return;
  S.distribValidacao=S.distribValidacao.filter(function(m){return m.id!==id;});
  S.processos.forEach(function(p){
    if(p.distribIds)p.distribIds=p.distribIds.filter(function(x){return x!==id;});
  });
  saveData();navigate('distrib');
}

function delDistribGrupo(grupoId){
  if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode excluir.");return;}
  var registros=S.distribValidacao.filter(function(m){return(m.grupoId||m.id)===grupoId;});
  if(!registros.length){showToast('Validação não encontrada');return;}
  var idsParaRemover=registros.map(function(m){return m.id;});
  var msg='Excluir esta validação?';
  if(registros.length>1)msg+='\n\nIsso removerá '+registros.length+' lançamentos de comissão. ';
  msg+='\n\nObs: o processo na carteira NÃO será removido (pode ter recebimentos).';
  if(!confirm(msg))return;
  S.distribValidacao=S.distribValidacao.filter(function(m){return idsParaRemover.indexOf(m.id)<0;});
  S.processos.forEach(function(p){
    if(p.distribIds)p.distribIds=p.distribIds.filter(function(x){return idsParaRemover.indexOf(x)<0;});
  });
  saveData();
  showToast('Validação excluída ✓');
  navigate('distrib');
}

function exportDistribXlsx(){
  // Exporta a lista filtrada visível como Excel
  var fAdv=document.getElementById('dv-fadv').value;
  var fTipo=document.getElementById('dv-ftipo').value;
  var fBusca=(document.getElementById('dv-fbusca').value||'').toLowerCase();
  var fPeriodo=document.getElementById('dv-fperiodo').value;
  var fDataIni=document.getElementById('dv-fdi').value;
  var fDataFim=document.getElementById('dv-fdf').value;
  var fMateria=document.getElementById('dv-fmat')?document.getElementById('dv-fmat').value:'todos';

  var hoje=new Date();hoje.setHours(0,0,0,0);
  var hojeStr=hoje.toISOString().slice(0,10);
  var di=fDataIni,df=fDataFim;
  if(fPeriodo==='hoje'){di=hojeStr;df=hojeStr;}
  else if(fPeriodo==='semana'){var d7=new Date(hoje);d7.setDate(hoje.getDate()-6);di=d7.toISOString().slice(0,10);df=hojeStr;}
  else if(fPeriodo==='mes'){var dm=new Date(hoje.getFullYear(),hoje.getMonth(),1);di=dm.toISOString().slice(0,10);df=hojeStr;}
  else if(fPeriodo==='mes_anterior'){var dma1=new Date(hoje.getFullYear(),hoje.getMonth()-1,1);var dma2=new Date(hoje.getFullYear(),hoje.getMonth(),0);di=dma1.toISOString().slice(0,10);df=dma2.toISOString().slice(0,10);}

  var gruposTipo={};
  if(fTipo!=='todos'){S.distribValidacao.forEach(function(m){if(m.tipo===fTipo)gruposTipo[m.grupoId||m.id]=true;});}

  var lista=S.distribValidacao.filter(function(m){
    if(fAdv!=='todos' && m.advogadoId!==fAdv && m.inseridorId!==fAdv)return false;
    if(fTipo!=='todos' && !gruposTipo[m.grupoId||m.id])return false;
    if(fMateria!=='todos' && (m.materia||'')!==fMateria)return false;
    if(di && (m.data||'')<di)return false;
    if(df && (m.data||'')>df)return false;
    if(fBusca){var hay=((m.cliente||'')+' '+(m.numero||'')+' '+(m.obs||'')+' '+(m.materia||'')).toLowerCase();if(hay.indexOf(fBusca)<0)return false;}
    return true;
  }).sort(function(a,b){return(b.data||'').localeCompare(a.data||'');});

  // Agrupar por grupoId
  var gruposMap={};var ordem=[];
  lista.forEach(function(m){
    var k=m.grupoId||m.id;
    if(!gruposMap[k]){gruposMap[k]={primeiro:m,tipos:[],totalVal:0};ordem.push(k);}
    var t=TIPOS_DISTRIB.find(function(x){return x.id===m.tipo;});
    if(t){gruposMap[k].tipos.push(t.label);gruposMap[k].totalVal+=t.val;}
  });

  var dados=ordem.map(function(k){
    var g=gruposMap[k];var m=g.primeiro;
    var validador=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    var inseridor=m.inseridorId?(S.lawyers.find(function(l){return l.id===m.inseridorId;})||{name:'---'}).name:'';
    var carteiraId=definirCarteira(m.advogadoId,m.inseridorId);
    var carteira=(S.lawyers.find(function(l){return l.id===carteiraId;})||{name:'---'}).name;
    return{
      'Data':fmtDate(m.data),
      'Cliente':m.cliente||'',
      'Nº Processo':m.numero||'',
      'Matéria':m.materia||'',
      'Validador':validador,
      'Inseridor':inseridor,
      'Carteira':carteira,
      'Tipos':g.tipos.join(' + '),
      'Comissão (R$)':g.totalVal,
      'Observação':m.obs||''
    };
  });

  if(!dados.length){alert('Nenhum registro para exportar com os filtros atuais.');return;}

  var ws=XLSX.utils.json_to_sheet(dados);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Validações PBL');

  // Resumo por advogado
  var porAdv={};
  ordem.forEach(function(k){
    var g=gruposMap[k];var m=g.primeiro;
    var nome=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    if(!porAdv[nome])porAdv[nome]={qtd:0,com:0};
    porAdv[nome].qtd++;porAdv[nome].com+=g.totalVal;
  });
  var resumo=Object.keys(porAdv).sort(function(a,b){return porAdv[b].qtd-porAdv[a].qtd;}).map(function(n){
    return{'Advogado':n,'Qtd Validações':porAdv[n].qtd,'Comissão Total (R$)':porAdv[n].com};
  });
  if(resumo.length){
    var ws2=XLSX.utils.json_to_sheet(resumo);
    XLSX.utils.book_append_sheet(wb,ws2,'Resumo por Advogado');
  }

  var nome='validacoes_pbl_'+new Date().toISOString().slice(0,10)+'.xlsx';
  XLSX.writeFile(wb,nome);
  showToast('Exportado: '+nome);
}

    '<div id="rp-out"><div class="empty">Importe a planilha e clique em Gerar.</div></div>';

function impRelPend(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    relPendData=rows.filter(function(r){return String(getCol(r,['Cliente','cliente'])||'').trim();}).map(function(r){
      var dv=getCol(r,['Data','data']);var ds='';
      if(dv){try{var d=new Date(String(dv));if(!isNaN(d))ds=d.toISOString().slice(0,10);}catch(e){}}
      return{cliente:String(getCol(r,['Cliente','cliente'])||'').trim(),proc:String(getCol(r,['Processo','processo'])||'').trim(),data:ds,
        vlCli:parseValor(getCol(r,['Valor Cliente','valor cliente'])||0),
        vlComp:parseValor(getCol(r,['Valor Compra','valor compra'])||0),
        prevG:parseValor(getCol(r,['Prev. Ganho','prev ganho'])||0),
        prevE:parseValor(getCol(r,['Prev. Entrada','prev entrada'])||0),
        des:parseValor(getCol(r,['Desagio','Deságio','desagio'])||0)};
    });
    var el=document.getElementById('rp-st');if(el)el.textContent=relPendData.length+' processos';
    showToast(relPendData.length+' importados!');input.value='';
  });
}
function renderRelPend(){
  if(!relPendData||!relPendData.length){document.getElementById('rp-out').innerHTML='<div class="empty">Importe primeiro.</div>';return;}
  var q=(document.getElementById('rp-q').value||'').toLowerCase();
  var f=relPendData.filter(function(r){return!q||(r.cliente||'').toLowerCase().includes(q)||(r.proc||'').toLowerCase().includes(q);});
  var tCli=f.reduce(function(s,r){return s+r.vlCli;},0),tC=f.reduce(function(s,r){return s+r.vlComp;},0),tG=f.reduce(function(s,r){return s+r.prevG;},0);
  document.getElementById('rp-out').innerHTML=
    '<div class="metrics" style="margin-bottom:16px"><div class="mc"><div class="ml">Pendentes</div><div class="mv">'+f.length+'</div></div><div class="mc gold"><div class="ml">Vl. Cliente</div><div class="mv gold">'+fmt(tCli)+'</div></div><div class="mc blue"><div class="ml">Vl. Compra</div><div class="mv blue">'+fmt(tC)+'</div></div><div class="mc green"><div class="ml">Prev. Ganho</div><div class="mv green">'+fmt(tG)+'</div></div></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:var(--v);color:#fff"><th style="padding:9px">Cliente</th><th style="padding:9px">Processo</th><th style="padding:9px">Data</th><th style="padding:9px;text-align:right">Vl.Cliente</th><th style="padding:9px;text-align:right">Vl.Compra</th><th style="padding:9px;text-align:right">Prev.Ganho</th><th style="padding:9px;text-align:right">Prev.Entrada</th><th style="padding:9px;text-align:right">Deságio%</th></tr></thead><tbody>'+
    f.map(function(r,i){var bg=i%2===0?'':'background:var(--row-alt)';return'<tr style="'+bg+'"><td style="padding:8px">'+esc(r.cliente)+'</td><td style="padding:8px;font-size:11px">'+esc(r.proc)+'</td><td style="padding:8px">'+fmtDate(r.data)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlCli)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlComp)+'</td><td style="padding:8px;text-align:right;color:#1D6B3A">'+fmt(r.prevG)+'</td><td style="padding:8px;text-align:right">'+fmt(r.prevE)+'</td><td style="padding:8px;text-align:right">'+r.des.toFixed(2)+'%</td></tr>';}).join('')+
    '</tbody></table></div>';
}

function importarPlanilhaContencioso(){
  if(!confirm('Isso vai importar '+_PROC_DATA.length+' processos da planilha Contencioso. Continuar?'))return;
  if(!S.lawyers||S.lawyers.length===0){alert('Cadastre os advogados primeiro!');return;}
  var added=0,skipped=0,noAdv=[];
  _PROC_DATA.forEach(function(p){
    var advKey=(p[6]||'').toLowerCase().trim();
    var lawyer=S.lawyers.find(function(l){
      var n=(l.name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z ]/g,'').trim();
      var first=n.split(' ')[0];
      return first===advKey||n===advKey||n.indexOf(advKey)===0;
    });
    if(!lawyer){skipped++;if(noAdv.indexOf(advKey)<0)noAdv.push(advKey);return;}
    var isDup=S.processos.some(function(x){return x.numero===p[0]&&x.advogadoId===lawyer.id;});
    if(isDup)return;
    S.processos.push({id:uid(),numero:p[0],tribunal:p[1]||'',tipo:p[2]||'',credito:p[3]||'',
      dataCompra:p[4]||'',valorCliente:p[5]||0,valorCompra:p[5]||0,
      advogadoId:lawyer.id,status:'pendente',recebimentos:[]});
    added++;
  });
  saveData();
  var msg=added+' processos importados com sucesso!';
  if(skipped>0)msg+='\n'+skipped+' sem advogado correspondente: '+noAdv.join(', ');
  alert(msg);
  navigate('processos');
}
