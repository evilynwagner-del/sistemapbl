<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBL — Gestão de Comissões</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#0D5C52;--vd:#083f38;--vl:#E6F2F0;
  --d:#B8860B;--dl:#FDF6E3;--dm:#C9970D;
  --bd:#d0dbd9;--tx:#1c1c1c;--mt:#5e7572;
  --bg:#f0f3f2;--red:#A32D2D;--redl:#FCEBEB;
  --sb:240px;
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}

/* ── LOGIN ─────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v)}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
.login-title{font-size:20px;font-weight:700;color:var(--v)}
.login-sub{font-size:12px;color:var(--mt);margin-top:2px}
.lf{margin-bottom:16px}
.lf label{font-size:12px;color:var(--mt);display:block;margin-bottom:5px;font-weight:600}
.lf input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s}
.lf input:focus{border-color:var(--v)}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{background:var(--vd)}
.login-err{background:var(--redl);color:var(--red);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:14px;display:none}

/* ── APP SHELL ──────────────────────────────────── */
.app-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:var(--v);display:flex;align-items:stretch;height:56px;flex-shrink:0;z-index:300}
.hdr-brand{width:var(--sb);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid rgba(255,255,255,.12)}
.hdr-title{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.hdr-subtitle{color:rgba(255,255,255,.5);font-size:10px;display:block}
.hdr-right{flex:1;display:flex;align-items:center;gap:10px;padding:0 20px}
.hdr-period{color:rgba(255,255,255,.7);font-size:12px;flex:1}
.hdr-user{color:rgba(255,255,255,.85);font-size:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
input[type=month]{padding:5px 9px;border-radius:6px;border:none;font-size:12px;background:rgba(255,255,255,.18);color:#fff;outline:none;cursor:pointer}
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7}
.btn-calc{background:var(--d);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-calc:hover{background:var(--dm)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.admin-badge{background:var(--d);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}

/* ── BODY ───────────────────────────────────────── */
.body-area{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar{width:var(--sb);background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:7px;margin:1px 8px;font-size:13px;color:var(--tx);border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .12s,color .12s;white-space:nowrap}
.nav-item:hover{background:var(--vl);color:var(--v)}
.nav-item.active{background:var(--vl);color:var(--v);font-weight:700}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.55}
.nav-item.active svg,.nav-item:hover svg{opacity:1}

/* accordion */
.sb-group{}
.sb-group-hdr{display:flex;align-items:center;gap:9px;padding:8px 14px 8px 22px;cursor:pointer;font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;border:none;background:none;width:100%;text-align:left}
.sb-group-hdr:hover{color:var(--v)}
.sb-group-hdr svg{width:14px;height:14px;opacity:.55}
.sb-chevron{margin-left:auto;font-size:10px;transition:transform .2s;line-height:1}
.sb-children{display:none;padding-bottom:4px}
.sb-children.open{display:block}
.sb-children .nav-item{padding-left:36px;font-size:12px;margin-left:12px;width:calc(100% - 20px)}

/* ── MAIN ───────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:24px 28px;min-width:0}

/* ── CARDS / FORM ───────────────────────────────── */
.page-title{font-size:17px;font-weight:700;color:var(--v);display:flex;align-items:center;gap:10px;margin-bottom:18px}
.page-title svg{width:20px;height:20px;flex-shrink:0}
.st{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px}
.st:first-child{margin-top:0}
.card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.frow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fg label{font-size:12px;color:var(--mt)}
.fg input,.fg select,.fg textarea{border:.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:#fff;outline:none;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fg textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.div{height:.5px;background:#eef1f0;margin:14px 0}

/* ── BUTTONS ────────────────────────────────────── */
.btn{padding:7px 15px;border-radius:6px;font-size:13px;border:.5px solid #ccc;background:#fff;cursor:pointer;color:var(--tx);font-weight:500;white-space:nowrap}
.btn:hover{background:var(--vl)}
.bp{background:var(--v);color:#fff;border-color:var(--v)}
.bp:hover{background:var(--vd)}
.bd2{color:var(--red);border-color:#e8b4b4;padding:4px 10px;font-size:11px}
.bd2:hover{background:var(--redl)}
.bsm{padding:4px 12px;font-size:12px}
.print-btn{background:#1D6B3A;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
.print-btn:hover{background:#145229}

/* ── TABLE ──────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:8px 11px;text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:7px 11px;border-bottom:.5px solid #eef1f0;vertical-align:middle}
.tbl td.r{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f7faf9}
.tbl tr:hover td{background:#edf5f3}
.tbl tr.foot td{background:var(--v);color:#fff;font-weight:700}
.dbtn{color:var(--red);background:none;border:none;cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.ebtn{color:var(--v);background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;line-height:1}

/* ── BADGES ─────────────────────────────────────── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.b-tot{background:var(--vl);color:var(--v)}
.b-par{background:var(--dl);color:var(--d)}
.b-pend{background:#EEF3FB;color:#185FA5}
.b-red{background:var(--redl);color:var(--red)}
.b-green{background:#E6F4EC;color:#1D6B3A}
.b-compra{background:#EEF3FB;color:#185FA5}
.b-venda{background:#E6F4EC;color:#1D6B3A}
.b-desp{background:var(--redl);color:var(--red)}
.section-badge{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:10px;vertical-align:middle}

/* ── METRICS ────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.mc{background:var(--vl);border-radius:8px;padding:13px 15px}
.mc.gold{background:var(--dl)}
.mc.blue{background:#EEF3FB}
.mc.red{background:var(--redl)}
.mc.green{background:#E6F4EC}
.ml{font-size:11px;color:var(--mt);margin-bottom:4px}
.mv{font-size:20px;font-weight:700;color:var(--v)}
.mv.gold{color:var(--d)}
.mv.blue{color:#185FA5}
.mv.red{color:var(--red)}
.mv.green{color:#1D6B3A}

/* ── CHARTS ─────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:18px 20px}
.chart-title{font-size:13px;font-weight:700;color:var(--v);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--mt);margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.chart-full{grid-column:1/-1}
.chart-wrap-tall{position:relative;height:300px}

/* ── MODAL ──────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:16px;font-weight:700;color:var(--v);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mt)}
.modal-close:hover{color:var(--red)}

/* ── RANK ───────────────────────────────────────── */
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:12px}
.rank-row:last-child{border-bottom:none}
.rank-n{width:20px;font-size:11px;font-weight:700;color:var(--mt);text-align:center}
.rank-name{flex:1;font-weight:500}
.rank-bar-bg{width:120px;height:8px;background:#eef1f0;border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px}
.rank-val{width:90px;text-align:right;font-size:11px}
.rank-pct{width:38px;text-align:right;font-size:11px;color:var(--mt)}

/* ── MISC ───────────────────────────────────────── */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ln{flex:1;font-size:13px;font-weight:500}
.lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid #eef1f0}
.lrow:last-child{border-bottom:none}
.empty{font-size:13px;color:var(--mt);padding:12px 0;text-align:center}
.toast{position:fixed;bottom:20px;right:20px;background:var(--v);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;padding:14px 16px;background:#fff;border:.5px solid var(--bd);border-radius:10px}
.search-input{border:.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;flex:1;min-width:160px}
.search-input:focus{border-color:var(--v)}
.imp{display:flex;align-items:center;gap:12px;background:var(--dl);border:1.5px dashed var(--d);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer}
.imp:hover{background:#faeec4}
.imp-icon{width:34px;height:34px;background:var(--d);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.imp-icon svg{width:18px;height:18px;fill:#fff}
.imp-text{flex:1}
.imp-title{font-size:13px;font-weight:700;color:var(--d)}
.imp-sub{font-size:11px;color:var(--mt);margin-top:2px}
.imp-status{font-size:11px;font-weight:700;color:var(--v);background:var(--vl);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
input.fhide{display:none}

/* fluxo caixa */
.fc-in{color:#1D6B3A;font-weight:700}
.fc-out{color:var(--red);font-weight:700}
.fc-saldo-pos{background:#E6F4EC;color:#1D6B3A;padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}
.fc-saldo-neg{background:var(--redl);color:var(--red);padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}

/* ── PRINT ──────────────────────────────────────── */
@media print{
  .hdr,.sidebar,.no-print,.modal-close,.dbtn,.ebtn,.print-btn,.filter-bar,.btn,.imp{display:none!important}
  .body-area{display:block}
  .main{padding:0;overflow:visible}
  body{background:#fff}
  .card{border:1px solid #ccc;border-radius:0}
  .tbl th{background:#0D5C52!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:768px){
  :root{--sb:200px}
  .metrics,.g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .chart-full{grid-column:auto}
  .main{padding:16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <svg width="44" height="38" viewBox="0 0 120 100"><g fill="#B8860B"><path d="M18 58C10 50 10 38 20 32L42 20C48 17 54 20 54 28L54 38L38 30C34 28 30 30 30 35L30 50Z"/><path d="M102 58C110 50 110 38 100 32L78 20C72 17 66 20 66 28L66 38L82 30C86 28 90 30 90 35L90 50Z"/><path d="M30 50L54 38L66 38L90 50L80 65C74 72 62 75 60 75C58 75 46 72 40 65Z"/></g></svg>
      <div><div class="login-title">PBL</div><div class="login-sub">Gestão de Comissões</div></div>
    </div>
    <div class="login-err" id="login-err">Usuário ou senha incorretos.</div>
    <div class="lf"><label>Usuário</label><input type="text" id="inp-user" placeholder="usuario" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="lf"><label>Senha</label><input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="app-wrap" style="display:none">
  <div class="hdr">
    <div class="hdr-brand">
      <svg width="36" height="30" viewBox="0 0 120 100"><g fill="#B8860B"><path d="M18 58C10 50 10 38 20 32L42 20C48 17 54 20 54 28L54 38L38 30C34 28 30 30 30 35L30 50Z"/><path d="M102 58C110 50 110 38 100 32L78 20C72 17 66 20 66 28L66 38L82 30C86 28 90 30 90 35L90 50Z"/><path d="M30 50L54 38L66 38L90 50L80 65C74 72 62 75 60 75C58 75 46 72 40 65Z"/></g></svg>
      <div><div class="hdr-title">PBL<span class="hdr-subtitle">Gestão de Comissões</span></div></div>
    </div>
    <div class="hdr-right">
      <span class="hdr-period" id="period-lbl"></span>
      <input type="month" id="mes-ref" oninput="updPeriod();saveData()"/>
      <button class="btn-calc" id="btn-calc-main" onclick="recalc()" style="display:none">⚡ Calcular</button>
      <span class="hdr-user" id="hdr-user"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="body-area">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main" id="main-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<script>
// ════════════════════════════════════════════════════════════
// USERS
// ════════════════════════════════════════════════════════════
var USERS=[
  {id:'admin',    username:'admin',     password:'pbl@2026',    role:'admin',  name:'Administrador',lawyerId:null},
  {id:'jessica',  username:'jessica',   password:'jessica123',  role:'lawyer', name:'Jessica',      lawyerId:'jessica'},
  {id:'bruno',    username:'bruno',     password:'bruno123',    role:'lawyer', name:'Bruno',        lawyerId:'bruno'},
  {id:'evelly',   username:'evelly',    password:'evelly123',   role:'lawyer', name:'Evelly',       lawyerId:'evelly'},
  {id:'luciano',  username:'luciano',   password:'luciano123',  role:'lawyer', name:'Luciano',      lawyerId:'luciano'},
  {id:'karen',    username:'karen',     password:'karen123',    role:'lawyer', name:'Karen',        lawyerId:'karen'},
  {id:'joao',     username:'joao',      password:'joao123',     role:'lawyer', name:'João',         lawyerId:'joao'},
  {id:'caio',     username:'caio',      password:'caio123',     role:'lawyer', name:'Caio',         lawyerId:'caio'},
  {id:'guilherme',username:'guilherme', password:'guilherme123',role:'lawyer', name:'Guilherme',    lawyerId:'guilherme'},
  {id:'richard',  username:'richard',   password:'richard123',  role:'lawyer', name:'Richard',      lawyerId:'richard'},
  {id:'otavio',   username:'otavio',    password:'otavio123',   role:'lawyer', name:'Otávio',       lawyerId:'otavio'},
];

var AVC=[{bg:'#E6F2F0',c:'#0D5C52'},{bg:'#FDF6E3',c:'#7a5800'},{bg:'#EEF3FB',c:'#185FA5'},{bg:'#FCEBEB',c:'#A32D2D'},{bg:'#F0EFF9',c:'#534AB7'},{bg:'#E6F4EC',c:'#1D6B3A'},{bg:'#FFF0F3',c:'#993556'},{bg:'#F4F0FF',c:'#3C3489'}];
var PC=['#0D5C52','#B8860B','#2E6DB4','#A32D2D','#534AB7','#1D6B3A','#993556','#3C3489','#854F0B','#185FA5'];

// ── STATE ──────────────────────────────────────────────────
var S={
  lawyers:[],entries:{},campanhas:[],
  mes:new Date().toISOString().slice(0,7),
  dashData:null,
  processos:[],
  // financeiro: [{id,tipo:'compra'|'venda'|'despesa',data,descricao,valor,banco,processoId,categoria,obs}]
  financeiro:[],
};
var currentUser=null;
var charts={};
var currentPage='dashboard';
var relLiqImportData=null;

// ── PERSIST ────────────────────────────────────────────────
function saveData(){try{localStorage.setItem('pbl_v4',JSON.stringify(S));}catch(e){}showToast('Salvo!');}
function loadData(){try{var r=localStorage.getItem('pbl_v4');if(r){var d=JSON.parse(r);Object.assign(S,d);if(!S.financeiro)S.financeiro=[];if(!S.processos)S.processos=[];}}catch(e){}}

// ── UTILS ──────────────────────────────────────────────────
function fmt(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){if(v>=1000000)return'R$ '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'R$ '+(v/1000).toFixed(0)+'k';return fmt(v);}
function ini(n){return(n||'?').trim().split(' ').slice(0,2).map(function(x){return x[0].toUpperCase();}).join('');}
function avSt(i){var c=AVC[i%AVC.length];return'background:'+c.bg+';color:'+c.c+';';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
function normAdv(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function readXlsx(file,cb){var r=new FileReader();r.onload=function(e){var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});var ws=wb.Sheets[wb.SheetNames[0]];cb(XLSX.utils.sheet_to_json(ws,{defval:''}));};r.readAsArrayBuffer(file);}
function fmtDate(d){if(!d)return'—';var dt=new Date(d+'T00:00:00');if(isNaN(dt))return d;return dt.toLocaleDateString('pt-BR');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function showModal(html){document.getElementById('modal-root').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';}
function updPeriod(){var m=document.getElementById('mes-ref').value;if(!m)return;S.mes=m;var d=new Date(m+'-02');document.getElementById('period-lbl').textContent=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});}

// ── LOGIN ──────────────────────────────────────────────────
function doLogin(){
  var u=document.getElementById('inp-user').value.trim().toLowerCase();
  var p=document.getElementById('inp-pass').value;
  var user=USERS.find(function(x){return x.username===u&&x.password===p;});
  if(!user){document.getElementById('login-err').style.display='block';return;}
  currentUser=user;
  document.getElementById('login-err').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  loadData();initApp();
}
function doLogout(){currentUser=null;document.getElementById('app-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('inp-user').value='';document.getElementById('inp-pass').value='';}

// ── INIT ───────────────────────────────────────────────────
function initApp(){
  document.getElementById('mes-ref').value=S.mes;updPeriod();
  var badge=currentUser.role==='admin'?'<span class="admin-badge">Admin</span>':'';
  document.getElementById('hdr-user').innerHTML=currentUser.name+badge;
  document.getElementById('btn-calc-main').style.display=currentUser.role==='admin'?'':'none';
  buildSidebar();navigate('dashboard');
}

  var mc=document.getElementById('main-content');

    case 'dashboard':   mc.innerHTML=pageDashboard();afterDash();break;

    case 'financeiro':  mc.innerHTML=pageFinanceiro();break;

    case 'campanhas':   mc.innerHTML=pageCampanhas();break;

    case 'resumo':      mc.innerHTML=pageResumo();break;

}

function afterDash(){updPeriod();var d=S.dashData||buildDashData();if(d&&d.length)renderDashCharts(d);}
function buildDashData(){
  return S.processos.filter(function(p){return p.recebimentos&&p.recebimentos.length;}).map(function(p){
    var val=p.recebimentos.reduce(function(s,r){return s+(r.valor||0);},0);
    var adv=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'?'}).name;
    return{adv:normAdv(adv),val:val,tipo:p.status==='liquidado_parcial'?'Parcial':'Total'};
  });
}
function importDashboard(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      var keys=rows.length>0?Object.keys(rows[0]):[];
      var data=[],byAdv={},relData=[];
      rows.forEach(function(r){
        var getCol=function(subs){var v='';keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=String(r[k]||'').trim();});});return v;};
        var getNum=function(subs){var v=0;keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=parseFloat(r[k])||0;});});return v;};
        var adv=getCol(['ADVOGADO']).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        var val=getNum(['VALOR']);
        var liq=getCol(['LIQUIDACAO','LIQUIDAAO','LIQUIDAC','LIQUID']);
        var proc=getCol(['PROCESSO']);
        var datRaw=getCol(['DATA']);
        var dat='';if(datRaw){try{var dd=new Date(datRaw);if(!isNaN(dd))dat=dd.toISOString().slice(0,10);}catch(ex){}}
        if(!adv||adv==='ADVOGADO')return;
        var tipo=liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total';
        data.push({adv:adv,val:val,tipo:tipo});
        relData.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat});
        if(!byAdv[adv])byAdv[adv]=[];
        byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      });
      S.dashData=data;
      relLiqImportData=relData;
      var matched=0;
      S.lawyers.forEach(function(l){
        var key=l.name.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        var fn2=key.split(' ')[0];
        var foundKey=Object.keys(byAdv).find(function(k){return k===key||k===fn2||fn2===k||fn2.startsWith(k.split(' ')[0])||k.startsWith(fn2);});
        if(foundKey){
          if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
          S.entries[l.id].processos=byAdv[foundKey];
          S.entries[l.id].volLiquidado=byAdv[foundKey].reduce(function(s,p){return s+p.valor;},0);
          matched++;
        }
      });
      var el=document.getElementById('dash-status');
      if(el)el.textContent=data.length+' proc · '+matched+' adv';
      saveData();renderDashCharts(data);
      showToast(data.length+' processos carregados em todo o sistema!');
    }catch(err){alert('Erro ao ler arquivo: '+err.message);console.error(err);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function renderDashCharts(data){
  if(!data||!data.length){data=buildDashData();if(!data.length)return;}
  var total=data.reduce(function(s,r){return s+r.val;},0);
  var totLiq=data.filter(function(r){return r.tipo==='Total';});
  var parLiq=data.filter(function(r){return r.tipo==='Parcial';});
  var valTot=totLiq.reduce(function(s,r){return s+r.val;},0);
  var valPar=parLiq.reduce(function(s,r){return s+r.val;},0);
  var prevTotal=S.processos.filter(function(p){return p.status==='pendente';}).reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var prevQtd=S.processos.filter(function(p){return p.status==='pendente';}).length;
  function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  set('kpi-total',fmt(total));set('kpi-proc',data.length+' processos');
  set('kpi-tot-val',fmt(valTot));set('kpi-tot-qtd',totLiq.length+' processos');
  set('kpi-par-val',fmt(valPar));set('kpi-par-qtd',parLiq.length+' processos');
  set('kpi-prev',fmt(prevTotal));set('kpi-prev-qtd',prevQtd+' processos');
  var advMap={};
  data.forEach(function(r){if(!advMap[r.adv])advMap[r.adv]={tot:0,par:0,qtdTot:0,qtdPar:0};if(r.tipo==='Total'){advMap[r.adv].tot+=r.val;advMap[r.adv].qtdTot++;}else{advMap[r.adv].par+=r.val;advMap[r.adv].qtdPar++;}});
  var advArr=Object.keys(advMap).map(function(k){return{name:k,tot:advMap[k].tot,par:advMap[k].par,qtdTot:advMap[k].qtdTot,qtdPar:advMap[k].qtdPar,total:advMap[k].tot+advMap[k].par};});
  advArr.sort(function(a,b){return b.total-a.total;});
  var labels=advArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();});
  function mkChart(id,type,d2,opts){var el=document.getElementById(id);if(!el)return;if(charts[id]){charts[id].destroy();delete charts[id];}charts[id]=new Chart(el,{type:type,data:d2,options:opts});}
  var pieOpts=function(ttFn){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ttFn}}}};};
  mkChart('chart-tipo-val','doughnut',{labels:['Total','Parcial'],datasets:[{data:[valTot,valPar],backgroundColor:['#0D5C52','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+fmt(c.parsed)+' ('+((total?c.parsed/total:0)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-tipo-qtd','doughnut',{labels:['Total','Parcial'],datasets:[{data:[totLiq.length,parLiq.length],backgroundColor:['#0D5C52','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.parsed+' processos ('+((data.length?c.parsed/data.length:0)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-adv-bar','bar',{labels:labels,datasets:[{label:'Liq. Total',data:advArr.map(function(x){return x.tot;}),backgroundColor:'#0D5C52',borderRadius:3,borderSkipped:false},{label:'Liq. Parcial',data:advArr.map(function(x){return x.par;}),backgroundColor:'#B8860B',borderRadius:3,borderSkipped:false}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},padding:14,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.dataset.label+': '+fmt(c.parsed.y);}}}},scales:{x:{stacked:true,ticks:{font:{size:11},color:'#5e7572'},grid:{display:false}},y:{stacked:true,ticks:{callback:function(v){return fmtK(v);},font:{size:11},color:'#5e7572'},grid:{color:'#eef1f0'}}}});
  var parArr=advArr.filter(function(x){return x.par>0;});
  mkChart('chart-pie-tot','doughnut',{labels:labels,datasets:[{data:advArr.map(function(x){return x.tot;}),backgroundColor:PC.slice(0,advArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valTot?(c.parsed/valTot*100).toFixed(1):0)+'%)';}));
  mkChart('chart-pie-par','doughnut',{labels:parArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();}),datasets:[{data:parArr.map(function(x){return x.par;}),backgroundColor:PC.slice(0,parArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valPar?(c.parsed/valPar*100).toFixed(1):0)+'%)';}));
  var maxV=advArr[0]?advArr[0].total:1;
  var rrows=advArr.map(function(x,i){
    var pct=(total?x.total/total*100:0).toFixed(1);
    return'<div class="rank-row"><div class="rank-n">'+(i+1)+'</div>'+
    '<div class="rank-name">'+x.name.charAt(0)+x.name.slice(1).toLowerCase()+' <span class="badge b-tot">'+x.qtdTot+'T</span><span class="badge b-par" style="margin-left:3px">'+x.qtdPar+'P</span></div>'+
    '<div class="rank-bar-bg"><div class="rank-bar-fill" style="width:'+(x.total/maxV*100).toFixed(0)+'%;background:'+PC[i%PC.length]+'"></div></div>'+
    '<div class="rank-val">'+fmt(x.total)+'</div><div class="rank-pct">'+pct+'%</div>'+
    '<div class="rank-val" style="color:#0D5C52">'+fmt(x.tot)+'</div>'+
    '<div class="rank-val" style="color:#B8860B">'+fmt(x.par)+'</div></div>';
  }).join('');
  var el=document.getElementById('dash-ranking');
  if(el)el.innerHTML='<div class="rank-row" style="border-bottom:1.5px solid var(--v);padding-bottom:6px;font-size:10px;font-weight:700;color:var(--mt)"><div style="width:20px"></div><div style="flex:1">Advogado</div><div style="width:100px"></div><div style="width:90px;text-align:right">Total</div><div style="width:38px;text-align:right">%</div><div style="width:90px;text-align:right;color:#0D5C52">Liq.Total</div><div style="width:90px;text-align:right;color:#B8860B">Liq.Parcial</div></div>'+rrows;
}

function filterProc(){
  var q=(document.getElementById('proc-search').value||'').toLowerCase();
  var st=document.getElementById('proc-st').value;
  var adv=document.getElementById('proc-adv').value;
  var rows=S.processos.filter(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||''}).name;
    return(!q||(p.numero||'').toLowerCase().includes(q)||(p.cliente||'').toLowerCase().includes(q)||an.toLowerCase().includes(q))&&
           (st==='todos'||p.status===st)&&(adv==='todos'||p.advogadoId===adv);
  }).map(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var rec=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);
    var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':p.status==='liquidado_parcial'?'<span class="badge b-par">Parcial</span>':'<span class="badge b-pend">Pendente</span>';
    return'<tr><td style="font-size:11px">'+p.numero+'</td><td>'+p.cliente+'</td><td>'+an+'</td><td>'+sb+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+fmt(rec)+'</td><td>'+fmtDate(p.dataCompra)+'</td><td style="white-space:nowrap"><button class="ebtn" onclick="modalRecebimentos(\''+p.id+'\')">💰</button><button class="ebtn" onclick="modalEditProc(\''+p.id+'\')">✏️</button><button class="dbtn" onclick="deleteProc(\''+p.id+'\')">×</button></td></tr>';
  }).join('');
  document.getElementById('proc-tbody').innerHTML=rows||'<tr><td colspan="9" class="empty">Nenhum resultado.</td></tr>';
}
function getAdvOpts(sel){return S.lawyers.map(function(l){return'<option value="'+l.id+'"'+(sel===l.id?' selected':'')+'>'+l.name+'</option>';}).join('');}
function modalNovoProc(){
  showModal('<button class="modal-close" onclick="closeModal()">×</button><div class="modal-title">Novo Processo</div>'+

  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Advogado *</label><select id="m-adv"><option value="">Selecione...</option>'+getAdvOpts('')+'</select></div><div class="fg"><label>Atendente</label><input type="text" id="m-ate"/></div><div class="fg"><label>Réu</label><input type="text" id="m-reu"/></div></div>'+
  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Matéria</label><input type="text" id="m-mat" placeholder="Ex: RPV"/></div><div class="fg"><label>Foro</label><input type="text" id="m-foro"/></div><div class="fg"><label>Comarca</label><input type="text" id="m-com"/></div></div>'+
  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Vara</label><input type="text" id="m-var"/></div><div class="fg"><label>Estado</label><input type="text" id="m-est"/></div><div class="fg"><label>Data Compra</label><input type="date" id="m-datc" value="'+todayStr()+'"/></div></div>'+
  '<div class="g4" style="margin-bottom:14px"><div class="fg"><label>Vl. Condenação</label><input type="number" id="m-vcond" min="0" step="0.01" placeholder="0,00"/></div><div class="fg"><label>Vl. Cliente</label><input type="number" id="m-vcli" min="0" step="0.01" placeholder="0,00"/></div><div class="fg"><label>% Compra</label><input type="number" id="m-pcomp" min="0" max="100" step="0.01" placeholder="0,00" oninput="calcVComp()"/></div><div class="fg"><label>Vl. Compra</label><input type="number" id="m-vcomp" min="0" step="0.01" placeholder="0,00"/></div></div>'+

}
function calcVComp(){var vcli=parseFloat(document.getElementById('m-vcli').value)||0;var pct=parseFloat(document.getElementById('m-pcomp').value)||0;if(vcli&&pct)document.getElementById('m-vcomp').value=(vcli*pct/100).toFixed(2);}
function salvarProc(id){
  var num=document.getElementById('m-num').value.trim(),cli=document.getElementById('m-cli').value.trim(),adv=document.getElementById('m-adv').value;
  if(!num||!cli||!adv){alert('Preencha N° Processo, Cliente e Advogado.');return;}
  var proc={id:id||uid(),numero:num,cliente:cli,advogadoId:adv,atendente:document.getElementById('m-ate').value.trim(),reu:document.getElementById('m-reu').value.trim(),materia:document.getElementById('m-mat').value.trim(),foro:document.getElementById('m-foro').value.trim(),comarca:document.getElementById('m-com').value.trim(),vara:document.getElementById('m-var').value.trim(),estado:document.getElementById('m-est').value.trim(),dataCompra:document.getElementById('m-datc').value,valorCondenacao:parseFloat(document.getElementById('m-vcond').value)||0,valorCliente:parseFloat(document.getElementById('m-vcli').value)||0,percCompra:parseFloat(document.getElementById('m-pcomp').value)||0,valorCompra:parseFloat(document.getElementById('m-vcomp').value)||0,status:'pendente',recebimentos:[]};
  if(id){var idx=S.processos.findIndex(function(p){return p.id===id;});if(idx>=0){proc.status=S.processos[idx].status;proc.recebimentos=S.processos[idx].recebimentos;S.processos[idx]=proc;}}else{S.processos.push(proc);}
  closeModal();saveData();navigate('processos');
}
function modalEditProc(id){

  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Vara</label><input type="text" id="m-var" value="'+esc(p.vara)+'"/></div><div class="fg"><label>Estado</label><input type="text" id="m-est" value="'+esc(p.estado)+'"/></div><div class="fg"><label>Data Compra</label><input type="date" id="m-datc" value="'+(p.dataCompra||'')+'"/></div></div>'+
  '<div class="g4" style="margin-bottom:14px"><div class="fg"><label>Vl. Condenação</label><input type="number" id="m-vcond" value="'+(p.valorCondenacao||'')+'" step="0.01"/></div><div class="fg"><label>Vl. Cliente</label><input type="number" id="m-vcli" value="'+(p.valorCliente||'')+'" step="0.01"/></div><div class="fg"><label>% Compra</label><input type="number" id="m-pcomp" value="'+(p.percCompra||'')+'" step="0.01" oninput="calcVComp()"/></div><div class="fg"><label>Vl. Compra</label><input type="number" id="m-vcomp" value="'+(p.valorCompra||'')+'" step="0.01"/></div></div>'+

}
function esc(s){return String(s||'').replace(/"/g,'&quot;');}
function deleteProc(id){if(!confirm('Excluir processo?'))return;S.processos=S.processos.filter(function(p){return p.id!==id;});saveData();navigate('processos');}
function modalRecebimentos(procId){var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;renderModalRec(p);}
function renderModalRec(p){
  var recs=p.recebimentos||[];
  var totalRec=recs.reduce(function(s,r){return s+(r.valor||0);},0);
  var fat=totalRec-(p.valorCompra||0);
  var rrows=recs.map(function(r){return'<tr><td>'+fmtDate(r.data)+'</td><td>'+r.banco+'</td><td class="r">'+fmt(r.valor)+'</td><td class="r">'+(r.valorDevolucao?fmt(r.valorDevolucao):'—')+'</td><td><button class="dbtn" onclick="deleteRec(\''+p.id+'\',\''+r.id+'\')">×</button></td></tr>';}).join('');
  var stOpts=['pendente','liquidado_total','liquidado_parcial'].map(function(s){return'<option value="'+s+'"'+(p.status===s?' selected':'')+'>'+{pendente:'Pendente',liquidado_total:'Liquidado Total',liquidado_parcial:'Liquidado Parcial'}[s]+'</option>';}).join('');
  showModal('<button class="modal-close" onclick="closeModal()">×</button><div class="modal-title">Recebimentos — '+esc(p.numero)+'</div>'+
  '<div style="background:var(--vl);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px"><div style="font-weight:600;margin-bottom:4px">'+esc(p.cliente)+'</div>'+
  '<div style="display:flex;gap:20px;flex-wrap:wrap"><span>Vl. Condenação: <strong>'+fmt(p.valorCondenacao)+'</strong></span><span>Vl. Compra: <strong>'+fmt(p.valorCompra)+'</strong></span><span>Total Recebido: <strong>'+fmt(totalRec)+'</strong></span><span>Faturamento: <strong style="color:'+(fat>=0?'#1D6B3A':'#A32D2D')+'">'+fmt(fat)+'</strong></span></div></div>'+
  '<div class="fg" style="max-width:220px;margin-bottom:16px"><label>Status</label><select id="proc-status-sel" onchange="updateProcStatus(\''+p.id+'\',this.value)">'+stOpts+'</select></div>'+
  '<div class="st" style="margin-top:0">Novo recebimento</div>'+
  '<div class="g4" style="margin-bottom:12px"><div class="fg"><label>Data *</label><input type="date" id="rec-data" value="'+todayStr()+'"/></div><div class="fg"><label>Banco *</label><input type="text" id="rec-banco" placeholder="Ex: Banco Genial"/></div><div class="fg"><label>Valor (R$) *</label><input type="number" id="rec-valor" min="0" step="0.01"/></div><div class="fg"><label>Vl. Devolução</label><input type="number" id="rec-dev" min="0" step="0.01"/></div></div>'+
  '<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn bp" onclick="addRec(\''+p.id+'\')">+ Adicionar Recebimento</button></div>'+
  '<table class="tbl"><thead><tr><th>Data</th><th>Banco</th><th class="r">Valor</th><th class="r">Vl. Devolução</th><th>Ação</th></tr></thead>'+
  '<tbody>'+(rrows||'<tr><td colspan="5" class="empty">Nenhum recebimento.</td></tr>')+'</tbody></table>'+
  '<div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn" onclick="closeModal()">Fechar</button></div>');
}
function updateProcStatus(id,status){var p=S.processos.find(function(x){return x.id===id;});if(p){p.status=status;saveData();}}
function addRec(procId){
  var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;
  var data=document.getElementById('rec-data').value,banco=document.getElementById('rec-banco').value.trim(),valor=parseFloat(document.getElementById('rec-valor').value)||0,dev=parseFloat(document.getElementById('rec-dev').value)||0;
  if(!data||!banco||!valor){alert('Preencha Data, Banco e Valor.');return;}
  if(!p.recebimentos)p.recebimentos=[];
  p.recebimentos.push({id:uid(),data:data,banco:banco,valor:valor,valorDevolucao:dev||null});
  saveData();renderModalRec(p);
}
function deleteRec(procId,recId){var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;p.recebimentos=p.recebimentos.filter(function(r){return r.id!==recId;});saveData();renderModalRec(p);}

function finTipoChange(){
  var t=document.getElementById('fin-tipo');if(!t)return;
  var fg=document.getElementById('fin-proc-fg');
  if(fg)fg.style.display=t.value==='despesa'?'none':'flex';
}
function addFin(){
  var tipo=document.getElementById('fin-tipo').value;
  var data=document.getElementById('fin-data').value;
  var valor=parseFloat(document.getElementById('fin-valor').value)||0;
  var banco=(document.getElementById('fin-banco').value||'').trim();
  var desc=(document.getElementById('fin-desc').value||'').trim();
  var proc=document.getElementById('fin-proc')?document.getElementById('fin-proc').value:'';
  var cat=(document.getElementById('fin-cat').value||'').trim();
  var obs=(document.getElementById('fin-obs').value||'').trim();
  if(!data||!valor||!desc){alert('Preencha Data, Valor e Descrição.');return;}
  S.financeiro.push({id:uid(),tipo:tipo,data:data,valor:valor,banco:banco,descricao:desc,processoId:proc,categoria:cat,obs:obs});
  saveData();navigate('financeiro');
}
function deleteFin(id){if(!confirm('Excluir lançamento?'))return;S.financeiro=S.financeiro.filter(function(f){return f.id!==id;});saveData();navigate('financeiro');}
function filterFin(){
  var tipo=document.getElementById('fin-tf').value;
  var di=document.getElementById('fin-di').value;
  var df=document.getElementById('fin-df').value;
  var q=(document.getElementById('fin-q').value||'').toLowerCase();
  var rows=S.financeiro.filter(function(f){
    return(tipo==='todos'||f.tipo===tipo)&&(!di||f.data>=di)&&(!df||f.data<=df)&&(!q||(f.descricao||'').toLowerCase().includes(q)||(f.obs||'').toLowerCase().includes(q));
  }).slice().sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(f){
    var proc=f.processoId?(S.processos.find(function(p){return p.id===f.processoId;})||{numero:'—'}).numero:'—';
    var tb=f.tipo==='compra'?'<span class="badge b-compra">Compra PBL</span>':f.tipo==='venda'?'<span class="badge b-venda">Venda FIDC</span>':'<span class="badge b-desp">Despesa</span>';
    var cor=f.tipo==='venda'?'#1D6B3A':'var(--red)';
    return'<tr><td>'+fmtDate(f.data)+'</td><td>'+tb+'</td><td>'+esc(f.descricao)+'</td><td style="font-size:11px">'+proc+'</td><td>'+esc(f.banco||'')+'</td><td>'+esc(f.categoria||'')+'</td><td class="r" style="color:'+cor+'"><strong>'+fmt(f.valor)+'</strong></td><td style="font-size:11px;color:var(--mt)">'+esc(f.obs||'')+'</td><td><button class="dbtn" onclick="deleteFin(\''+f.id+'\')">×</button></td></tr>';
  }).join('');
  document.getElementById('fin-tbody').innerHTML=rows||'<tr><td colspan="9" class="empty">Nenhum resultado.</td></tr>';
}

function pageFluxoCaixa(){
  // agrupar por mês
  var byMes={};
  S.financeiro.forEach(function(f){
    if(!f.data)return;
    var mes=f.data.slice(0,7);
    if(!byMes[mes])byMes[mes]={entradas:0,saidas:0,items:[]};
    if(f.tipo==='venda')byMes[mes].entradas+=f.valor||0;
    else byMes[mes].saidas+=f.valor||0;
    byMes[mes].items.push(f);
  });
  var meses=Object.keys(byMes).sort().reverse();
  var tEntradas=meses.reduce(function(s,m){return s+byMes[m].entradas;},0);
  var tSaidas=meses.reduce(function(s,m){return s+byMes[m].saidas;},0);
  var tSaldo=tEntradas-tSaidas;
  var rows=meses.map(function(m){
    var mb=byMes[m];var saldo=mb.entradas-mb.saidas;
    var dt=new Date(m+'-02');var label=dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    return'<tr>'+
      '<td style="font-weight:600">'+label+'</td>'+
      '<td class="r fc-in">'+fmt(mb.entradas)+'</td>'+
      '<td class="r fc-out">'+fmt(mb.saidas)+'</td>'+
      '<td class="r"><span class="'+(saldo>=0?'fc-saldo-pos':'fc-saldo-neg')+'">'+fmt(saldo)+'</span></td>'+
      '<td><button class="btn bsm" onclick="detalharMes(\''+m+'\')">Ver detalhes</button></td>'+
    '</tr>';
  }).join('');

  return'<div class="page-title">'+I.fluxo+' Fluxo de Caixa</div>'+
  '<div class="metrics">'+
    '<div class="mc green"><div class="ml">Total Entradas (Vendas FIDC)</div><div class="mv green">'+fmt(tEntradas)+'</div></div>'+
    '<div class="mc red"><div class="ml">Total Saídas (Compras + Desp.)</div><div class="mv red">'+fmt(tSaidas)+'</div></div>'+
    '<div class="mc '+(tSaldo>=0?'':'red')+'"><div class="ml">Saldo Acumulado</div><div class="mv '+(tSaldo>=0?'':'red')+'">'+fmt(tSaldo)+'</div></div>'+
    '<div class="mc blue"><div class="ml">Períodos registrados</div><div class="mv blue">'+meses.length+'</div></div>'+
  '</div>'+
  (meses.length?
  '<div class="card" style="padding:0;overflow-x:auto">'+
    '<table class="tbl"><thead><tr><th>Período</th><th class="r">Entradas (Vendas FIDC)</th><th class="r">Saídas (Compras + Despesas)</th><th class="r">Saldo</th><th>Detalhe</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot><tr class="foot"><td>Total</td><td class="r">'+fmt(tEntradas)+'</td><td class="r">'+fmt(tSaidas)+'</td><td class="r">'+fmt(tSaldo)+'</td><td></td></tr></tfoot>'+
  '</table></div>'+
  '<div id="fc-detalhe"></div>'
  :'<div class="card"><div class="empty">Nenhum lançamento registrado ainda. Acesse Financeiro para registrar compras, vendas e despesas.</div></div>');
}
function detalharMes(mes){
  var items=S.financeiro.filter(function(f){return f.data&&f.data.startsWith(mes);}).sort(function(a,b){return(a.data||'').localeCompare(b.data||'');});
  var dt=new Date(mes+'-02');var label=dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

    var tb=f.tipo==='compra'?'<span class="badge b-compra">Compra PBL</span>':f.tipo==='venda'?'<span class="badge b-venda">Venda FIDC</span>':'<span class="badge b-desp">Despesa</span>';

    return'<tr><td>'+fmtDate(f.data)+'</td><td>'+tb+'</td><td>'+esc(f.descricao)+'</td><td>'+esc(f.banco||'')+'</td><td class="r" style="color:'+cor+'">'+fmt(f.valor)+'</td><td style="font-size:11px">'+esc(f.obs||'')+'</td></tr>';

}

function addLawyer(){var n=(document.getElementById('nn').value||'').trim(),p=parseFloat(document.getElementById('np').value)||0;if(!n){alert('Informe o nome.');return;}var id=n.toLowerCase().replace(/\s+/g,'-').normalize('NFD').replace(/[\u0300-\u036f]/g,'');S.lawyers.push({id:id,name:n,prolabore:p});document.getElementById('nn').value='';document.getElementById('np').value='';saveData();navigate('operacional');}
function removeLawyer(id){if(!confirm('Remover?'))return;S.lawyers=S.lawyers.filter(function(l){return l.id!==id;});delete S.entries[id];saveData();navigate('operacional');}
function importLiqGeral(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    var keys=rows.length>0?Object.keys(rows[0]):[];
    var byAdv={},dashArr=[],relArr=[];
    rows.forEach(function(r){
      var getCol=function(subs){var v='';keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=String(r[k]||'').trim();});});return v;};
      var getNum=function(subs){var v=0;keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=parseFloat(r[k])||0;});});return v;};
      var adv=getCol(['ADVOGADO']).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      var val=getNum(['VALOR']);
      var liq=getCol(['LIQUIDACAO','LIQUIDAAO','LIQUID']);
      var proc=getCol(['PROCESSO']);
      var datRaw=getCol(['DATA']);var dat='';
      if(datRaw){try{var dd=new Date(datRaw);if(!isNaN(dd))dat=dd.toISOString().slice(0,10);}catch(ex){}}
      if(!adv||adv==='ADVOGADO')return;
      var tipo=liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total';
      if(!byAdv[adv])byAdv[adv]=[];
      byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      dashArr.push({adv:adv,val:val,tipo:tipo});
      relArr.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat});
    });
    var matched=0,total=0;
    S.lawyers.forEach(function(l){
      var key=l.name.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      var fn2=key.split(' ')[0];
      var foundKey=Object.keys(byAdv).find(function(k){return k===key||fn2===k||fn2.startsWith(k.split(' ')[0])||k.startsWith(fn2);});
      if(foundKey){
        if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
        S.entries[l.id].processos=byAdv[foundKey];
        S.entries[l.id].volLiquidado=byAdv[foundKey].reduce(function(s,p){return s+p.valor;},0);
        matched++;total+=byAdv[foundKey].length;
      }
    });
    S.dashData=dashArr;relLiqImportData=relArr;
    var el=document.getElementById('s-liq');if(el)el.textContent=total+' proc · '+matched+' adv';
    saveData();showToast(total+' processos para '+matched+' advogados!');input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function importValGeral(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var byAdv={};rows.forEach(function(r){var adv=normAdv(r['ADVOGADO']||r[2]||'');var obs=String(r['OBS']||r[3]||'').toUpperCase();if(!adv||adv==='ADVOGADO')return;if(!byAdv[adv])byAdv[adv]={pv:0,cv:0};if(obs.includes('VALIDADO')&&!obs.includes('NAO APROVADO')&&!obs.includes('NÃO APROVADO')&&!obs.includes('FALTA CONTRATO')){if(obs.includes('CONTRATO'))byAdv[adv].cv++;else byAdv[adv].pv++;}});var matched=0;S.lawyers.forEach(function(l){var key=normAdv(l.name);var fn=key.split(' ')[0];var found=byAdv[key]||byAdv[Object.keys(byAdv).find(function(k){return k.startsWith(fn);})||''];if(found){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].procValid=found.pv;S.entries[l.id].contValid=found.cv;matched++;}});var el=document.getElementById('s-val');if(el)el.textContent=matched+' adv';saveData();input.value='';showToast('Validações importadas!');});}
function importDilGeral(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var byInit={};rows.forEach(function(r){var contrato=String(r['CONTRATO']||'').trim().toUpperCase();var val2=String(r['VAL.']||r['VAL']||'').trim().toUpperCase();var valor=parseFloat(r['VALOR']||0)||0;if(contrato!=='PAGO'||!val2)return;if(!byInit[val2])byInit[val2]={qtd:0,vol:0};byInit[val2].qtd++;byInit[val2].vol+=valor;});var matched=0;S.lawyers.forEach(function(l){var initials=l.name.trim().split(' ').slice(0,2).map(function(x){return x[0].toUpperCase();}).join('');if(byInit[initials]){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].capaCapa=byInit[initials].qtd;S.entries[l.id].volEntradas=byInit[initials].vol;matched++;}});var el=document.getElementById('s-dil');if(el)el.textContent=matched+' adv';saveData();input.value='';showToast('Diligências importadas!');});}
function saveManual(){var lid=document.getElementById('sel-man').value;if(!lid){showToast('Selecione um advogado.');return;}if(!S.entries[lid])S.entries[lid]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};var g=function(id){return document.getElementById(id).value;};if(g('man-pv')!=='')S.entries[lid].procValid=parseInt(g('man-pv'))||0;if(g('man-cv')!=='')S.entries[lid].contValid=parseInt(g('man-cv'))||0;if(g('man-capa')!=='')S.entries[lid].capaCapa=parseInt(g('man-capa'))||0;if(g('man-au')!=='')S.entries[lid].auditoria=parseInt(g('man-au'))||0;if(g('man-ve')!=='')S.entries[lid].volEntradas=parseFloat(g('man-ve'))||0;if(g('man-vl')!=='')S.entries[lid].volLiquidado=parseFloat(g('man-vl'))||0;saveData();showToast('Ajuste salvo!');}

// ════════════════════════════════════════════════════════════
function calc(lid){
  var l=S.lawyers.find(function(x){return x.id===lid;});if(!l)return null;
  var e=S.entries[lid]||{processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
  var cP=(e.processos||[]).reduce(function(s,p){return s+(p.valor<10000?50:100);},0);
  var cPV=(e.procValid||0)*5,cCV=(e.contValid||0)*2,cCapa=(e.capaCapa||0)*10,cAud=(e.auditoria||0)*10;
  var ve=e.volEntradas||0,cEnt=ve>=500000?Math.floor(ve/100000)*100:0;
  var vl=e.volLiquidado||0,cLiq=vl>=600000?Math.floor(vl/100000)*100:0;
  var cCamp=S.campanhas.reduce(function(s,c){return s+(c.lawyer==='todos'||c.lawyer===lid?c.valor:0);},0);
  var total=l.prolabore+cP+cPV+cCV+cCapa+cAud+cEnt+cLiq+cCamp;
  return{lawyer:l,entry:e,cP:cP,cPV:cPV,cCV:cCV,cCapa:cCapa,cAud:cAud,cEnt:cEnt,cLiq:cLiq,cCamp:cCamp,total:total};
}

function showDetail(lid){

  var items=[{l:'Pró-labore fixo',v:c.lawyer.prolabore},{l:'Processos liquidados ('+(e.processos||[]).length+')',v:c.cP},{l:'Processos validados ('+(e.procValid||0)+')',v:c.cPV},{l:'Contratos validados ('+(e.contValid||0)+')',v:c.cCV},{l:'Capa a capa ('+(e.capaCapa||0)+')',v:c.cCapa},{l:'Auditoria ('+(e.auditoria||0)+')',v:c.cAud},{l:'Bônus entradas',v:c.cEnt},{l:'Bônus liquidação',v:c.cLiq},{l:'Campanhas',v:c.cCamp}];

function importRelLiq(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var data=[];rows.forEach(function(r){var adv=normAdv(r['ADVOGADO']||r['Advogado']||'');var val=parseFloat(r['VALOR']||r['Valor']||0)||0;var liq=String(r['LIQUIDAÇÃO']||r['Liquidação']||r['LIQUIDACAO']||'').trim();var proc=String(r['PROCESSOS']||r['Processo']||'').trim();var datRaw=r['DATA']||r['Data']||'';var dat='';if(datRaw){try{var d=new Date(datRaw);if(!isNaN(d))dat=d.toISOString().slice(0,10);}catch(e){}}if(!adv||adv==='ADVOGADO')return;data.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total',data:dat});});relLiqImportData=data;var el=document.getElementById('rel-liq-status');if(el)el.textContent=data.length+' processos';showToast(data.length+' processos importados!');input.value='';});}
function renderRelLiq(){
  var tipo=document.getElementById('liq-tipo').value;
  var advFiltId=document.getElementById('liq-adv').value;
  var dtIni=document.getElementById('liq-di').value;
  var dtFim=document.getElementById('liq-df').value;
  var usandoImport=relLiqImportData&&relLiqImportData.length>0&&(tipo==='todos'||tipo==='Total'||tipo==='Parcial');
  var html='';
  if(usandoImport){
    var fi=relLiqImportData.filter(function(r){if(tipo!=='todos'&&r.tipo!==tipo)return false;if(advFiltId!=='todos'){var l=S.lawyers.find(function(x){return x.id===advFiltId;});if(l){var fn=normAdv(l.name).split(' ')[0];if(!r.adv.startsWith(fn))return false;}}if(dtIni&&r.data&&r.data<dtIni)return false;if(dtFim&&r.data&&r.data>dtFim)return false;return true;});
    if(fi.length){var tv=fi.reduce(function(s,r){return s+r.val;},0),tt=fi.filter(function(r){return r.tipo==='Total';}).reduce(function(s,r){return s+r.val;},0),tp=fi.filter(function(r){return r.tipo==='Parcial';}).reduce(function(s,r){return s+r.val;},0),qt=fi.filter(function(r){return r.tipo==='Total';}).length,qp=fi.filter(function(r){return r.tipo==='Parcial';}).length;
    var byA={};fi.forEach(function(r){if(!byA[r.adv])byA[r.adv]={nome:r.advNome,tot:0,par:0,qt:0,qp:0};if(r.tipo==='Total'){byA[r.adv].tot+=r.val;byA[r.adv].qt++;}else{byA[r.adv].par+=r.val;byA[r.adv].qp++;}});
    var ar=Object.keys(byA).sort().map(function(k){var a=byA[k];var t=a.tot+a.par;var pct=(tv?t/tv*100:0).toFixed(1);return'<tr><td>'+a.nome+'</td><td class="r">'+a.qt+'</td><td class="r">'+fmt(a.tot)+'</td><td class="r">'+a.qp+'</td><td class="r">'+fmt(a.par)+'</td><td class="r"><strong>'+fmt(t)+'</strong></td><td class="r">'+pct+'%</td></tr>';}).join('');
    var pr=fi.map(function(r){var sb=r.tipo==='Total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';return'<tr><td>'+r.advNome+'</td><td style="font-size:10px">'+r.proc+'</td><td>'+sb+'</td><td class="r">'+fmt(r.val)+'</td><td>'+fmtDate(r.data)+'</td></tr>';}).join('');
    html+='<div class="metrics" style="margin-bottom:16px"><div class="mc"><div class="ml">Total processos</div><div class="mv">'+fi.length+'</div></div><div class="mc gold"><div class="ml">Total liquidado</div><div class="mv gold">'+fmt(tv)+'</div></div><div class="mc"><div class="ml">Liq. Total ('+qt+')</div><div class="mv">'+fmt(tt)+'</div></div><div class="mc blue"><div class="ml">Liq. Parcial ('+qp+')</div><div class="mv blue">'+fmt(tp)+'</div></div></div>'+
    '<div class="st">Resumo por advogado</div><div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px"><table class="tbl"><thead><tr><th>Advogado</th><th class="r">Qt Total</th><th class="r">Vl Total</th><th class="r">Qt Parcial</th><th class="r">Vl Parcial</th><th class="r">Total</th><th class="r">%</th></tr></thead><tbody>'+ar+'</tbody><tfoot><tr class="foot"><td>TOTAL</td><td class="r">'+qt+'</td><td class="r">'+fmt(tt)+'</td><td class="r">'+qp+'</td><td class="r">'+fmt(tp)+'</td><td class="r">'+fmt(tv)+'</td><td class="r">100%</td></tr></tfoot></table></div>'+
    '<div class="st">Detalhe por processo</div><div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Advogado</th><th>N° Processo</th><th>Tipo</th><th class="r">Valor</th><th>Data</th></tr></thead><tbody>'+pr+'</tbody><tfoot><tr class="foot"><td colspan="3">TOTAL</td><td class="r">'+fmt(tv)+'</td><td></td></tr></tfoot></table></div>';}
    else{html+='<div class="empty">Nenhum registro com os filtros aplicados.</div>';}
  }
  if(!usandoImport||(tipo==='liquidado_total'||tipo==='liquidado_parcial')){
    var tcf=tipo==='liquidado_total'?'liquidado_total':tipo==='liquidado_parcial'?'liquidado_parcial':'';
    var fc=S.processos.filter(function(p){if(p.status==='pendente')return false;if(tcf&&p.status!==tcf)return false;if(advFiltId!=='todos'&&p.advogadoId!==advFiltId)return false;var recs=p.recebimentos||[];if(dtIni||dtFim){var ok=recs.some(function(r){if(!r.data)return false;if(dtIni&&r.data<dtIni)return false;if(dtFim&&r.data>dtFim)return false;return true;});if(!ok)return false;}return true;});
    if(fc.length){var tCo=fc.reduce(function(s,p){return s+(p.valorCompra||0);},0),tRe=fc.reduce(function(s,p){return s+((p.recebimentos||[]).reduce(function(sr,r){return sr+(r.valor||0);},0));},0),tFa=tRe-tCo,tCn=fc.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
    var cr=fc.map(function(p){var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;var rp=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);var fa=rp-(p.valorCompra||0);var de=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;var lr=(p.recebimentos||[]).slice(-1)[0];var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';return'<tr><td>'+esc(p.cliente)+'</td><td style="font-size:10px">'+esc(p.numero)+'</td><td>'+an+'</td><td>'+sb+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+fmt(rp)+'</td><td class="r" style="color:'+(fa>=0?'#1D6B3A':'#A32D2D')+'">'+fmt(fa)+'</td><td class="r">'+de+'%</td><td>'+(lr?fmtDate(lr.data):'—')+'</td><td>'+(lr?lr.banco:'—')+'</td></tr>';}).join('');
    html+=(usandoImport?'<div class="st" style="margin-top:24px">Processos do cadastro</div>':'')+
    '<div class="metrics" style="margin-bottom:16px;margin-top:8px"><div class="mc"><div class="ml">Processos</div><div class="mv">'+fc.length+'</div></div><div class="mc gold"><div class="ml">Total Recebido</div><div class="mv gold">'+fmt(tRe)+'</div></div><div class="mc"><div class="ml">Vl. Compra</div><div class="mv">'+fmt(tCo)+'</div></div><div class="mc blue"><div class="ml">Faturamento</div><div class="mv blue">'+fmt(tFa)+'</div></div></div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Tipo</th><th class="r">Vl. Condenação</th><th class="r">Vl. Compra</th><th class="r">Vl. Liquidado</th><th class="r">Faturamento</th><th class="r">Deságio %</th><th>Último Rec.</th><th>Banco</th></tr></thead><tbody>'+cr+'</tbody><tfoot><tr class="foot"><td colspan="4">TOTAL</td><td class="r">'+fmt(tCn)+'</td><td class="r">'+fmt(tCo)+'</td><td class="r">'+fmt(tRe)+'</td><td class="r">'+fmt(tFa)+'</td><td></td><td></td><td></td></tr></tfoot></table></div>';}
    else if(!usandoImport){html='<div class="empty">Nenhum processo encontrado com os filtros aplicados.</div>';}
  }
  if(!html)html='<div class="empty">Nenhum dado encontrado.</div>';
  document.getElementById('rel-liq-content').innerHTML=html;
}
function imprimirRelLiq(){renderRelLiq();setTimeout(function(){window.print();},300);}

function renderPrev(){
  var adv=document.getElementById('prev-adv').value;
  var mat=(document.getElementById('prev-mat').value||'').toLowerCase();
  var q=(document.getElementById('prev-q').value||'').toLowerCase();
  var f=S.processos.filter(function(p){return p.status==='pendente'&&(adv==='todos'||p.advogadoId===adv)&&(!mat||!(p.materia||'').toLowerCase().includes(mat)?false:true)&&(!q||(p.cliente||'').toLowerCase().includes(q)||(p.numero||'').toLowerCase().includes(q));});
  // fix mat filter
  f=S.processos.filter(function(p){
    if(p.status!=='pendente')return false;
    if(adv!=='todos'&&p.advogadoId!==adv)return false;
    if(mat&&!(p.materia||'').toLowerCase().includes(mat))return false;
    if(q&&!(p.cliente||'').toLowerCase().includes(q)&&!(p.numero||'').toLowerCase().includes(q))return false;
    return true;
  });
  var tP=f.reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var tC=f.reduce(function(s,p){return s+(p.valorCompra||0);},0);
  var tCn=f.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
  var tF=tP-tC;
  var rows=f.map(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var pg=(p.valorCliente||0)-(p.valorCompra||0);
    var de=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;
    var di=p.dataCompra?Math.floor((new Date()-new Date(p.dataCompra))/(864e5)):0;
    return'<tr><td>'+esc(p.cliente)+'</td><td style="font-size:10px">'+esc(p.numero)+'</td><td>'+an+'</td><td>'+esc(p.materia||'')+'</td><td>'+fmtDate(p.dataCompra)+'</td><td class="r">'+di+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCliente)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r" style="color:#1D6B3A">'+fmt(pg)+'</td><td class="r">'+de+'%</td></tr>';
  }).join('');
  var html=f.length?
    '<div class="metrics" style="margin-bottom:16px"><div class="mc blue"><div class="ml">Processos pendentes</div><div class="mv blue">'+f.length+'</div></div><div class="mc"><div class="ml">Vl. Condenação</div><div class="mv">'+fmt(tCn)+'</div></div><div class="mc gold"><div class="ml">Previsão de Entrada</div><div class="mv gold">'+fmt(tP)+'</div></div><div class="mc"><div class="ml">Prev. Faturamento</div><div class="mv">'+fmt(tF)+'</div></div></div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Matéria</th><th>Data Compra</th><th class="r">Dias</th><th class="r">Vl. Condenação</th><th class="r">Vl. Cliente</th><th class="r">Vl. Compra</th><th class="r">Prev. Ganho</th><th class="r">Deságio %</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr class="foot"><td colspan="6">TOTAL</td><td class="r">'+fmt(tCn)+'</td><td class="r">'+fmt(tP)+'</td><td class="r">'+fmt(tC)+'</td><td class="r">'+fmt(tF)+'</td><td></td></tr></tfoot></table></div>':
    '<div class="empty">Nenhum processo pendente encontrado.</div>';
  document.getElementById('prev-content').innerHTML=html;
}

  return'<div class="page-title">'+I.comissao+' Olá, '+esc(c.lawyer.name)+'</div>'+
    '<div style="font-size:12px;color:var(--mt);margin-bottom:16px">Período: '+per+'</div>'+m+
    '<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}

// ════════════════════════════════════════════════════════════
// USUÁRIOS
// ════════════════════════════════════════════════════════════
function pageUsuarios(){
  var rows=USERS.map(function(u,i){
    var rb=u.role==='admin'?'<span class="badge b-green">Admin</span>':'<span class="badge b-par">Advogado</span>';
    return'<div class="lrow"><div class="av" style="'+avSt(i)+'">'+ini(u.name)+'</div><div class="ln">'+esc(u.name)+'</div><div style="font-size:11px;color:var(--mt)">@'+u.username+'</div>'+rb+'<div style="font-size:11px;font-family:monospace;background:#f4f4f4;padding:3px 8px;border-radius:6px;margin-left:8px">'+u.password+'</div></div>';
  }).join('');
  return'<div class="page-title">'+I.usuarios+' Usuários do Sistema</div>'+
  '<div class="card" style="margin-bottom:8px"><p style="font-size:12px;color:var(--mt)">Cada advogado acessa apenas sua própria comissão. O Admin vê tudo.</p></div>'+
  '<div class="card">'+rows+'</div>';
}
</script>
