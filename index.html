<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBL — Gestão de Comissões</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#063D38;--vd:#042824;--vl:#DDE9E7;
  --d:#B8860B;--dl:#FDF6E3;--dm:#C9970D;
  --bd:#d0dbd9;--tx:#1c1c1c;--mt:#5e7572;
  --bg:#f0f3f2;--red:#A32D2D;--redl:#FCEBEB;
  --sb:240px;
  --card:#ffffff;--input:#ffffff;--row-alt:#f7faf9;--row-hov:#edf5f3;--shadow:rgba(0,0,0,.08);
  --blue:#185FA5;--bluel:#EEF3FB;--green:#1D6B3A;--greenl:#E6F4EC;
  --divider:#eef1f0;
}
body.dark{
  /* Fundo geral mais claro que o quase-preto antigo, e tipografia bem mais clara */
  --v:#26a394;--vd:#1d8478;--vl:#163530;
  --d:#e6b426;--dl:#3a3010;--dm:#f0bf2e;
  --bd:#39504a;--tx:#f1f5f4;--mt:#a8bdb8;
  --bg:#10181a;--red:#ff8585;--redl:#3a1a1a;
  --card:#1c2729;--input:#243032;--row-alt:#222d2f;--row-hov:#2c3a3c;--shadow:rgba(0,0,0,.5);
  --blue:#7ab4f0;--bluel:#1a2d44;--green:#7adc9b;--greenl:#163a23;
  --divider:#2e3e3a;
}
/* Aplicações específicas para o tema dark — cobre elementos com cores hard-coded */
body.dark .card,
body.dark .chart-card,
body.dark .filter-bar{background:var(--card)!important;border-color:var(--bd)!important;color:var(--tx)}
body.dark .sidebar{background:var(--card)!important;border-color:var(--bd)!important}
body.dark .nav-item{color:var(--tx)}
body.dark .nav-item:hover,body.dark .nav-item.active{background:var(--vl);color:var(--v)}
body.dark .fg input,body.dark .fg select,body.dark .fg textarea,
body.dark input[type=text],body.dark input[type=number],body.dark input[type=password],body.dark input[type=email],body.dark input[type=date],body.dark input[type=month],body.dark .search-input{
  background:var(--input)!important;color:var(--tx)!important;border-color:var(--bd)!important
}
body.dark input::placeholder,body.dark textarea::placeholder{color:#7a918c}
body.dark .btn{background:var(--input);border-color:var(--bd);color:var(--tx)}
body.dark .btn:hover{background:var(--vl)}
body.dark .bp{background:var(--v);color:#fff;border-color:var(--v)}
body.dark .bp:hover{background:var(--vd)}
/* Tabelas */
body.dark .tbl{background:var(--card)}
body.dark .tbl td{color:var(--tx);border-bottom-color:var(--divider)}
body.dark .tbl th{background:var(--vd);color:#fff}
body.dark .tbl tr:nth-child(even) td{background:var(--row-alt)}
body.dark .tbl tr:hover td{background:var(--row-hov)}
body.dark .tbl tr.foot td{background:var(--vd);color:#fff}
/* Modais */
body.dark .modal{background:var(--card)!important;color:var(--tx)}
body.dark .modal-title{color:var(--v)}
/* Imports / drop zones */
body.dark .imp{background:var(--dl)!important;border-color:var(--d)!important;color:var(--tx)!important}
body.dark .imp-title{color:var(--d)}
body.dark .imp:hover{background:#4a3d18!important}
/* Métricas */
body.dark .mc{background:var(--vl)}
body.dark .mc.gold{background:var(--dl)}
body.dark .mc.blue{background:var(--bluel)}
body.dark .mc.red{background:var(--redl)}
body.dark .mc.green{background:var(--greenl)}
body.dark .mv.blue{color:var(--blue)}
body.dark .mv.green{color:var(--green)}
/* Badges */
body.dark .b-tot{background:var(--vl);color:#7eddc8}
body.dark .b-par{background:var(--dl);color:var(--d)}
body.dark .b-pend{background:var(--bluel);color:var(--blue)}
body.dark .b-red{background:var(--redl);color:var(--red)}
body.dark .b-green{background:var(--greenl);color:var(--green)}
body.dark .b-compra{background:var(--bluel);color:var(--blue)}
body.dark .b-venda{background:var(--greenl);color:var(--green)}
body.dark .b-desp{background:var(--redl);color:var(--red)}
/* Linhas e divisórias */
body.dark .div,body.dark .lrow,body.dark .rank-row{border-color:var(--divider)!important}
body.dark .rank-bar-bg{background:var(--divider)}
/* Fluxo de caixa */
body.dark .fc-in,body.dark .fc-saldo-pos{color:var(--green)}
body.dark .fc-out,body.dark .fc-saldo-neg{color:var(--red)}
body.dark .fc-saldo-pos{background:var(--greenl)}
body.dark .fc-saldo-neg{background:var(--redl)}
/* Avatares ficam levemente saturados a mais */
body.dark .av{filter:saturate(1.1) brightness(1.05)}
/* Toggle do dark mode no header */
body.dark .btn-logout{background:rgba(255,255,255,.12)}
body.dark .btn-logout:hover{background:rgba(255,255,255,.2)}
/* Bloco genérico para inputs em formulário */
body.dark .login-box{background:var(--card)}
body.dark .login-box .lf input{background:var(--input);color:var(--tx);border-color:var(--bd)}
body.dark .login-title{color:var(--v)}
/* Garantir que elementos sem variáveis (cores codificadas) ainda fiquem legíveis */
body.dark [style*="background:#f4f4f4"],body.dark [style*="background: #f4f4f4"]{background:var(--row-alt)!important;color:var(--tx)!important}
body.dark [style*="background:var(--row-alt)"],body.dark [style*="background: #f7faf9"]{background:var(--row-alt)!important}
body.dark [style*="border:1px solid #e0e8e5"],body.dark [style*="border: 1px solid #e0e8e5"]{border-color:var(--bd)!important}
body.dark [style*="border-bottom:.5px solid #eef1f0"]{border-bottom-color:var(--divider)!important}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}

/* ── LOGIN ─────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v)}
.login-box{background:var(--card);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px var(--shadow)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
.login-title{font-size:20px;font-weight:700;color:var(--v)}
.login-sub{font-size:12px;color:var(--mt);margin-top:2px}
.lf{margin-bottom:16px}
.lf label{font-size:12px;color:var(--mt);display:block;margin-bottom:5px;font-weight:600}
.lf input{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s;background:var(--input);color:var(--tx)}
.lf input:focus{border-color:var(--v)}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{background:var(--vd)}
.login-err{background:var(--redl);color:var(--red);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:14px;display:none}

/* ── APP SHELL ──────────────────────────────────── */
.app-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:var(--v);display:flex;align-items:stretch;height:56px;flex-shrink:0;z-index:300}
.hdr-brand{width:var(--sb);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid rgba(255,255,255,.12)}
.hdr-title{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.hdr-subtitle{color:rgba(255,255,255,.5);font-size:10px;display:block}
.hdr-right{flex:1;display:flex;align-items:center;gap:10px;padding:0 20px}
.hdr-period{color:rgba(255,255,255,.7);font-size:12px;flex:1}
.hdr-user{color:rgba(255,255,255,.85);font-size:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
input[type=month]{padding:5px 9px;border-radius:6px;border:none;font-size:12px;background:rgba(255,255,255,.18);color:#fff;outline:none;cursor:pointer}
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7}
.btn-calc{background:var(--d);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-calc:hover{background:var(--dm)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.admin-badge{background:var(--d);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}

/* ── BODY ───────────────────────────────────────── */
.body-area{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar{width:var(--sb);background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:7px;margin:1px 8px;font-size:13px;color:var(--tx);border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .12s,color .12s;white-space:nowrap}
.nav-item:hover{background:var(--vl);color:var(--v)}
.nav-item.active{background:var(--vl);color:var(--v);font-weight:700}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.55}
.nav-item.active svg,.nav-item:hover svg{opacity:1}

/* accordion */
.sb-group{}
.sb-group-hdr{display:flex;align-items:center;gap:9px;padding:8px 14px 8px 22px;cursor:pointer;font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;border:none;background:none;width:100%;text-align:left}
.sb-group-hdr:hover{color:var(--v)}
.sb-group-hdr svg{width:14px;height:14px;opacity:.55}
.sb-chevron{margin-left:auto;font-size:10px;transition:transform .2s;line-height:1}
.sb-children{display:none;padding-bottom:4px}
.sb-children.open{display:block}
.sb-children .nav-item{padding-left:36px;font-size:12px;margin-left:12px;width:calc(100% - 20px)}

/* ── MAIN ───────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:24px 28px;min-width:0}

/* ── CARDS / FORM ───────────────────────────────── */
.page-title{font-size:17px;font-weight:700;color:var(--v);display:flex;align-items:center;gap:10px;margin-bottom:18px}
.page-title svg{width:20px;height:20px;flex-shrink:0}
.st{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px}
.st:first-child{margin-top:0}
.card{background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:14px;color:var(--tx)}
.frow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fg label{font-size:12px;color:var(--mt)}
.fg input,.fg select,.fg textarea{border:.5px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:var(--input);outline:none;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fg textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.div{height:.5px;background:var(--divider);margin:14px 0}

/* ── BUTTONS ────────────────────────────────────── */
.btn{padding:7px 15px;border-radius:6px;font-size:13px;border:.5px solid var(--bd);background:var(--card);cursor:pointer;color:var(--tx);font-weight:500;white-space:nowrap}
.btn:hover{background:var(--vl)}
.bp{background:var(--v);color:#fff;border-color:var(--v)}
.bp:hover{background:var(--vd)}
.bd2{color:var(--red);border-color:#e8b4b4;padding:4px 10px;font-size:11px}
.bd2:hover{background:var(--redl)}
.bsm{padding:4px 12px;font-size:12px}
.print-btn{background:#1D6B3A;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
.print-btn:hover{background:#145229}

/* ── TABLE ──────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:8px 11px;text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:7px 11px;border-bottom:.5px solid var(--divider);vertical-align:middle;color:var(--tx)}
.tbl td.r{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:var(--row-alt)}
.tbl tr:hover td{background:var(--row-hov)}
.tbl tr.foot td{background:var(--v);color:#fff;font-weight:700}
.dbtn{color:var(--red);background:none;border:none;cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.ebtn{color:var(--v);background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;line-height:1}

/* ── BADGES ─────────────────────────────────────── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.b-tot{background:var(--vl);color:var(--v)}
.b-par{background:var(--dl);color:var(--d)}
.b-pend{background:var(--bluel);color:var(--blue)}
.b-red{background:var(--redl);color:var(--red)}
.b-green{background:var(--greenl);color:var(--green)}
.b-compra{background:var(--bluel);color:var(--blue)}
.b-venda{background:var(--greenl);color:var(--green)}
.b-desp{background:var(--redl);color:var(--red)}
.section-badge{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:10px;vertical-align:middle}

/* ── METRICS ────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.mc{background:var(--vl);border-radius:8px;padding:13px 15px}
.mc.gold{background:var(--dl)}
.mc.blue{background:var(--bluel)}
.mc.red{background:var(--redl)}
.mc.green{background:var(--greenl)}
.ml{font-size:11px;color:var(--mt);margin-bottom:4px}
.mv{font-size:20px;font-weight:700;color:var(--v)}
.mv.gold{color:var(--d)}
.mv.blue{color:var(--blue)}
.mv.red{color:var(--red)}
.mv.green{color:var(--green)}

/* ── CHARTS ─────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:18px 20px;color:var(--tx)}
.chart-title{font-size:13px;font-weight:700;color:var(--v);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--mt);margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.chart-full{grid-column:1/-1}
.chart-wrap-tall{position:relative;height:300px}

/* ── MODAL ──────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative;color:var(--tx)}
.modal-title{font-size:16px;font-weight:700;color:var(--v);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mt)}
.modal-close:hover{color:var(--red)}

/* ── RANK ───────────────────────────────────────── */
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--divider);font-size:12px}
.rank-row:last-child{border-bottom:none}
.rank-n{width:20px;font-size:11px;font-weight:700;color:var(--mt);text-align:center}
.rank-name{flex:1;font-weight:500}
.rank-bar-bg{width:120px;height:8px;background:var(--divider);border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px}
.rank-val{width:90px;text-align:right;font-size:11px}
.rank-pct{width:38px;text-align:right;font-size:11px;color:var(--mt)}

/* ── MISC ───────────────────────────────────────── */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ln{flex:1;font-size:13px;font-weight:500}
.lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--divider)}
.lrow:last-child{border-bottom:none}
.empty{font-size:13px;color:var(--mt);padding:12px 0;text-align:center}
.toast{position:fixed;bottom:20px;right:20px;background:var(--v);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;padding:14px 16px;background:var(--card);border:.5px solid var(--bd);border-radius:10px}
.search-input{border:.5px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;flex:1;min-width:160px;background:var(--input);color:var(--tx)}
.search-input:focus{border-color:var(--v)}
.imp{display:flex;align-items:center;gap:12px;background:var(--dl);border:1.5px dashed var(--d);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer}
.imp:hover{background:#faeec4}
.imp-icon{width:34px;height:34px;background:var(--d);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.imp-icon svg{width:18px;height:18px;fill:#fff}
.imp-text{flex:1}
.imp-title{font-size:13px;font-weight:700;color:var(--d)}
.imp-sub{font-size:11px;color:var(--mt);margin-top:2px}
.imp-status{font-size:11px;font-weight:700;color:var(--v);background:var(--vl);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
input.fhide{display:none}

/* fluxo caixa */
.fc-in{color:var(--green);font-weight:700}
.fc-out{color:var(--red);font-weight:700}
.fc-saldo-pos{background:var(--greenl);color:var(--green);padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}
.fc-saldo-neg{background:var(--redl);color:var(--red);padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}

/* ── PRINT ──────────────────────────────────────── */
@media print{
  .hdr,.sidebar,.no-print,.modal-close,.dbtn,.ebtn,.print-btn,.filter-bar,.btn,.imp{display:none!important}
  .body-area{display:block}
  .main{padding:0;overflow:visible}
  body{background:#fff}
  .card{border:1px solid #ccc;border-radius:0}
  .tbl th{background:#063D38!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:768px){
  :root{--sb:200px}
  .metrics,.g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .chart-full{grid-column:auto}
  .main{padding:16px}
}
</style>
</head>
<body>
<script>try{
  // Reset único: se o usuário salvou tema dark numa versão antiga, limpar.
  // Marca essa versão como já reseteada para não apagar de novo no futuro.
  if(!localStorage.getItem('pbl_theme_reset_v2')){
    localStorage.removeItem('pbl_theme');
    localStorage.setItem('pbl_theme_reset_v2','1');
  }
  if(localStorage.getItem('pbl_theme')==='dark')document.body.classList.add('dark');
}catch(e){}</script>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <svg width="184" height="45" viewBox="0 0 147 36" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="flex-shrink:0;display:block">
    
    
    
    <defs>
        <polygon id="lg-path-1" points="0 0.400646042 39.9483351 0.400646042 39.9483351 35.3792483 0 35.3792483"></polygon>
        <polygon id="lg-path-3" points="0.371724506 0.391448276 39.5878397 0.391448276 39.5878397 22.2876561 0.371724506 22.2876561"></polygon>
        <polygon id="lg-path-5" points="0.215709192 0.240455172 28.4053136 0.240455172 28.4053136 34.3448276 0.215709192 34.3448276"></polygon>
    </defs>
    <g id="lg-Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="lg-1" transform="translate(-646.000000, -27.000000)">
            <g id="lg-Group-4" transform="translate(646.000000, 27.000000)">

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmt(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){if(v>=1000000)return'R$ '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'R$ '+(v/1000).toFixed(0)+'k';return fmt(v);}

}

function navigate(page){

  var FULL_ONLY=['financeiro','fluxocaixa','previsao','usuarios','relliq2','relcomp','relgeral','relpend'];

  var GESTORA_ALLOWED=['dashboard','distrib','processos','reliquidados','operacional','campanhas','advogados','resumo'];
  // Páginas que advogado pode acessar
  var LAWYER_ALLOWED=['dashboard','distrib','processos','comissao'];

  if(currentUser.role==='gestora'){
    if(GESTORA_ALLOWED.indexOf(page)<0){showToast('Acesso restrito ao seu perfil.');return;}
  } else if(currentUser.role==='lawyer'){
    if(LAWYER_ALLOWED.indexOf(page)<0){showToast('Acesso restrito. Contate o administrador.');return;}

    showToast('Acesso restrito. Contate o administrador.');return;
  }
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(function(e){e.classList.remove('active');});
  var el=document.getElementById('nav-'+page);if(el)el.classList.add('active');
  var mc=document.getElementById('main-content');

    case 'financeiro':  mc.innerHTML=pageFinanceiro();break;

    case 'resumo':      mc.innerHTML=pageResumo();break;
    case 'reliquidados':mc.innerHTML=pageRelLiquidados();break;

    case 'relgeral':    mc.innerHTML=pageRelGeral();break;
    case 'relpend':     mc.innerHTML=pageRelPend();break;
    case 'distrib':     mc.innerHTML=pageDistrib();break;
  }

function afterDash(){updPeriod();var d=buildDashData();renderDashCharts(d);}
function buildDashData(){
  var arr=[];
  // Processos cadastrados manualmente com recebimentos
  S.processos.filter(function(p){return p.recebimentos&&p.recebimentos.length;}).forEach(function(p){
    var val=p.recebimentos.reduce(function(s,r){return s+(r.valor||0);},0);
    var adv=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'?'}).name;
    arr.push({adv:normAdv(adv),val:val,tipo:p.status==='liquidado_parcial'?'Parcial':'Total'});
  });
  // Lançamentos manuais de Liquidações (S.liqManual)
  (S.liqManual||[]).forEach(function(m){
    var adv=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'?'}).name;
    arr.push({adv:normAdv(adv),val:(m.valor||0),tipo:m.liquidacao==='Parcial'?'Parcial':'Total'});
  });
  return arr;
}
function importDashboard(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      var keys=rows.length>0?Object.keys(rows[0]):[];
      var data=[],byAdv={},relData=[];
      rows.forEach(function(r){
        var getCol=function(subs){var v='';keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=String(r[k]||'').trim();});});return v;};
        var getNum=function(subs){var v=0;keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=parseFloat(r[k])||0;});});return v;};
        var adv=getCol(['ADVOGADO']).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        var val=getNum(['VALOR']);
        var liq=getCol(['LIQUIDACAO','LIQUIDAAO','LIQUIDAC','LIQUID']);
        var proc=getCol(['PROCESSO']);
        var datRaw=getCol(['DATA']);
        var dat='';if(datRaw){try{var dd=new Date(datRaw);if(!isNaN(dd))dat=dd.toISOString().slice(0,10);}catch(ex){}}
        if(!adv||adv==='ADVOGADO')return;
        var tipo=liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total';
        data.push({adv:adv,val:val,tipo:tipo});
        relData.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat});
        if(!byAdv[adv])byAdv[adv]=[];
        byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      });
      S.dashData=data;
      relLiqImportData=relData;
      var matched=0;
      S.lawyers.forEach(function(l){
        var key=l.name.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        var fn2=key.split(' ')[0];
        var foundKey=Object.keys(byAdv).find(function(k){return k===key||k===fn2||fn2===k||fn2.startsWith(k.split(' ')[0])||k.startsWith(fn2);});
        if(foundKey){
          if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
          S.entries[l.id].processos=byAdv[foundKey];
          S.entries[l.id].volLiquidado=byAdv[foundKey].reduce(function(s,p){return s+p.valor;},0);
          matched++;
        }
      });
      var el=document.getElementById('dash-status');
      if(el)el.textContent=data.length+' proc · '+matched+' adv';
      saveData();renderDashCharts(data);
      showToast(data.length+' processos carregados em todo o sistema!');
    }catch(err){alert('Erro ao ler arquivo: '+err.message);console.error(err);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function renderDashCharts(data){
  if(!data)data=[];
  var total=data.reduce(function(s,r){return s+r.val;},0);
  var totLiq=data.filter(function(r){return r.tipo==='Total';});
  var parLiq=data.filter(function(r){return r.tipo==='Parcial';});
  var valTot=totLiq.reduce(function(s,r){return s+r.val;},0);
  var valPar=parLiq.reduce(function(s,r){return s+r.val;},0);
  var prevTotal=S.processos.filter(function(p){return p.status==='pendente';}).reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var prevQtd=S.processos.filter(function(p){return p.status==='pendente';}).length;
  function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  set('kpi-total',fmt(total));set('kpi-proc',data.length+' processos');
  set('kpi-tot-val',fmt(valTot));set('kpi-tot-qtd',totLiq.length+' processos');
  set('kpi-par-val',fmt(valPar));set('kpi-par-qtd',parLiq.length+' processos');
  set('kpi-prev',fmt(prevTotal));set('kpi-prev-qtd',prevQtd+' processos');
  var advMap={};
  data.forEach(function(r){if(!advMap[r.adv])advMap[r.adv]={tot:0,par:0,qtdTot:0,qtdPar:0};if(r.tipo==='Total'){advMap[r.adv].tot+=r.val;advMap[r.adv].qtdTot++;}else{advMap[r.adv].par+=r.val;advMap[r.adv].qtdPar++;}});
  var advArr=Object.keys(advMap).map(function(k){return{name:k,tot:advMap[k].tot,par:advMap[k].par,qtdTot:advMap[k].qtdTot,qtdPar:advMap[k].qtdPar,total:advMap[k].tot+advMap[k].par};});
  advArr.sort(function(a,b){return b.total-a.total;});
  var labels=advArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();});
  function mkChart(id,type,d2,opts){var el=document.getElementById(id);if(!el)return;if(charts[id]){charts[id].destroy();delete charts[id];}charts[id]=new Chart(el,{type:type,data:d2,options:opts});}
  var pieOpts=function(ttFn){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ttFn}}}};};
  mkChart('chart-tipo-val','doughnut',{labels:['Total','Parcial'],datasets:[{data:[valTot,valPar],backgroundColor:['#063D38','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+fmt(c.parsed)+' ('+((total?c.parsed/total:0)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-tipo-qtd','doughnut',{labels:['Total','Parcial'],datasets:[{data:[totLiq.length,parLiq.length],backgroundColor:['#063D38','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.parsed+' processos ('+((data.length?c.parsed/data.length:0)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-adv-bar','bar',{labels:labels,datasets:[{label:'Liq. Total',data:advArr.map(function(x){return x.tot;}),backgroundColor:'#063D38',borderRadius:3,borderSkipped:false},{label:'Liq. Parcial',data:advArr.map(function(x){return x.par;}),backgroundColor:'#B8860B',borderRadius:3,borderSkipped:false}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},padding:14,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.dataset.label+': '+fmt(c.parsed.y);}}}},scales:{x:{stacked:true,ticks:{font:{size:11},color:'#5e7572'},grid:{display:false}},y:{stacked:true,ticks:{callback:function(v){return fmtK(v);},font:{size:11},color:'#5e7572'},grid:{color:'#eef1f0'}}}});
  var parArr=advArr.filter(function(x){return x.par>0;});
  mkChart('chart-pie-tot','doughnut',{labels:labels,datasets:[{data:advArr.map(function(x){return x.tot;}),backgroundColor:PC.slice(0,advArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valTot?(c.parsed/valTot*100).toFixed(1):0)+'%)';}));
  mkChart('chart-pie-par','doughnut',{labels:parArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();}),datasets:[{data:parArr.map(function(x){return x.par;}),backgroundColor:PC.slice(0,parArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valPar?(c.parsed/valPar*100).toFixed(1):0)+'%)';}));

  // ── KPIs e gráficos por CARTEIRA (FIDC PBL / PBL Originadora / CERTJUD) ──
  // Fonte: S.liqManual (lançamentos manuais com titularidade)
  var carteiras={'FIDC PBL':{val:0,qtd:0,color:'#185FA5'},'PBL Originadora':{val:0,qtd:0,color:'#B8860B'},'CERTJUD':{val:0,qtd:0,color:'#1D6B3A'}};

  // Série temporal por carteira (mês/ano)
  var meses={};

    return'<div class="rank-row"><div class="rank-n">'+(i+1)+'</div>'+

    '<div class="rank-bar-bg"><div class="rank-bar-fill" style="width:'+(x.total/maxV*100).toFixed(0)+'%;background:'+PC[i%PC.length]+'"></div></div>'+
    '<div class="rank-val">'+fmt(x.total)+'</div><div class="rank-pct">'+pct+'%</div>'+
    '<div class="rank-val" style="color:#063D38">'+fmt(x.tot)+'</div>'+
    '<div class="rank-val" style="color:#B8860B">'+fmt(x.par)+'</div></div>';
  }).join('');
  var el=document.getElementById('dash-ranking');
  if(el)el.innerHTML='<div class="rank-row" style="border-bottom:1.5px solid var(--v);padding-bottom:6px;font-size:10px;font-weight:700;color:var(--mt)"><div style="width:20px"></div><div style="flex:1">Advogado</div><div style="width:100px"></div><div style="width:90px;text-align:right">Total</div><div style="width:38px;text-align:right">%</div><div style="width:90px;text-align:right;color:#063D38">Liq.Total</div><div style="width:90px;text-align:right;color:#B8860B">Liq.Parcial</div></div>'+rrows;
}

function filterProc(){
  var q=(document.getElementById('proc-search').value||'').toLowerCase();
  var st=document.getElementById('proc-st').value;
  var adv=document.getElementById('proc-adv').value;
  var rows=S.processos.filter(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||''}).name;
    return(!q||(p.numero||'').toLowerCase().includes(q)||(p.cliente||'').toLowerCase().includes(q)||an.toLowerCase().includes(q))&&
           (st==='todos'||p.status===st)&&(adv==='todos'||p.advogadoId===adv);
  }).map(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var rec=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);
    var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':p.status==='liquidado_parcial'?'<span class="badge b-par">Parcial</span>':'<span class="badge b-pend">Pendente</span>';
    return'<tr><td style="font-size:11px">'+p.numero+'</td><td>'+p.cliente+'</td><td>'+an+'</td><td>'+sb+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+fmt(rec)+'</td><td>'+fmtDate(p.dataCompra)+'</td><td style="white-space:nowrap"><button class="ebtn" onclick="modalRecebimentos(\''+p.id+'\')">💰</button><button class="ebtn" onclick="modalEditProc(\''+p.id+'\')">✏️</button><button class="dbtn" onclick="deleteProc(\''+p.id+'\')">×</button></td></tr>';
  }).join('');
  document.getElementById('proc-tbody').innerHTML=rows||'<tr><td colspan="9" class="empty">Nenhum resultado.</td></tr>';
}
function getAdvOpts(sel){return S.lawyers.map(function(l){return'<option value="'+l.id+'"'+(sel===l.id?' selected':'')+'>'+l.name+'</option>';}).join('');}
function modalNovoProc(){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode realizar esta ação.");return;}

  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Advogado *</label><select id="m-adv"><option value="">Selecione...</option>'+getAdvOpts('')+'</select></div><div class="fg"><label>Atendente</label><input type="text" id="m-ate"/></div><div class="fg"><label>Réu</label><input type="text" id="m-reu"/></div></div>'+

  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Vara</label><input type="text" id="m-var"/></div><div class="fg"><label>Estado</label><input type="text" id="m-est"/></div><div class="fg"><label>Data Compra</label><input type="date" id="m-datc" value="'+todayStr()+'"/></div></div>'+

}
function calcVComp(){var vcli=parseFloat(document.getElementById('m-vcli').value)||0;var pct=parseFloat(document.getElementById('m-pcomp').value)||0;if(vcli&&pct)document.getElementById('m-vcomp').value=(vcli*pct/100).toFixed(2);}
function salvarProc(id){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode realizar esta ação.");return;}
  var num=document.getElementById('m-num').value.trim(),cli=document.getElementById('m-cli').value.trim(),adv=document.getElementById('m-adv').value;
  if(!num||!cli||!adv){alert('Preencha N° Processo, Cliente e Advogado.');return;}
  var proc={id:id||uid(),numero:num,cliente:cli,advogadoId:adv,atendente:document.getElementById('m-ate').value.trim(),reu:document.getElementById('m-reu').value.trim(),materia:document.getElementById('m-mat').value.trim(),foro:document.getElementById('m-foro').value.trim(),comarca:document.getElementById('m-com').value.trim(),vara:document.getElementById('m-var').value.trim(),estado:document.getElementById('m-est').value.trim(),dataCompra:document.getElementById('m-datc').value,valorCondenacao:parseFloat(document.getElementById('m-vcond').value)||0,valorCliente:parseFloat(document.getElementById('m-vcli').value)||0,percCompra:parseFloat(document.getElementById('m-pcomp').value)||0,valorCompra:parseFloat(document.getElementById('m-vcomp').value)||0,status:'pendente',recebimentos:[]};
  if(id){var idx=S.processos.findIndex(function(p){return p.id===id;});if(idx>=0){proc.status=S.processos[idx].status;proc.recebimentos=S.processos[idx].recebimentos;S.processos[idx]=proc;}}else{S.processos.push(proc);}
  closeModal();saveData();navigate('processos');
}

  '<div class="g3" style="margin-bottom:10px"><div class="fg"><label>Matéria</label><input type="text" id="m-mat" value="'+esc(p.materia)+'"/></div><div class="fg"><label>Foro</label><input type="text" id="m-foro" value="'+esc(p.foro)+'"/></div><div class="fg"><label>Comarca</label><input type="text" id="m-com" value="'+esc(p.comarca)+'"/></div></div>'+

  '<div class="g4" style="margin-bottom:14px"><div class="fg"><label>Vl. Condenação</label><input type="number" id="m-vcond" value="'+(p.valorCondenacao||'')+'" step="0.01"/></div><div class="fg"><label>Vl. Cliente</label><input type="number" id="m-vcli" value="'+(p.valorCliente||'')+'" step="0.01"/></div><div class="fg"><label>% Compra</label><input type="number" id="m-pcomp" value="'+(p.percCompra||'')+'" step="0.01" oninput="calcVComp()"/></div><div class="fg"><label>Vl. Compra</label><input type="number" id="m-vcomp" value="'+(p.valorCompra||'')+'" step="0.01"/></div></div>'+

}
function esc(s){return String(s||'').replace(/"/g,'&quot;');}
function deleteProc(id){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode excluir.");return;}if(!confirm('Excluir processo?'))return;S.processos=S.processos.filter(function(p){return p.id!==id;});saveData();navigate('processos');}
function modalRecebimentos(procId){var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;renderModalRec(p);}
function renderModalRec(p){
  var recs=p.recebimentos||[];
  var totalRec=recs.reduce(function(s,r){return s+(r.valor||0);},0);
  var fat=totalRec-(p.valorCompra||0);
  var rrows=recs.map(function(r){return'<tr><td>'+fmtDate(r.data)+'</td><td>'+r.banco+'</td><td class="r">'+fmt(r.valor)+'</td><td class="r">'+(r.valorDevolucao?fmt(r.valorDevolucao):'—')+'</td><td><button class="dbtn" onclick="deleteRec(\''+p.id+'\',\''+r.id+'\')">×</button></td></tr>';}).join('');
  var stOpts=['pendente','liquidado_total','liquidado_parcial'].map(function(s){return'<option value="'+s+'"'+(p.status===s?' selected':'')+'>'+{pendente:'Pendente',liquidado_total:'Liquidado Total',liquidado_parcial:'Liquidado Parcial'}[s]+'</option>';}).join('');
  showModal('<button class="modal-close" onclick="closeModal()">×</button><div class="modal-title">Recebimentos — '+esc(p.numero)+'</div>'+
  '<div style="background:var(--vl);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px"><div style="font-weight:600;margin-bottom:4px">'+esc(p.cliente)+'</div>'+
  '<div style="display:flex;gap:20px;flex-wrap:wrap"><span>Vl. Condenação: <strong>'+fmt(p.valorCondenacao)+'</strong></span><span>Vl. Compra: <strong>'+fmt(p.valorCompra)+'</strong></span><span>Total Recebido: <strong>'+fmt(totalRec)+'</strong></span><span>Faturamento: <strong style="color:'+(fat>=0?'#1D6B3A':'#A32D2D')+'">'+fmt(fat)+'</strong></span></div></div>'+
  '<div class="fg" style="max-width:220px;margin-bottom:16px"><label>Status</label><select id="proc-status-sel" onchange="updateProcStatus(\''+p.id+'\',this.value)">'+stOpts+'</select></div>'+
  '<div class="st" style="margin-top:0">Novo recebimento</div>'+
  '<div class="g4" style="margin-bottom:12px"><div class="fg"><label>Data *</label><input type="date" id="rec-data" value="'+todayStr()+'"/></div><div class="fg"><label>Banco *</label><input type="text" id="rec-banco" placeholder="Ex: Banco Genial"/></div><div class="fg"><label>Valor (R$) *</label><input type="number" id="rec-valor" min="0" step="0.01"/></div><div class="fg"><label>Vl. Devolução</label><input type="number" id="rec-dev" min="0" step="0.01"/></div></div>'+
  '<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn bp" onclick="addRec(\''+p.id+'\')">+ Adicionar Recebimento</button></div>'+
  '<table class="tbl"><thead><tr><th>Data</th><th>Banco</th><th class="r">Valor</th><th class="r">Vl. Devolução</th><th>Ação</th></tr></thead>'+
  '<tbody>'+(rrows||'<tr><td colspan="5" class="empty">Nenhum recebimento.</td></tr>')+'</tbody></table>'+
  '<div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn" onclick="closeModal()">Fechar</button></div>');
}
function updateProcStatus(id,status){var p=S.processos.find(function(x){return x.id===id;});if(p){p.status=status;saveData();}}
function addRec(procId){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode realizar esta ação.");return;}
  var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;
  var data=document.getElementById('rec-data').value,banco=document.getElementById('rec-banco').value.trim(),valor=parseFloat(document.getElementById('rec-valor').value)||0,dev=parseFloat(document.getElementById('rec-dev').value)||0;
  if(!data||!banco||!valor){alert('Preencha Data, Banco e Valor.');return;}
  if(!p.recebimentos)p.recebimentos=[];
  p.recebimentos.push({id:uid(),data:data,banco:banco,valor:valor,valorDevolucao:dev||null});
  saveData();renderModalRec(p);
}
function deleteRec(procId,recId){if(!isFullAccess(currentUser)){showToast("Apenas o administrador pode excluir.");return;}var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;p.recebimentos=p.recebimentos.filter(function(r){return r.id!==recId;});saveData();renderModalRec(p);}

function filterFin(){

  }).slice().sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(f){

  }).join('');
  document.getElementById('fin-tbody').innerHTML=rows||'<tr><td colspan="9" class="empty">Nenhum resultado.</td></tr>';
}

function pageFluxoCaixa(){
  // agrupar por mês
  var byMes={};
  S.financeiro.forEach(function(f){
    if(!f.data)return;
    var mes=f.data.slice(0,7);
    if(!byMes[mes])byMes[mes]={entradas:0,saidas:0,items:[]};
    if(f.tipo==='venda')byMes[mes].entradas+=f.valor||0;
    else byMes[mes].saidas+=f.valor||0;
    byMes[mes].items.push(f);
  });
  var meses=Object.keys(byMes).sort().reverse();
  var tEntradas=meses.reduce(function(s,m){return s+byMes[m].entradas;},0);
  var tSaidas=meses.reduce(function(s,m){return s+byMes[m].saidas;},0);
  var tSaldo=tEntradas-tSaidas;
  var rows=meses.map(function(m){
    var mb=byMes[m];var saldo=mb.entradas-mb.saidas;
    var dt=new Date(m+'-02');var label=dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    return'<tr>'+
      '<td style="font-weight:600">'+label+'</td>'+
      '<td class="r fc-in">'+fmt(mb.entradas)+'</td>'+
      '<td class="r fc-out">'+fmt(mb.saidas)+'</td>'+
      '<td class="r"><span class="'+(saldo>=0?'fc-saldo-pos':'fc-saldo-neg')+'">'+fmt(saldo)+'</span></td>'+
      '<td><button class="btn bsm" onclick="detalharMes(\''+m+'\')">Ver detalhes</button></td>'+
    '</tr>';
  }).join('');

  return'<div class="page-title">'+I.fluxo+' Fluxo de Caixa</div>'+
  '<div class="metrics">'+
    '<div class="mc green"><div class="ml">Total Entradas (Vendas FIDC)</div><div class="mv green">'+fmt(tEntradas)+'</div></div>'+
    '<div class="mc red"><div class="ml">Total Saídas (Compras + Desp.)</div><div class="mv red">'+fmt(tSaidas)+'</div></div>'+
    '<div class="mc '+(tSaldo>=0?'':'red')+'"><div class="ml">Saldo Acumulado</div><div class="mv '+(tSaldo>=0?'':'red')+'">'+fmt(tSaldo)+'</div></div>'+
    '<div class="mc blue"><div class="ml">Períodos registrados</div><div class="mv blue">'+meses.length+'</div></div>'+
  '</div>'+
  (meses.length?
  '<div class="card" style="padding:0;overflow-x:auto">'+
    '<table class="tbl"><thead><tr><th>Período</th><th class="r">Entradas (Vendas FIDC)</th><th class="r">Saídas (Compras + Despesas)</th><th class="r">Saldo</th><th>Detalhe</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot><tr class="foot"><td>Total</td><td class="r">'+fmt(tEntradas)+'</td><td class="r">'+fmt(tSaidas)+'</td><td class="r">'+fmt(tSaldo)+'</td><td></td></tr></tfoot>'+
  '</table></div>'+
  '<div id="fc-detalhe"></div>'
  :'<div class="card"><div class="empty">Nenhum lançamento registrado ainda. Acesse Financeiro para registrar compras, vendas e despesas.</div></div>');
}
function detalharMes(mes){
  var items=S.financeiro.filter(function(f){return f.data&&f.data.startsWith(mes);}).sort(function(a,b){return(a.data||'').localeCompare(b.data||'');});
  var dt=new Date(mes+'-02');var label=dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  var rows=items.map(function(f){
    var tb=f.tipo==='compra'?'<span class="badge b-compra">Compra PBL</span>':f.tipo==='venda'?'<span class="badge b-venda">Venda FIDC</span>':'<span class="badge b-desp">Despesa</span>';

    return'<tr><td>'+fmtDate(f.data)+'</td><td>'+tb+'</td><td>'+esc(f.descricao)+'</td><td>'+esc(f.banco||'')+'</td><td class="r" style="color:'+cor+'">'+fmt(f.valor)+'</td><td style="font-size:11px">'+esc(f.obs||'')+'</td></tr>';
  }).join('');

}

function removeLawyer(id){if(!confirm('Remover?'))return;S.lawyers=S.lawyers.filter(function(l){return l.id!==id;});delete S.entries[id];saveData();navigate('operacional');}
function importLiqGeral(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    var keys=rows.length>0?Object.keys(rows[0]):[];
    var byAdv={},dashArr=[],relArr=[];
    rows.forEach(function(r){
      var getCol=function(subs){var v='';keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=String(r[k]||'').trim();});});return v;};
      var getNum=function(subs){var v=0;keys.forEach(function(k){var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');subs.forEach(function(s){if(kn.includes(s)&&!v)v=parseFloat(r[k])||0;});});return v;};
      var adv=getCol(['ADVOGADO']).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      var val=getNum(['VALOR']);
      var liq=getCol(['LIQUIDACAO','LIQUIDAAO','LIQUID']);
      var proc=getCol(['PROCESSO']);
      var datRaw=getCol(['DATA']);var dat='';
      if(datRaw){try{var dd=new Date(datRaw);if(!isNaN(dd))dat=dd.toISOString().slice(0,10);}catch(ex){}}
      if(!adv||adv==='ADVOGADO')return;
      var tipo=liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total';
      if(!byAdv[adv])byAdv[adv]=[];
      byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      dashArr.push({adv:adv,val:val,tipo:tipo});
      relArr.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat});
    });
    var matched=0,total=0;
    S.lawyers.forEach(function(l){
      var key=l.name.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      var fn2=key.split(' ')[0];
      var foundKey=Object.keys(byAdv).find(function(k){return k===key||fn2===k||fn2.startsWith(k.split(' ')[0])||k.startsWith(fn2);});
      if(foundKey){
        if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
        S.entries[l.id].processos=byAdv[foundKey];
        S.entries[l.id].volLiquidado=byAdv[foundKey].reduce(function(s,p){return s+p.valor;},0);
        matched++;total+=byAdv[foundKey].length;
      }
    });
    S.dashData=dashArr;relLiqImportData=relArr;
    var el=document.getElementById('s-liq');if(el)el.textContent=total+' proc · '+matched+' adv';
    saveData();showToast(total+' processos para '+matched+' advogados!');input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function importValGeral(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var byAdv={};rows.forEach(function(r){var adv=normAdv(r['ADVOGADO']||r[2]||'');var obs=String(r['OBS']||r[3]||'').toUpperCase();if(!adv||adv==='ADVOGADO')return;if(!byAdv[adv])byAdv[adv]={pv:0,cv:0};if(obs.includes('VALIDADO')&&!obs.includes('NAO APROVADO')&&!obs.includes('NÃO APROVADO')&&!obs.includes('FALTA CONTRATO')){if(obs.includes('CONTRATO'))byAdv[adv].cv++;else byAdv[adv].pv++;}});var matched=0;S.lawyers.forEach(function(l){var key=normAdv(l.name);var fn=key.split(' ')[0];var found=byAdv[key]||byAdv[Object.keys(byAdv).find(function(k){return k.startsWith(fn);})||''];if(found){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].procValid=found.pv;S.entries[l.id].contValid=found.cv;matched++;}});var el=document.getElementById('s-val');if(el)el.textContent=matched+' adv';saveData();input.value='';showToast('Validações importadas!');});}
function importDilGeral(input){if(!input.files.length)return;readXlsx(input.files[0],function(rows){var byInit={};rows.forEach(function(r){var contrato=String(r['CONTRATO']||'').trim().toUpperCase();var val2=String(r['VAL.']||r['VAL']||'').trim().toUpperCase();var valor=parseFloat(r['VALOR']||0)||0;if(contrato!=='PAGO'||!val2)return;if(!byInit[val2])byInit[val2]={qtd:0,vol:0};byInit[val2].qtd++;byInit[val2].vol+=valor;});var matched=0;S.lawyers.forEach(function(l){var initials=l.name.trim().split(' ').slice(0,2).map(function(x){return x[0].toUpperCase();}).join('');if(byInit[initials]){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].capaCapa=byInit[initials].qtd;S.entries[l.id].volEntradas=byInit[initials].vol;matched++;}});var el=document.getElementById('s-dil');if(el)el.textContent=matched+' adv';saveData();input.value='';showToast('Diligências importadas!');});}
function saveManual(){var lid=document.getElementById('sel-man').value;if(!lid){showToast('Selecione um advogado.');return;}if(!S.entries[lid])S.entries[lid]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};var g=function(id){return document.getElementById(id).value;};if(g('man-pv')!=='')S.entries[lid].procValid=parseInt(g('man-pv'))||0;if(g('man-cv')!=='')S.entries[lid].contValid=parseInt(g('man-cv'))||0;if(g('man-capa')!=='')S.entries[lid].capaCapa=parseInt(g('man-capa'))||0;if(g('man-au')!=='')S.entries[lid].auditoria=parseInt(g('man-au'))||0;if(g('man-ve')!=='')S.entries[lid].volEntradas=parseFloat(g('man-ve'))||0;if(g('man-vl')!=='')S.entries[lid].volLiquidado=parseFloat(g('man-vl'))||0;saveData();showToast('Ajuste salvo!');}

function calc(lid){
  var l=S.lawyers.find(function(x){return x.id===lid;});if(!l)return null;
  var e=S.entries[lid]||{processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};

  // Contagens vindas da tela "Validações PBL" (registros manuais por advogado)
  var dv={proc_val:0,cont_val:0,capa:0,auditoria:0};
  S.distribValidacao.forEach(function(m){
    if(m.advogadoId===lid && dv.hasOwnProperty(m.tipo)) dv[m.tipo]++;
  });

  // Soma contagens dos imports + registros manuais (ambas viram comissão)
  var qtdProcVal=(e.procValid||0)+dv.proc_val;
  var qtdContVal=(e.contValid||0)+dv.cont_val;
  var qtdCapa=(e.capaCapa||0)+dv.capa;             // Capa a Capa = Precatório
  var qtdAud=(e.auditoria||0)+dv.auditoria;

  // ── COMISSÃO POR PROCESSO LIQUIDADO ──
  // Regra: comissão SÓ quando o processo está 100% liquidado.
  // Fontes consideradas:
  //   (A) e.processos (legado, vindo do import de planilha) — usa flag tipo='Total'
  //   (B) S.liqManual (lançamentos manuais) — agrupa por (processo+advogado+titularidade);
  //       grupo "100% liquidado" = pelo menos 1 lançamento com liquidacao='Total'
  // Comissão por processo: R$50 se valor < R$10k, R$100 se ≥ R$10k
  // DEDUPLICAÇÃO: se um processo (mesmo número) existe em S.liqManual para esse
  // advogado, ele é considerado APENAS pela fonte manual (mais nova) e ignorado
  // do legado. Isso evita contagem dupla quando o mesmo processo foi importado
  // pela tela antiga (Dashboard) e também pela nova aba Liquidações.
  function normProc(s){return String(s||'').replace(/[^0-9]/g,'');}
  var procsManualSet={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var np=normProc(m.processo);
    if(np)procsManualSet[np]=true;
  });

  // (A) Legado — imports já marcam tipo='Total' / 'Parcial'; remove duplicatas com S.liqManual
  // O legado pode ter o número do processo em vários campos diferentes (numero/processo/proc/ref)
  var legadoFiltrado=(e.processos||[]).filter(function(p){
    var np=normProc(p.numero||p.processo||p.proc||p.ref);
    return !np || !procsManualSet[np]; // mantém apenas se NÃO está no S.liqManual
  });
  var procsTotLegado=legadoFiltrado.filter(function(p){return p.tipo!=='Parcial';});
  var cPLegado=procsTotLegado.reduce(function(s,p){return s+(p.valor<10000?50:100);},0);

  // (B) Lançamentos manuais — agrupa por (processo+advogadoId+titularidade)
  var gruposManual={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var key=(m.processo||'__sem_proc__'+m.id)+'|'+(m.titularidade||'');
    if(!gruposManual[key])gruposManual[key]={total:0,temTotal:false,proc:m.processo,titularidade:m.titularidade};
    gruposManual[key].total+=(m.valor||0);
    if(m.liquidacao==='Total')gruposManual[key].temTotal=true;
  });
  var procsTotManual=Object.keys(gruposManual).filter(function(k){return gruposManual[k].temTotal;}).map(function(k){return gruposManual[k];});
  var cPManual=procsTotManual.reduce(function(s,g){return s+(g.total<10000?50:100);},0);

  var cP=cPLegado+cPManual;

  var cPV=qtdProcVal*5,cCV=qtdContVal*2,cCapa=qtdCapa*10,cAud=qtdAud*10;
  var ve=e.volEntradas||0,cEnt=ve>=500000?Math.floor(ve/100000)*100:0;

  // ── PRÊMIO POR VOLUME LIQUIDADO ──
  // Soma TUDO (Total + Parcial) do advogado, das duas fontes (com dedup)
  // R$400k → R$400 ; R$500k → R$500 ; ... (faixa de R$100k a partir de R$400k)
  var volLegado=legadoFiltrado.reduce(function(s,p){return s+(p.valor||0);},0);
  if(!volLegado && !legadoFiltrado.length && e.volLiquidado) volLegado=e.volLiquidado;
  var volManual=(S.liqManual||[]).filter(function(m){return m.advogadoId===lid;}).reduce(function(s,m){return s+(m.valor||0);},0);
  var volLiqTotalParcial=volLegado+volManual;
  var cLiq=volLiqTotalParcial>=400000?Math.floor(volLiqTotalParcial/100000)*100:0;

  var cCamp=S.campanhas.reduce(function(s,c){return s+(c.lawyer==='todos'||c.lawyer===lid?c.valor:0);},0);
  var total=l.prolabore+cP+cPV+cCV+cCapa+cAud+cEnt+cLiq+cCamp;
  return{lawyer:l,entry:e,cP:cP,cPV:cPV,cCV:cCV,cCapa:cCapa,cAud:cAud,cEnt:cEnt,cLiq:cLiq,cCamp:cCamp,total:total,
    qtdProcVal:qtdProcVal,qtdContVal:qtdContVal,qtdCapa:qtdCapa,qtdAud:qtdAud,
    qtdProcTot:procsTotLegado.length+procsTotManual.length,volLiqTotalParcial:volLiqTotalParcial,
    qtdProcTotLegado:procsTotLegado.length,qtdProcTotManual:procsTotManual.length,
    dvManual:dv};
}

// Limpa processos antigos do legado (e.processos / S.entries[lid].processos) que
// já estão presentes em S.liqManual (mesmo número de processo). Resolve duplicação
// quando os mesmos processos foram importados pelas duas vias.
function limparDuplicatasLegado(){
  if(!isFullAccess(currentUser)){alert('Apenas Admin.');return;}
  function normProc(s){return String(s||'').replace(/[^0-9]/g,'');}
  // Por advogado: monta set de processos que já estão no S.liqManual
  var byAdv={};
  (S.liqManual||[]).forEach(function(m){
    if(!m.advogadoId)return;
    if(!byAdv[m.advogadoId])byAdv[m.advogadoId]={};
    var np=normProc(m.processo);
    if(np)byAdv[m.advogadoId][np]=true;
  });
  // Conta quantas duplicatas existem antes
  var totalRemover=0;
  Object.keys(S.entries||{}).forEach(function(lid){
    var en=S.entries[lid];if(!en||!en.processos)return;
    var dupSet=byAdv[lid]||{};
    en.processos.forEach(function(p){
      var np=normProc(p.numero||p.processo||p.proc||p.ref);
      if(np && dupSet[np]) totalRemover++;
    });
  });
  if(!totalRemover){alert('Nenhuma duplicata encontrada. Tudo limpo!');return;}
  if(!confirm('Encontradas '+totalRemover+' duplicatas (processos do legado que já estão na aba Liquidações).\n\nRemover essas duplicatas? Os lançamentos da aba Liquidações são preservados.')) return;
  // Remove
  Object.keys(S.entries||{}).forEach(function(lid){
    var en=S.entries[lid];if(!en||!en.processos)return;
    var dupSet=byAdv[lid]||{};
    en.processos=en.processos.filter(function(p){
      var np=normProc(p.numero||p.processo||p.proc||p.ref);
      return !np || !dupSet[np];
    });
  });
  saveData();
  alert(totalRemover+' duplicatas removidas com sucesso!');
  navigate('advogados');
}

      if(m.liquidacao==='Total')grpManual[key].temTotal=true;

    }).join('');

      var com=g.temTotal?(g.total<10000?50:100):0;

      ['Contratos validados ('+c.qtdContVal+')',c.cCV],
      ['Capa a capa ('+c.qtdCapa+')',c.cCapa],
      ['Auditoria ('+c.qtdAud+')',c.cAud],
      ['Bônus entradas',c.cEnt],

        '</table></div>'+

          '<tbody>'+procRows+'</tbody>'+
        '</table></div>'+
      '</div>'+
    '</div>';
  }).join('');

  var summaryRows=todos.map(function(c){
    return '<tr><td style="padding:6px 10px;border-bottom:1px solid #eef1f0">'+esc(c.lawyer.name)+'</td><td style="padding:6px 10px;border-bottom:1px solid #eef1f0;text-align:right">'+fmt(c.lawyer.prolabore)+'</td><td style="padding:6px 10px;border-bottom:1px solid #eef1f0;text-align:right">'+fmt(c.total-c.lawyer.prolabore)+'</td><td style="padding:6px 10px;border-bottom:1px solid #eef1f0;text-align:right;font-weight:700">'+fmt(c.total)+'</td></tr>';
  }).join('');

  var html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório de Comissões — '+esc(mesRef)+'</title>'+
    '<style>'+
    '*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}'+
    'body{background:#f0f3f2;color:#1c1c1c;padding:20px}'+
    '.sheet{max-width:1000px;margin:0 auto;background:#fff;padding:30px 36px;box-shadow:0 4px 20px rgba(0,0,0,.08);border-radius:6px}'+

      blocks+

  var w=window.open('','_blank');
  if(!w){showToast('Permita pop-ups para gerar o relatório.');return;}
  w.document.write(html);

}
function showDetail(lid){
  if(!lid)return;var c=calc(lid);if(!c)return;var e=c.entry;
  // Deduplicar legado vs S.liqManual (mesmo número de processo aparecendo nas duas fontes)
  function normProc(s){return String(s||'').replace(/[^0-9]/g,'');}
  var procsManualSet={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var np=normProc(m.processo);
    if(np)procsManualSet[np]=true;
  });
  var legadoFiltrado=(e.processos||[]).filter(function(p){
    var np=normProc(p.numero||p.processo||p.proc||p.ref);
    return !np || !procsManualSet[np];
  });
  // Legado (import) — apenas os que NÃO estão em S.liqManual
  var procRowsLegado=legadoFiltrado.map(function(p){
    var isPar=p.tipo==='Parcial';
    var com=isPar?0:(p.valor<10000?50:100);
    var bd=isPar?'<span style="background:#fff3cd;color:#856404;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">PARCIAL</span>':'<span style="background:#d4edda;color:#155724;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">TOTAL</span>';
    return '<tr><td style="padding:4px 8px;font-size:11px;color:var(--mt)">'+
      (p.ref||'---')+'</td><td style="padding:4px 8px">—</td><td style="padding:4px 8px">'+bd+'</td><td style="padding:4px 8px;font-size:11px;text-align:right">'+fmt(p.valor)+'</td>'+
      '<td style="padding:4px 8px;font-size:11px;text-align:right;color:'+(isPar?'var(--mt)':'var(--v)')+';font-weight:600">'+(isPar?'—':'R$ '+com)+'</td></tr>';
  }).join('');
  // Manual agrupado
  var grpManual={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var key=(m.processo||'(sem nº)')+'|'+(m.titularidade||'');
    if(!grpManual[key])grpManual[key]={proc:m.processo||'(sem nº)',titularidade:m.titularidade,total:0,qtd:0,temTotal:false};
    grpManual[key].total+=(m.valor||0);
    grpManual[key].qtd++;
    if(m.liquidacao==='Total')grpManual[key].temTotal=true;
  });
  var procRowsManual=Object.keys(grpManual).map(function(k){
    var g=grpManual[k];
    var com=g.temTotal?(g.total<10000?50:100):0;
    var bdSt=g.temTotal?'<span style="background:#d4edda;color:#155724;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">100% LIQUIDADO</span>':'<span style="background:#fff3cd;color:#856404;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">EM ANDAMENTO ('+g.qtd+' parc.)</span>';
    var corCart=g.titularidade==='FIDC PBL'?'#185FA5':g.titularidade==='PBL Originadora'?'#B8860B':'#1D6B3A';
    var bdCart='<span style="background:'+corCart+';color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">'+esc(g.titularidade||'')+'</span>';
    return '<tr><td style="padding:4px 8px;font-size:11px;color:var(--mt)">'+esc(g.proc)+'</td><td style="padding:4px 8px">'+bdCart+'</td><td style="padding:4px 8px">'+bdSt+'</td><td style="padding:4px 8px;font-size:11px;text-align:right">'+fmt(g.total)+'</td>'+
      '<td style="padding:4px 8px;font-size:11px;text-align:right;color:'+(g.temTotal?'var(--v)':'var(--mt)')+';font-weight:600">'+(g.temTotal?'R$ '+com:'—')+'</td></tr>';
  }).join('');
  var totalLinhas=legadoFiltrado.length+Object.keys(grpManual).length;
  var procDetail=totalLinhas>0?
    '<div style="margin:4px 0 8px;border:1px solid var(--bd);border-radius:6px;overflow:hidden">'+
    '<table style="width:100%;border-collapse:collapse">'+
    '<thead><tr style="background:var(--vl)">'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Processo</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Origem</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:left;color:var(--v)">Status</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:right;color:var(--v)">Valor</th>'+
    '<th style="padding:5px 8px;font-size:10px;text-align:right;color:var(--v)">Comissão</th></tr></thead>'+
    '<tbody>'+procRowsLegado+procRowsManual+'</tbody></table>'+
    '<div style="padding:6px 8px;font-size:10px;color:var(--mt);background:var(--row-alt);border-top:1px solid var(--bd)">⚠️ A comissão por processo só é liberada quando o processo está <strong>100% liquidado</strong> (todas as parcelas recebidas).</div>'+
    '</div>':'';
  var totalLiq=c.volLiqTotalParcial||0;
  var labelLiq='Prêmio liquidação (Total+Parcial: '+fmt(totalLiq)+') — '+
    (totalLiq>=400000?'a partir de R$400k, +R$100 a cada R$100k':'meta R$400k para iniciar prêmio');
  var items=[
    {l:'Pró-labore fixo',v:c.lawyer.prolabore},
    {l:'Processos 100% liquidados ('+c.qtdProcTot+' de '+totalLinhas+') — R$50 abaixo de R$10k / R$100 acima',v:c.cP},
    {l:'Processos validados ('+c.qtdProcVal+')',v:c.cPV},
    {l:'Contratos validados ('+c.qtdContVal+')',v:c.cCV},
    {l:'Capa a capa ('+c.qtdCapa+')',v:c.cCapa},
    {l:'Auditoria ('+c.qtdAud+')',v:c.cAud},
    {l:'Bônus entradas',v:c.cEnt},
    {l:labelLiq,v:c.cLiq},
    {l:'Campanhas',v:c.cCamp}
  ];
  var m='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px"><div class="mc"><div class="ml">Total</div><div class="mv">'+fmt(c.total)+'</div></div><div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div><div class="mc gold"><div class="ml">Comissões</div><div class="mv gold">'+fmt(c.total-c.lawyer.prolabore)+'</div></div></div>';
  var actions='<div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px"><button class="btn bp" style="font-size:12px" onclick="gerarRelatorioAdvogado('+JSON.stringify(lid)+')">📄 Gerar Relatório</button></div>';
  var rows=items.map(function(it,idx){return'<div style="display:flex;flex-direction:column;padding:8px 0;border-bottom:.5px solid var(--bd);font-size:13px"><div style="display:flex;justify-content:space-between"><div style="color:var(--mt)">'+it.l+'</div><div>'+fmt(it.v)+'</div></div>'+(idx===1?procDetail:'')+'</div>';}).join('');
  document.getElementById('detail-content').innerHTML=m+actions+'<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}

// RELATÓRIO DE COMISSÃO POR ADVOGADO (imprimível / PDF)

function gerarRelatorioAdvogado(lid){
  var c=calc(lid);if(!c){showToast('Advogado sem dados.');return;}
  var e=c.entry;

  // Deduplicar legado vs S.liqManual
  function normProc(s){return String(s||'').replace(/[^0-9]/g,'');}
  var procsManualSet={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var np=normProc(m.processo);
    if(np)procsManualSet[np]=true;
  });
  var procs=(e.processos||[]).filter(function(p){
    var np=normProc(p.numero||p.processo||p.proc||p.ref);
    return !np || !procsManualSet[np];
  });

  // Lançamentos manuais agrupados por processo
  var grpManual={};
  (S.liqManual||[]).forEach(function(m){
    if(m.advogadoId!==lid)return;
    var key=(m.processo||'(sem nº)')+'|'+(m.titularidade||'');
    if(!grpManual[key])grpManual[key]={proc:m.processo||'(sem nº)',titularidade:m.titularidade,total:0,qtd:0,temTotal:false};
    grpManual[key].total+=(m.valor||0);
    grpManual[key].qtd++;
    if(m.liquidacao==='Total')grpManual[key].temTotal=true;
  });
  var manualArr=Object.keys(grpManual).map(function(k){return grpManual[k];});

  var procRowsLegado=procs.map(function(p,i){
    var isPar=p.tipo==='Parcial';
    var com=isPar?0:(p.valor<10000?50:100);
    var bd=isPar?'<span style="background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">PARCIAL</span>':'<span style="background:#d4edda;color:#155724;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">TOTAL</span>';
    var bg=i%2===0?'':'background:#f7faf9';
    return '<tr style="'+bg+'"><td style="padding:6px 10px">'+(i+1)+'</td><td style="padding:6px 10px;font-size:11px">'+esc(p.ref||'---')+'</td><td style="padding:6px 10px;font-size:10px;color:#888">—</td><td style="padding:6px 10px">'+bd+'</td><td style="padding:6px 10px;text-align:right">'+fmt(p.valor||0)+'</td><td style="padding:6px 10px;text-align:right;font-weight:600;color:'+(isPar?'#888':'#063D38')+'">'+(isPar?'—':'R$ '+com)+'</td></tr>';
  }).join('');
  var procRowsManual=manualArr.map(function(g,i){
    var com=g.temTotal?(g.total<10000?50:100):0;
    var bd=g.temTotal?'<span style="background:#d4edda;color:#155724;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">100% LIQUIDADO</span>':'<span style="background:#fff3cd;color:#856404;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">'+g.qtd+' parc.</span>';
    var bg=(procs.length+i)%2===0?'':'background:#f7faf9';
    return '<tr style="'+bg+'"><td style="padding:6px 10px">'+(procs.length+i+1)+'</td><td style="padding:6px 10px;font-size:11px">'+esc(g.proc||'---')+'</td><td style="padding:6px 10px;font-size:10px;color:#5e7572">'+esc(g.titularidade||'')+'</td><td style="padding:6px 10px">'+bd+'</td><td style="padding:6px 10px;text-align:right">'+fmt(g.total||0)+'</td><td style="padding:6px 10px;text-align:right;font-weight:600;color:'+(g.temTotal?'#063D38':'#888')+'">'+(g.temTotal?'R$ '+com:'—')+'</td></tr>';
  }).join('');
  var procRows=procRowsLegado+procRowsManual;
  if(!procRows) procRows='<tr><td colspan="6" style="padding:14px;text-align:center;color:#888;font-size:12px">Sem processos liquidados no período.</td></tr>';

  var totalLiqVol=c.volLiqTotalParcial||0;
  var qtdProcTotal=procs.length+manualArr.length;
  var labelLiq=totalLiqVol>=400000?'+R$100 a cada R$100k (a partir de R$400k)':'Meta de R$400k para iniciar';
  var items=[
    {l:'Pró-labore fixo',v:c.lawyer.prolabore,d:''},
    {l:'Processos 100% liquidados',v:c.cP,d:c.qtdProcTot+' processos × R$50/R$100'},
    {l:'Processos validados',v:c.cPV,d:c.qtdProcVal+' × R$5'},
    {l:'Contratos validados',v:c.cCV,d:c.qtdContVal+' × R$2'},
    {l:'Capa a capa',v:c.cCapa,d:c.qtdCapa+' × R$10'},
    {l:'Auditoria',v:c.cAud,d:c.qtdAud+' × R$10'},
    {l:'Bônus entradas',v:c.cEnt,d:'sobre volume de entradas'},
    {l:'Prêmio liquidação',v:c.cLiq,d:'volume liquidado: '+fmt(totalLiqVol)+' — '+labelLiq},
    {l:'Campanhas',v:c.cCamp,d:''}
  ];
  var rowsHtml=items.map(function(it){
    return '<tr><td style="padding:8px 12px;border-bottom:1px solid #eef1f0">'+it.l+(it.d?'<div style="font-size:10px;color:#888;margin-top:2px">'+it.d+'</div>':'')+'</td><td style="padding:8px 12px;border-bottom:1px solid #eef1f0;text-align:right;font-weight:600">'+fmt(it.v)+'</td></tr>';
  }).join('');

  var dataGer=new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var mesRef=S.mes||'';
  var emitidoPor=currentUser?currentUser.name:'';

  var html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório — '+esc(c.lawyer.name)+'</title>'+
    '<style>'+
    '*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}'+
    'body{background:#f0f3f2;color:#1c1c1c;padding:20px}'+
    '.sheet{max-width:820px;margin:0 auto;background:#fff;padding:36px 44px;box-shadow:0 4px 20px rgba(0,0,0,.08);border-radius:6px}'+
    '.hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #063D38;padding-bottom:16px;margin-bottom:22px}'+
    '.brand-name{font-size:26px;font-weight:800;color:#063D38;letter-spacing:1px}'+
    '.brand-sub{font-size:11px;color:#888;letter-spacing:.15em;text-transform:uppercase;margin-top:2px}'+
    '.doc-title{font-size:13px;color:#888;text-align:right}'+
    '.doc-title strong{display:block;color:#063D38;font-size:16px;margin-bottom:3px}'+
    '.adv{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:14px 16px;background:#DDE9E7;border-radius:8px}'+
    '.av{width:50px;height:50px;border-radius:50%;background:#063D38;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}'+
    '.adv-name{font-size:18px;font-weight:700;color:#063D38}'+
    '.adv-sub{font-size:12px;color:#5e7572}'+
    '.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}'+
    '.mc{background:#f7faf9;border:1px solid #d0dbd9;border-radius:6px;padding:10px 12px}'+
    '.ml{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em}'+
    '.mv{font-size:16px;font-weight:700;color:#063D38;margin-top:2px}'+
    '.mc.gold .mv{color:#B8860B}.mc.gold{background:#FDF6E3;border-color:#E6D9A8}'+
    'h2{font-size:13px;color:#063D38;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #DDE9E7;padding-bottom:4px}'+
    'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}'+
    'thead tr{background:#063D38;color:#fff}'+
    'thead th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px}'+
    'thead th.r{text-align:right}'+
    '.tot-row td{padding:10px 12px;background:#063D38;color:#fff;font-weight:700;font-size:14px}'+
    '.foot{margin-top:30px;padding-top:14px;border-top:1px solid #ccc;display:flex;justify-content:space-between;font-size:10px;color:#888}'+
    '.note{font-size:10px;color:#888;margin-top:6px;font-style:italic}'+
    '.print-bar{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:99}'+
    '.print-bar button{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}'+
    '.print-bar .pr{background:#063D38;color:#fff}'+
    '.print-bar .cl{background:#ccc;color:#222}'+
    '@media print{.print-bar{display:none}body{background:#fff;padding:0}.sheet{box-shadow:none;max-width:none;margin:0;padding:24px}}'+
    '</style></head><body>'+
    '<div class="print-bar"><button class="pr" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button><button class="cl" onclick="window.close()">Fechar</button></div>'+
    '<div class="sheet">'+
      '<div class="hdr">'+
        '<div><div class="brand-name">PBL</div><div class="brand-sub">Relatório de Comissão</div></div>'+
        '<div class="doc-title"><strong>Período: '+esc(mesRef)+'</strong>Emitido em '+dataGer+'<br/>Por: '+esc(emitidoPor)+'</div>'+
      '</div>'+
      '<div class="adv">'+
        '<div class="av">'+ini(c.lawyer.name)+'</div>'+
        '<div><div class="adv-name">'+esc(c.lawyer.name)+'</div><div class="adv-sub">Advogado(a)</div></div>'+
      '</div>'+
      '<div class="metrics">'+
        '<div class="mc"><div class="ml">Total a pagar</div><div class="mv">'+fmt(c.total)+'</div></div>'+
        '<div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div>'+
        '<div class="mc gold"><div class="ml">Comissões</div><div class="mv">'+fmt(c.total-c.lawyer.prolabore)+'</div></div>'+
        '<div class="mc"><div class="ml">Vol. Liquidado</div><div class="mv">'+fmt(totalLiqVol)+'</div></div>'+
      '</div>'+
      '<h2>Detalhamento das Comissões</h2>'+
      '<table>'+
        '<thead><tr><th>Item</th><th class="r">Valor</th></tr></thead>'+
        '<tbody>'+rowsHtml+'</tbody>'+
        '<tfoot><tr class="tot-row"><td>TOTAL A PAGAR</td><td style="text-align:right">'+fmt(c.total)+'</td></tr></tfoot>'+
      '</table>'+
      '<h2>Processos Liquidados ('+qtdProcTotal+')</h2>'+
      '<table>'+
        '<thead><tr><th style="width:32px">#</th><th>Processo</th><th>Origem</th><th>Status</th><th class="r">Valor</th><th class="r">Comissão</th></tr></thead>'+
        '<tbody>'+procRows+'</tbody>'+
      '</table>'+
      '<div class="note">Volume liquidado total (Total + Parcial): '+fmt(totalLiqVol)+'. Apenas processos <strong>100% liquidados</strong> geram comissão por processo (R$50 abaixo de R$10.000 / R$100 acima). Lançamentos parciais somam apenas para o prêmio por volume.</div>'+
      '<div class="foot"><div>PBL — Sistema de Gestão de Comissões</div><div>Relatório gerado automaticamente</div></div>'+
    '</div></body></html>';

  var w=window.open('','_blank');
  if(!w){showToast('Permita pop-ups para gerar o relatório.');return;}
  w.document.write(html);
  w.document.close();
}

// RESUMO CONSOLIDADO

function pageResumo(){

  var res=S.lawyers.map(function(l){return calc(l.id);});
  var tP=res.reduce(function(s,r){return s+r.lawyer.prolabore;},0);
  var tC=res.reduce(function(s,r){return s+(r.total-r.lawyer.prolabore);},0);
  var tG=tP+tC;
  var tbody=res.map(function(r,i){var bg=i%2===0?'':'background:var(--row-alt);';return'<tr><td style="'+bg+'"><div style="display:flex;align-items:center;gap:9px"><div class="av" style="width:28px;height:28px;font-size:10px;'+avSt(i)+'">'+ini(r.lawyer.name)+'</div>'+r.lawyer.name+'</div></td><td class="r" style="'+bg+'">'+fmt(r.lawyer.prolabore)+'</td><td class="r" style="'+bg+'">'+fmt(r.total-r.lawyer.prolabore)+'</td><td class="r" style="'+bg+';font-weight:700">'+fmt(r.total)+'</td></tr>';}).join('');

    '<div class="mc"><div class="ml">Total geral</div><div class="mv">'+fmt(tG)+'</div></div>'+
    '<div class="mc gold"><div class="ml">Pró-labore total</div><div class="mv gold">'+fmt(tP)+'</div></div>'+
    '<div class="mc"><div class="ml">Comissões total</div><div class="mv">'+fmt(tC)+'</div></div>'+
    '<div class="mc blue"><div class="ml">Advogados</div><div class="mv blue">'+S.lawyers.length+'</div></div>'+
  '</div>'+
  '<div class="card" style="padding:0;overflow-x:auto">'+
    '<table class="tbl"><thead><tr><th>Advogado</th><th class="r">Pró-labore</th><th class="r">Comissões</th><th class="r">Total</th></tr></thead>'+
    '<tbody>'+tbody+'</tbody>'+
    '<tfoot><tr class="foot"><td>Total</td><td class="r">'+fmt(tP)+'</td><td class="r">'+fmt(tC)+'</td><td class="r">'+fmt(tG)+'</td></tr></tfoot>'+
  '</table></div>';
}

// ════════════════════════════════════════════════════════════
// LIQUIDAÇÕES — lançamento manual com origem (FIDC/PBL/CertJud),
// suporte a recebimentos parciais e consulta com filtros
// ════════════════════════════════════════════════════════════
function pageRelLiquidados(){
  var hasFullAccess=isFullAccess(currentUser);
  var advOpts=S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('');

  // Estado atual dos filtros (preservado entre re-renders)
  var fOri=document.getElementById('liq-fori')?document.getElementById('liq-fori').value:'todos';
  var fAdv=document.getElementById('liq-fadv')?document.getElementById('liq-fadv').value:'todos';
  var fLiq=document.getElementById('liq-fliq')?document.getElementById('liq-fliq').value:'todos';
  var fDi=document.getElementById('liq-fdi')?document.getElementById('liq-fdi').value:'';
  var fDf=document.getElementById('liq-fdf')?document.getElementById('liq-fdf').value:'';
  var fBuscaRaw=document.getElementById('liq-fbusca')?(document.getElementById('liq-fbusca').value||''):'';
  var fBusca=fBuscaRaw.toLowerCase();
  var fAgrup=document.getElementById('liq-fagrup')?document.getElementById('liq-fagrup').checked:false;

  var todos=(S.liqManual||[]).slice();

  // Aplica filtros
  var filtrados=todos.filter(function(m){
    if(fOri!=='todos' && m.titularidade!==fOri)return false;
    if(fAdv!=='todos' && m.advogadoId!==fAdv)return false;
    if(fLiq!=='todos' && m.liquidacao!==fLiq)return false;
    if(fDi && (m.data||'')<fDi)return false;
    if(fDf && (m.data||'')>fDf)return false;
    if(fBusca){
      var s=((m.processo||'')+' '+(m.titularidade||'')+' '+((S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:''}).name||'')).toLowerCase();
      if(!s.includes(fBusca))return false;
    }
    return true;
  });

  // KPIs
  var kTot=filtrados.length;
  var kVal=filtrados.reduce(function(s,m){return s+(m.valor||0);},0);
  var kFidc=filtrados.filter(function(m){return m.titularidade==='FIDC PBL';}).reduce(function(s,m){return s+(m.valor||0);},0);
  var kPbl=filtrados.filter(function(m){return m.titularidade==='PBL Originadora';}).reduce(function(s,m){return s+(m.valor||0);},0);
  var kCer=filtrados.filter(function(m){return m.titularidade==='CERTJUD';}).reduce(function(s,m){return s+(m.valor||0);},0);

  // Linhas detalhadas (modo lista) — ordenadas por data desc
  var listaRows=filtrados.slice().sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(m,i){
    var an=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'—'}).name;

  // KPIs
  var metricsHtml=
    '<div class="metrics" style="margin-bottom:14px">'+
      '<div class="mc"><div class="ml">Lançamentos</div><div class="mv">'+kTot+'</div></div>'+
      '<div class="mc"><div class="ml">Volume total</div><div class="mv">'+fmt(kVal)+'</div></div>'+
      '<div class="mc blue"><div class="ml">FIDC PBL</div><div class="mv blue">'+fmt(kFidc)+'</div></div>'+
      '<div class="mc gold"><div class="ml">PBL Originadora</div><div class="mv gold">'+fmt(kPbl)+'</div></div>'+
      '<div class="mc green"><div class="ml">CertJud</div><div class="mv green">'+fmt(kCer)+'</div></div>'+
    '</div>';

  // Filtros
  var oriOpts='<option value="todos"'+(fOri==='todos'?' selected':'')+'>Todas as origens</option>'+
    ['PBL Originadora','FIDC PBL','CERTJUD'].map(function(x){return'<option value="'+x+'"'+(fOri===x?' selected':'')+'>'+x+'</option>';}).join('');
  var advFiltOpts='<option value="todos"'+(fAdv==='todos'?' selected':'')+'>Todos advogados</option>'+
    S.lawyers.map(function(l){return'<option value="'+l.id+'"'+(fAdv===l.id?' selected':'')+'>'+esc(l.name)+'</option>';}).join('');
  var liqOpts='<option value="todos"'+(fLiq==='todos'?' selected':'')+'>Todas</option>'+
    ['Total','Parcial'].map(function(x){return'<option value="'+x+'"'+(fLiq===x?' selected':'')+'>'+x+'</option>';}).join('');

  var filtrosHtml=
    '<div class="filter-bar" style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">'+
      '<div class="fg" style="flex:1;min-width:180px;margin:0"><label>Buscar</label><input type="text" id="liq-fbusca" placeholder="Processo, advogado..." value="'+esc(fBuscaRaw)+'" onkeydown="if(event.key===\'Enter\')navigate(\'reliquidados\')" onblur="if((this.value||\'\').toLowerCase()!==\''+esc(fBusca)+'\')navigate(\'reliquidados\')"/></div>'+
      '<div class="fg" style="min-width:150px;margin:0"><label>Origem</label><select id="liq-fori" onchange="navigate(\'reliquidados\')">'+oriOpts+'</select></div>'+

      '<div style="overflow-x:auto;border-radius:8px;border:1px solid var(--bd)">'+

  return'<div class="page-title">'+I.reliq+' Liquidações</div>'+
