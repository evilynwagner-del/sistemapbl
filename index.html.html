<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBL — Gestão de Comissões</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
function addLiqManual(){
  var tit=document.getElementById('lm-tit').value;
  var data=document.getElementById('lm-data').value;
  var proc=(document.getElementById('lm-proc').value||'').trim();
  var adv=document.getElementById('lm-adv').value;
  var valor=parseFloat(document.getElementById('lm-valor').value)||0;
  var liq=document.getElementById('lm-liq').value;
  var qtd=parseInt(document.getElementById('lm-qtd').value)||1;
  var tipo=document.getElementById('lm-tipo').value;
  if(!tit||!data||!adv||!valor){alert('Preencha Titularidade, Data, Advogado e Valor.');return;}
  S.liqManual.push({id:uid(),titularidade:tit,data:data,processo:proc,advogadoId:adv,valor:valor,liquidacao:liq,qtdCreditos:qtd,tipoCredito:tipo,criadoPor:currentUser.id});
  saveData();renderContent(6,null);
}
function delLiqManual(id){
  if(currentUser.role!=='admin'){showToast('Apenas Admin pode excluir.');return;}
  if(!confirm('Excluir lancamento?'))return;
  S.liqManual=S.liqManual.filter(function(m){return m.id!==id;});
  saveData();renderContent(6,null);
}
function filterLiqManual(){
  var q=(document.getElementById('lm-q')?document.getElementById('lm-q').value:'').toLowerCase();
  var adv=document.getElementById('lm-adv-f')?document.getElementById('lm-adv-f').value:'todos';
  var liq=document.getElementById('lm-liq-f')?document.getElementById('lm-liq-f').value:'todos';
  var di=document.getElementById('lm-di')?document.getElementById('lm-di').value:'';
  var df=document.getElementById('lm-df')?document.getElementById('lm-df').value:'';
  var isAdmin=currentUser&&currentUser.role==='admin';
  var f=S.liqManual.filter(function(m){
    return(!q||(m.titularidade||'').toLowerCase().includes(q)||(m.processo||'').toLowerCase().includes(q))
      &&(adv==='todos'||m.advogadoId===adv)&&(liq==='todos'||m.liquidacao===liq)
      &&(!di||m.data>=di)&&(!df||m.data<=df);
  }).sort(function(a,b){return(b.data||'').localeCompare(a.data||'');});
  var rows=f.map(function(m,i){
    var an=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    var badge=m.liquidacao==='Parcial'?'<span style="background:#fff3cd;color:#856404;padding:2px 6px;border-radius:4px;font-size:10px">Parcial</span>':'<span style="background:#d4edda;color:#155724;padding:2px 6px;border-radius:4px;font-size:10px">Total</span>';
    var bg=i%2===0?'':'background:#f7faf9';
    var del=isAdmin?'<button onclick="delLiqManual('+JSON.stringify(m.id)+')" style="background:none;border:none;color:#c00;cursor:pointer;font-size:16px;padding:0 4px">x</button>':'';
    return'<tr style="'+bg+'"><td style="padding:8px 10px">'+esc(m.titularidade||'')+'</td><td style="padding:8px 10px">'+fmtDate(m.data)+'</td><td style="padding:8px 10px;font-size:11px">'+esc(m.processo||'')+'</td><td style="padding:8px 10px">'+an+'</td><td style="padding:8px 10px;text-align:right">'+fmt(m.valor)+'</td><td style="padding:8px 10px">'+badge+'</td><td style="padding:8px 10px;text-align:right">'+(m.qtdCreditos||1)+'</td><td style="padding:8px 10px;font-size:11px">'+esc(m.tipoCredito||'')+'</td><td style="padding:8px 10px">'+del+'</td></tr>';
  }).join('');
  var tbody=document.getElementById('lm-tbody');
  if(tbody)tbody.innerHTML=rows||'<tr><td colspan="9" style="text-align:center;padding:20px;color:#888">Nenhum resultado.</td></tr>';
}

var TIPOS_DISTRIB=[
  {id:'proc_val',label:'Validacao de Processo',comissao:5},
  {id:'prec_val',label:'Validacao de Precatorio',comissao:5},
  {id:'cont_val',label:'Validacao de Contrato',comissao:2},
  {id:'capa',label:'Capa a Capa',comissao:10},
  {id:'auditoria',label:'Auditoria',comissao:10}
];
function pageDistrib(){
  var isAdmin=currentUser&&currentUser.role==='admin';
  var advOpts=S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('');
  var tipoOpts=TIPOS_DISTRIB.map(function(t){return'<option value="'+t.id+'">'+t.label+' (R$'+t.comissao+')</option>';}).join('');
  var rows=S.distribValidacao.slice().sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(m,i){
    var an=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    var tp=TIPOS_DISTRIB.find(function(t){return t.id===m.tipo;})||{label:m.tipo||'---',comissao:0};
    var bg=i%2===0?'':'background:#f7faf9';
    var del=isAdmin?'<button onclick="delDistrib('+JSON.stringify(m.id)+')" style="background:none;border:none;color:#c00;cursor:pointer;font-size:16px;padding:0 4px">x</button>':'';
    return'<tr style="'+bg+'"><td style="padding:8px 10px">'+fmtDate(m.data)+'</td><td style="padding:8px 10px">'+esc(m.cliente||'')+'</td><td style="padding:8px 10px">'+an+'</td><td style="padding:8px 10px"><span style="background:#e8f4f2;color:#0D5C52;padding:2px 6px;border-radius:4px;font-size:11px">'+tp.label+'</span></td><td style="padding:8px 10px;text-align:right;color:#1D6B3A;font-weight:600">R$'+tp.comissao+'</td><td style="padding:8px 10px;font-size:11px;color:#666">'+esc(m.obs||'')+'</td><td style="padding:8px 10px">'+del+'</td></tr>';
  }).join('');
  var totalCom=S.distribValidacao.reduce(function(s,m){var t=TIPOS_DISTRIB.find(function(t){return t.id===m.tipo;});return s+(t?t.comissao:0);},0);
  return'<div style="font-size:16px;font-weight:700;color:var(--v);margin-bottom:14px">Distribuicao de Validacoes</div>'+
    '<div style="background:#e8f4f2;border:1px solid #0D5C52;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#0D5C52">'+(isAdmin?'Admin: voce pode cadastrar e excluir.':'Cadastre validacoes realizadas. Apos salvar alimenta calculo de comissoes.')+'</div>'+
    '<div class="st">Novo lancamento</div>'+
    '<div class="card">'+
      '<div class="g2" style="margin-bottom:8px">'+
        '<div class="fg"><label>Data *</label><input type="date" id="dv-data" value="'+todayStr()+'"/></div>'+
        '<div class="fg"><label>Cliente / Processo</label><input type="text" id="dv-cli" placeholder="Nome ou N processo"/></div>'+
        '<div class="fg"><label>Advogado *</label><select id="dv-adv"><option value="">Selecione...</option>'+advOpts+'</select></div>'+
        '<div class="fg"><label>Tipo *</label><select id="dv-tipo">'+tipoOpts+'</select></div>'+
      '</div>'+
      '<div class="fg" style="margin-bottom:12px"><label>Observacao</label><input type="text" id="dv-obs" placeholder="Detalhes (opcional)"/></div>'+
      '<div style="text-align:right"><button class="btn bp" onclick="addDistrib()">+ Registrar Validacao</button></div>'+
    '</div>'+
    '<div class="st">Historico</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
      '<input id="dv-q" placeholder="Buscar..." oninput="filterDistrib()" style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;flex:1;min-width:150px"/>'+
      '<select id="dv-adv-f" onchange="filterDistrib()" style="padding:7px;border:1px solid #ccc;border-radius:6px"><option value="todos">Todos adv.</option>'+advOpts+'</select>'+
      '<select id="dv-tipo-f" onchange="filterDistrib()" style="padding:7px;border:1px solid #ccc;border-radius:6px"><option value="todos">Todos tipos</option>'+TIPOS_DISTRIB.map(function(t){return'<option value="'+t.id+'">'+t.label+'</option>';}).join('')+'</select>'+
    '</div>'+
    '<div style="font-size:12px;color:#555;margin-bottom:10px">Total lancamentos: <strong>'+S.distribValidacao.length+'</strong> | Comissao total: <strong style="color:#1D6B3A">R$'+totalCom+'</strong></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd">'+
    '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--v);color:#fff"><th style="padding:9px 10px;text-align:left">Data</th><th style="padding:9px 10px;text-align:left">Cliente/Processo</th><th style="padding:9px 10px;text-align:left">Advogado</th><th style="padding:9px 10px;text-align:left">Tipo</th><th style="padding:9px 10px;text-align:right">Comissao</th><th style="padding:9px 10px;text-align:left">Obs.</th><th></th></tr></thead>'+
    '<tbody id="dv-tbody">'+(rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#888">Nenhum lancamento.</td></tr>')+'</tbody>'+
    '</table></div>';
}
function addDistrib(){
  var data=document.getElementById('dv-data').value;
  var cli=(document.getElementById('dv-cli').value||'').trim();
  var adv=document.getElementById('dv-adv').value;
  var tipo=document.getElementById('dv-tipo').value;
  var obs=(document.getElementById('dv-obs').value||'').trim();
  if(!data||!adv){alert('Preencha Data e Advogado.');return;}
  S.distribValidacao.push({id:uid(),data:data,cliente:cli,advogadoId:adv,tipo:tipo,obs:obs,criadoPor:currentUser.id});
  atualizarEntriesDistrib(adv);
  saveData();renderContent(12,null);
}
function delDistrib(id){
  if(currentUser.role!=='admin'){showToast('Apenas Admin pode excluir.');return;}
  if(!confirm('Excluir?'))return;
  var adv=(S.distribValidacao.find(function(m){return m.id===id;})||{}).advogadoId;
  S.distribValidacao=S.distribValidacao.filter(function(m){return m.id!==id;});
  if(adv)atualizarEntriesDistrib(adv);
  saveData();renderContent(12,null);
}
function atualizarEntriesDistrib(advId){
  var items=S.distribValidacao.filter(function(m){return m.advogadoId===advId;});
  if(!S.entries[advId])S.entries[advId]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
  S.entries[advId].procValid=items.filter(function(m){return m.tipo==='proc_val'||m.tipo==='prec_val';}).length;
  S.entries[advId].contValid=items.filter(function(m){return m.tipo==='cont_val';}).length;
  S.entries[advId].capaCapa=items.filter(function(m){return m.tipo==='capa';}).length;
  S.entries[advId].auditoria=items.filter(function(m){return m.tipo==='auditoria';}).length;
}
function filterDistrib(){
  var q=(document.getElementById('dv-q')?document.getElementById('dv-q').value:'').toLowerCase();
  var adv=document.getElementById('dv-adv-f')?document.getElementById('dv-adv-f').value:'todos';
  var tipo=document.getElementById('dv-tipo-f')?document.getElementById('dv-tipo-f').value:'todos';
  var isAdmin=currentUser&&currentUser.role==='admin';
  var f=S.distribValidacao.filter(function(m){
    return(!q||(m.cliente||'').toLowerCase().includes(q)||(m.obs||'').toLowerCase().includes(q))
      &&(adv==='todos'||m.advogadoId===adv)&&(tipo==='todos'||m.tipo===tipo);
  }).sort(function(a,b){return(b.data||'').localeCompare(a.data||'');});
  var rows=f.map(function(m,i){
    var an=(S.lawyers.find(function(l){return l.id===m.advogadoId;})||{name:'---'}).name;
    var tp=TIPOS_DISTRIB.find(function(t){return t.id===m.tipo;})||{label:m.tipo||'---',comissao:0};
    var bg=i%2===0?'':'background:#f7faf9';
    var del=isAdmin?'<button onclick="delDistrib('+JSON.stringify(m.id)+')" style="background:none;border:none;color:#c00;cursor:pointer;font-size:16px;padding:0 4px">x</button>':'';
    return'<tr style="'+bg+'"><td style="padding:8px 10px">'+fmtDate(m.data)+'</td><td style="padding:8px 10px">'+esc(m.cliente||'')+'</td><td style="padding:8px 10px">'+an+'</td><td style="padding:8px 10px"><span style="background:#e8f4f2;color:#0D5C52;padding:2px 6px;border-radius:4px;font-size:11px">'+tp.label+'</span></td><td style="padding:8px 10px;text-align:right;color:#1D6B3A;font-weight:600">R$'+tp.comissao+'</td><td style="padding:8px 10px;font-size:11px">'+esc(m.obs||'')+'</td><td style="padding:8px 10px">'+del+'</td></tr>';
  }).join('');
  var tbody=document.getElementById('dv-tbody');
  if(tbody)tbody.innerHTML=rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#888">Nenhum resultado.</td></tr>';
}

var relLiq2Data=null;
function pageRelLiq2(){
  var st=relLiq2Data?relLiq2Data.length+' processos':'Nenhum arquivo';
  return'<div style="font-size:16px;font-weight:700;color:var(--v);margin-bottom:14px">Processos Liquidados (CertJud)</div>'+
    '<div class="card" style="margin-bottom:14px"><label class="imp" for="f-rl2" style="margin-bottom:0"><input type="file" id="f-rl2" class="fhide" accept=".xlsx,.xls" onchange="impRelLiq2(this)"/>'+
    '<div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>'+
    '<div class="imp-text"><div class="imp-title">Importar planilha</div><div class="imp-sub">Cliente / Processo / Dias / Data / Vl. Compra / Vl. Liquidado / Faturamento / Desagio % / Indice</div></div>'+
    '<span class="imp-status" id="rl2-st">'+st+'</span></label></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px"><input id="rl2-q" placeholder="Buscar..." style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;flex:1"/>'+
    '<input type="date" id="rl2-di" style="padding:7px;border:1px solid #ccc;border-radius:6px"/>'+
    '<input type="date" id="rl2-df" style="padding:7px;border:1px solid #ccc;border-radius:6px"/>'+
    '<button class="btn bp" onclick="renderRelLiq2()">Gerar</button></div>'+
    '<div id="rl2-out"><div class="empty">Importe a planilha e clique em Gerar.</div></div>';
}
function impRelLiq2(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    relLiq2Data=rows.filter(function(r){return String(getCol(r,['Cliente','cliente'])||'').trim();}).map(function(r){
      var dv=getCol(r,['Data','data']);var ds='';
      if(dv){try{var d=new Date(String(dv));if(!isNaN(d))ds=d.toISOString().slice(0,10);}catch(e){}}
      return{cliente:String(getCol(r,['Cliente','cliente'])||'').trim(),proc:String(getCol(r,['Processo','processo'])||'').trim(),
        dias:parseValor(getCol(r,['Dias','dias'])||0),data:ds,
        vlComp:parseValor(getCol(r,['Valor Compra','valor compra'])||0),
        vlLiq:parseValor(getCol(r,['Valor Liquidado','valor liquidado'])||0),
        fat:parseValor(getCol(r,['Faturamento','faturamento'])||0),
        des:parseValor(getCol(r,['Desagio','Desagio %','desagio'])||0),
        ind:parseValor(getCol(r,['Indice','indice'])||0)};
    });
    var el=document.getElementById('rl2-st');if(el)el.textContent=relLiq2Data.length+' processos';
    showToast(relLiq2Data.length+' importados!');input.value='';
  });
}
function renderRelLiq2(){
  if(!relLiq2Data||!relLiq2Data.length){document.getElementById('rl2-out').innerHTML='<div class="empty">Importe uma planilha primeiro.</div>';return;}
  var q=(document.getElementById('rl2-q').value||'').toLowerCase();
  var di=document.getElementById('rl2-di').value,df=document.getElementById('rl2-df').value;
  var f=relLiq2Data.filter(function(r){return(!q||(r.cliente||'').toLowerCase().includes(q)||(r.proc||'').toLowerCase().includes(q))&&(!di||r.data>=di)&&(!df||r.data<=df);});
  var tC=f.reduce(function(s,r){return s+r.vlComp;},0),tL=f.reduce(function(s,r){return s+r.vlLiq;},0),tF=f.reduce(function(s,r){return s+r.fat;},0);
  document.getElementById('rl2-out').innerHTML=
    '<div class="metrics" style="margin-bottom:16px">'+
    '<div class="mc"><div class="ml">Processos</div><div class="mv">'+f.length+'</div></div>'+
    '<div class="mc blue"><div class="ml">Vl. Compra</div><div class="mv blue">'+fmt(tC)+'</div></div>'+
    '<div class="mc gold"><div class="ml">Vl. Liquidado</div><div class="mv gold">'+fmt(tL)+'</div></div>'+
    '<div class="mc '+(tF>=0?'green':'red')+'"><div class="ml">Faturamento</div><div class="mv '+(tF>=0?'green':'red')+'">'+fmt(tF)+'</div></div></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--v);color:#fff"><th style="padding:9px">Cliente</th><th style="padding:9px">Processo</th><th style="padding:9px;text-align:right">Dias</th><th style="padding:9px">Data</th><th style="padding:9px;text-align:right">Vl.Compra</th><th style="padding:9px;text-align:right">Vl.Liquidado</th><th style="padding:9px;text-align:right">Faturamento</th><th style="padding:9px;text-align:right">Desagio%</th><th style="padding:9px;text-align:right">Indice</th></tr></thead><tbody>'+
    f.map(function(r,i){var bg=i%2===0?'':'background:#f7faf9';return'<tr style="'+bg+'"><td style="padding:8px">'+esc(r.cliente)+'</td><td style="padding:8px;font-size:11px">'+esc(r.proc)+'</td><td style="padding:8px;text-align:right">'+r.dias+'</td><td style="padding:8px">'+fmtDate(r.data)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlComp)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlLiq)+'</td><td style="padding:8px;text-align:right;color:'+(r.fat>=0?'#1D6B3A':'#c00')+'">'+fmt(r.fat)+'</td><td style="padding:8px;text-align:right">'+r.des.toFixed(2)+'%</td><td style="padding:8px;text-align:right">'+r.ind.toFixed(2)+'</td></tr>';}).join('')+
    '</tbody><tfoot><tr style="background:#f0f0f0;font-weight:700"><td colspan="4" style="padding:9px">TOTAL ('+f.length+')</td><td style="padding:9px;text-align:right">'+fmt(tC)+'</td><td style="padding:9px;text-align:right">'+fmt(tL)+'</td><td style="padding:9px;text-align:right">'+fmt(tF)+'</td><td colspan="2"></td></tr></tfoot></table></div>';
}

var relCompData=null;
function pageRelComp(){
  var st=relCompData?relCompData.length+' processos':'Nenhum arquivo';
  return'<div style="font-size:16px;font-weight:700;color:var(--v);margin-bottom:14px">Processos Comprados por Periodo</div>'+
    '<div class="card" style="margin-bottom:14px"><label class="imp" for="f-rc" style="margin-bottom:0"><input type="file" id="f-rc" class="fhide" accept=".xlsx,.xls" onchange="impRelComp(this)"/>'+
    '<div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>'+
    '<div class="imp-text"><div class="imp-title">Importar planilha</div><div class="imp-sub">Cliente / Processo / Data / Vl. Cliente / Vl. Compra / Prev. Ganho / Desagio %</div></div>'+
    '<span class="imp-status" id="rc-st">'+st+'</span></label></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px"><input id="rc-q" placeholder="Buscar..." style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;flex:1"/>'+
    '<input type="date" id="rc-di" style="padding:7px;border:1px solid #ccc;border-radius:6px"/>'+
    '<input type="date" id="rc-df" style="padding:7px;border:1px solid #ccc;border-radius:6px"/>'+
    '<button class="btn bp" onclick="renderRelComp()">Gerar</button></div>'+
    '<div id="rc-out"><div class="empty">Importe a planilha e clique em Gerar.</div></div>';

function impRelComp(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    relCompData=rows.filter(function(r){return String(getCol(r,['Cliente','cliente'])||'').trim();}).map(function(r){
      var dv=getCol(r,['Data','data']);var ds='';
      if(dv){try{var d=new Date(String(dv));if(!isNaN(d))ds=d.toISOString().slice(0,10);}catch(e){}}
      return{cliente:String(getCol(r,['Cliente','cliente'])||'').trim(),proc:String(getCol(r,['Processo','processo'])||'').trim(),data:ds,
        vlCli:parseValor(getCol(r,['Valor Cliente','valor cliente'])||0),
        vlComp:parseValor(getCol(r,['Valor Compra','valor compra'])||0),
        prevG:parseValor(getCol(r,['Prev. Ganho','prev ganho'])||0),
        des:parseValor(getCol(r,['Desagio','Desagio %','desagio'])||0)};
    });
    var el=document.getElementById('rc-st');if(el)el.textContent=relCompData.length+' processos';
    showToast(relCompData.length+' importados!');input.value='';
  });
}
function renderRelComp(){
  if(!relCompData||!relCompData.length){document.getElementById('rc-out').innerHTML='<div class="empty">Importe primeiro.</div>';return;}
  var q=(document.getElementById('rc-q').value||'').toLowerCase();
  var di=document.getElementById('rc-di').value,df=document.getElementById('rc-df').value;
  var f=relCompData.filter(function(r){return(!q||(r.cliente||'').toLowerCase().includes(q)||(r.proc||'').toLowerCase().includes(q))&&(!di||r.data>=di)&&(!df||r.data<=df);});
  var tCli=f.reduce(function(s,r){return s+r.vlCli;},0),tC=f.reduce(function(s,r){return s+r.vlComp;},0),tG=f.reduce(function(s,r){return s+r.prevG;},0);
  document.getElementById('rc-out').innerHTML=
    '<div class="metrics" style="margin-bottom:16px">'+
    '<div class="mc"><div class="ml">Processos</div><div class="mv">'+f.length+'</div></div>'+
    '<div class="mc gold"><div class="ml">Vl. Cliente</div><div class="mv gold">'+fmt(tCli)+'</div></div>'+
    '<div class="mc blue"><div class="ml">Vl. Compra</div><div class="mv blue">'+fmt(tC)+'</div></div>'+
    '<div class="mc green"><div class="ml">Prev. Ganho</div><div class="mv green">'+fmt(tG)+'</div></div></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--v);color:#fff"><th style="padding:9px">Cliente</th><th style="padding:9px">Processo</th><th style="padding:9px">Data</th><th style="padding:9px;text-align:right">Vl.Cliente</th><th style="padding:9px;text-align:right">Vl.Compra</th><th style="padding:9px;text-align:right">Prev.Ganho</th><th style="padding:9px;text-align:right">Desagio%</th></tr></thead><tbody>'+
    f.map(function(r,i){var bg=i%2===0?'':'background:#f7faf9';return'<tr style="'+bg+'"><td style="padding:8px">'+esc(r.cliente)+'</td><td style="padding:8px;font-size:11px">'+esc(r.proc)+'</td><td style="padding:8px">'+fmtDate(r.data)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlCli)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlComp)+'</td><td style="padding:8px;text-align:right;color:#1D6B3A">'+fmt(r.prevG)+'</td><td style="padding:8px;text-align:right">'+r.des.toFixed(2)+'%</td></tr>';}).join('')+
    '</tbody><tfoot><tr style="background:#f0f0f0;font-weight:700"><td colspan="3" style="padding:9px">TOTAL</td><td style="padding:9px;text-align:right">'+fmt(tCli)+'</td><td style="padding:9px;text-align:right">'+fmt(tC)+'</td><td style="padding:9px;text-align:right">'+fmt(tG)+'</td><td></td></tr></tfoot></table></div>';
}

var relGeralData=null;
var MESES=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function pageRelGeral(){
  var st=relGeralData?relGeralData.length+' linhas':'Nenhum arquivo';
  return'<div style="font-size:16px;font-weight:700;color:var(--v);margin-bottom:14px">Relatorio Geral CertJud</div>'+
    '<div class="card" style="margin-bottom:14px"><label class="imp" for="f-rg" style="margin-bottom:0"><input type="file" id="f-rg" class="fhide" accept=".xlsx,.xls" onchange="impRelGeral(this)"/>'+
    '<div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>'+
    '<div class="imp-text"><div class="imp-title">Importar planilha</div><div class="imp-sub">Ano / Mes / Vl. Processo / Compra Mes / Recebimento Mes / Total / Despesa / Patrimonio Liquido</div></div>'+
    '<span class="imp-status" id="rg-st">'+st+'</span></label></div>'+
    '<div id="rg-out">'+(relGeralData?buildGeralTable():'<div class="empty">Importe a planilha para visualizar.</div>')+'</div>';
}
function impRelGeral(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    relGeralData=rows.filter(function(r){return parseValor(getCol(r,['Ano','ano'])||0)>0;}).map(function(r){
      return{ano:Math.round(parseValor(getCol(r,['Ano','ano'])||0)),mes:Math.round(parseValor(getCol(r,['Mes','Mes','mes'])||0)),
        vlProc:parseValor(getCol(r,['Valor Processo','valor processo'])||0),
        compra:parseValor(getCol(r,['Compra Mes','compra mes'])||0),
        receb:parseValor(getCol(r,['Recebimento Mes','recebimento mes'])||0),
        total:parseValor(getCol(r,['Total','total'])||0),
        desp:parseValor(getCol(r,['Despesa','despesa'])||0),
        pl:parseValor(getCol(r,['Patrimonio','Patrimonio Liquido','patrimonio liquido'])||0)};
    });
    var el=document.getElementById('rg-st');if(el)el.textContent=relGeralData.length+' linhas';
    showToast(relGeralData.length+' linhas importadas!');input.value='';
    var out=document.getElementById('rg-out');if(out)out.innerHTML=buildGeralTable();
  });
}
function buildGeralTable(){
  if(!relGeralData||!relGeralData.length)return'<div class="empty">Sem dados.</div>';
  var lastPL=relGeralData[relGeralData.length-1].pl;
  var tC=relGeralData.reduce(function(s,r){return s+r.compra;},0);
  var tR=relGeralData.reduce(function(s,r){return s+r.receb;},0);
  var tP=relGeralData.reduce(function(s,r){return s+r.vlProc;},0);
  return'<div class="metrics" style="margin-bottom:16px">'+
    '<div class="mc blue"><div class="ml">Vl. Processos</div><div class="mv blue">'+fmt(tP)+'</div></div>'+
    '<div class="mc"><div class="ml">Total Compras</div><div class="mv">'+fmt(tC)+'</div></div>'+
    '<div class="mc gold"><div class="ml">Total Recebimentos</div><div class="mv gold">'+fmt(tR)+'</div></div>'+
    '<div class="mc green"><div class="ml">Patrimonio Liquido Atual</div><div class="mv green">'+fmt(lastPL)+'</div></div></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--v);color:#fff"><th style="padding:9px">Periodo</th><th style="padding:9px;text-align:right">Vl.Processos</th><th style="padding:9px;text-align:right">Compra Mes</th><th style="padding:9px;text-align:right">Recebimento Mes</th><th style="padding:9px;text-align:right">Total Carteira</th><th style="padding:9px;text-align:right">Despesa</th><th style="padding:9px;text-align:right">Patrimonio Liq.</th></tr></thead><tbody>'+
    relGeralData.map(function(r,i){var bg=i%2===0?'':'background:#f7faf9';return'<tr style="'+bg+'"><td style="padding:8px">'+(MESES[r.mes]||r.mes)+'/'+r.ano+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlProc)+'</td><td style="padding:8px;text-align:right">'+fmt(r.compra)+'</td><td style="padding:8px;text-align:right">'+fmt(r.receb)+'</td><td style="padding:8px;text-align:right">'+fmt(r.total)+'</td><td style="padding:8px;text-align:right">'+fmt(r.desp)+'</td><td style="padding:8px;text-align:right;font-weight:700;color:var(--v)">'+fmt(r.pl)+'</td></tr>';}).join('')+
    '</tbody></table></div>';
}

var relPendData=null;
function pageRelPend(){
  var st=relPendData?relPendData.length+' processos':'Nenhum arquivo';
  return'<div style="font-size:16px;font-weight:700;color:var(--v);margin-bottom:14px">Processos Pendentes / Previsao de Entrada</div>'+
    '<div class="card" style="margin-bottom:14px"><label class="imp" for="f-rp" style="margin-bottom:0"><input type="file" id="f-rp" class="fhide" accept=".xlsx,.xls" onchange="impRelPend(this)"/>'+
    '<div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>'+
    '<div class="imp-text"><div class="imp-title">Importar planilha</div><div class="imp-sub">Cliente / Processo / Data / Vl. Cliente / Vl. Compra / Prev. Ganho / Prev. Entrada / Desagio %</div></div>'+
    '<span class="imp-status" id="rp-st">'+st+'</span></label></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px"><input id="rp-q" placeholder="Buscar..." style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;flex:1"/>'+
    '<button class="btn bp" onclick="renderRelPend()">Gerar</button></div>'+
    '<div id="rp-out"><div class="empty">Importe a planilha e clique em Gerar.</div></div>';
}
function impRelPend(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    relPendData=rows.filter(function(r){return String(getCol(r,['Cliente','cliente'])||'').trim();}).map(function(r){
      var dv=getCol(r,['Data','data']);var ds='';
      if(dv){try{var d=new Date(String(dv));if(!isNaN(d))ds=d.toISOString().slice(0,10);}catch(e){}}
      return{cliente:String(getCol(r,['Cliente','cliente'])||'').trim(),proc:String(getCol(r,['Processo','processo'])||'').trim(),data:ds,
        vlCli:parseValor(getCol(r,['Valor Cliente','valor cliente'])||0),
        vlComp:parseValor(getCol(r,['Valor Compra','valor compra'])||0),
        prevG:parseValor(getCol(r,['Prev. Ganho','prev ganho'])||0),
        prevE:parseValor(getCol(r,['Prev. Entrada','prev entrada'])||0),
        des:parseValor(getCol(r,['Desagio','Desagio %','desagio'])||0)};
    });
    var el=document.getElementById('rp-st');if(el)el.textContent=relPendData.length+' processos';
    showToast(relPendData.length+' importados!');input.value='';
  });
}
function renderRelPend(){
  if(!relPendData||!relPendData.length){document.getElementById('rp-out').innerHTML='<div class="empty">Importe primeiro.</div>';return;}
  var q=(document.getElementById('rp-q').value||'').toLowerCase();
  var f=relPendData.filter(function(r){return!q||(r.cliente||'').toLowerCase().includes(q)||(r.proc||'').toLowerCase().includes(q);});
  var tCli=f.reduce(function(s,r){return s+r.vlCli;},0),tC=f.reduce(function(s,r){return s+r.vlComp;},0),tG=f.reduce(function(s,r){return s+r.prevG;},0),tE=f.reduce(function(s,r){return s+r.prevE;},0);
  document.getElementById('rp-out').innerHTML=
    '<div class="metrics" style="margin-bottom:16px">'+
    '<div class="mc"><div class="ml">Pendentes</div><div class="mv">'+f.length+'</div></div>'+
    '<div class="mc gold"><div class="ml">Vl. Cliente</div><div class="mv gold">'+fmt(tCli)+'</div></div>'+
    '<div class="mc blue"><div class="ml">Vl. Compra</div><div class="mv blue">'+fmt(tC)+'</div></div>'+
    '<div class="mc green"><div class="ml">Prev. Ganho</div><div class="mv green">'+fmt(tG)+'</div></div></div>'+
    '<div style="overflow-x:auto;border-radius:8px;border:1px solid #ddd"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--v);color:#fff"><th style="padding:9px">Cliente</th><th style="padding:9px">Processo</th><th style="padding:9px">Data</th><th style="padding:9px;text-align:right">Vl.Cliente</th><th style="padding:9px;text-align:right">Vl.Compra</th><th style="padding:9px;text-align:right">Prev.Ganho</th><th style="padding:9px;text-align:right">Prev.Entrada</th><th style="padding:9px;text-align:right">Desagio%</th></tr></thead><tbody>'+
    f.map(function(r,i){var bg=i%2===0?'':'background:#f7faf9';return'<tr style="'+bg+'"><td style="padding:8px">'+esc(r.cliente)+'</td><td style="padding:8px;font-size:11px">'+esc(r.proc)+'</td><td style="padding:8px">'+fmtDate(r.data)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlCli)+'</td><td style="padding:8px;text-align:right">'+fmt(r.vlComp)+'</td><td style="padding:8px;text-align:right;color:#1D6B3A">'+fmt(r.prevG)+'</td><td style="padding:8px;text-align:right;color:'+(r.prevE<0?'#c00':'#555')+'">'+fmt(r.prevE)+'</td><td style="padding:8px;text-align:right">'+r.des.toFixed(2)+'%</td></tr>';}).join('')+
    '</tbody><tfoot><tr style="background:#f0f0f0;font-weight:700"><td colspan="3" style="padding:9px">TOTAL</td><td style="padding:9px;text-align:right">'+fmt(tCli)+'</td><td style="padding:9px;text-align:right">'+fmt(tC)+'</td><td style="padding:9px;text-align:right">'+fmt(tG)+'</td><td style="padding:9px;text-align:right">'+fmt(tE)+'</td><td></td></tr></tfoot></table></div>';
}

</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--v:#0D5C52;--vd:#083f38;--vl:#E6F2F0;--d:#B8860B;--dl:#FDF6E3;--dm:#C9970D;--bd:#d0dbd9;--tx:#1c1c1c;--mt:#5e7572;--bg:#f0f3f2;--red:#A32D2D;--redl:#FCEBEB}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v)}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
.login-title{font-size:20px;font-weight:700;color:var(--v)}
.login-sub{font-size:12px;color:var(--mt);margin-top:2px}
.lf{margin-bottom:16px}
.lf label{font-size:12px;color:var(--mt);display:block;margin-bottom:5px;font-weight:600}
.lf input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 13px;font-size:14px;outline:none}
.lf input:focus{border-color:var(--v)}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{background:var(--vd)}
.login-err{background:var(--redl);color:var(--red);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:14px;display:none}

/* HEADER */
.hdr{background:var(--v);padding:0 28px;display:flex;align-items:center;height:60px;gap:14px;position:sticky;top:0;z-index:200}
.logo-wrap{display:flex;align-items:center;gap:12px;flex:1}
.hdr-title{color:#fff;font-size:15px;font-weight:700;line-height:1.25}
.hdr-sub{color:rgba(255,255,255,.5);font-size:11px;display:block}
.hdr-period{color:rgba(255,255,255,.6);font-size:12px}
.hdr-user{color:rgba(255,255,255,.8);font-size:12px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px}
input[type=month]{padding:6px 10px;border-radius:6px;border:none;font-size:12px;background:rgba(255,255,255,.18);color:#fff;outline:none;cursor:pointer}
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7}
.btn-calc{background:var(--d);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.btn-calc:hover{background:var(--dm)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.25)}

/* TABS */
.tabs{background:#fff;border-bottom:1px solid var(--bd);display:flex;padding:0 28px;position:sticky;top:60px;z-index:190;overflow-x:auto}
.tb{padding:13px 18px;font-size:13px;color:var(--mt);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap}
.tb:hover{color:var(--v)}
.tb.on{color:var(--v);border-bottom-color:var(--d)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:24px 28px;min-height:calc(100vh - 120px)}
.st{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px}
.st:first-child{margin-top:0}
.card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:14px}

/* IMPORT BANNER */
.imp{display:flex;align-items:center;gap:12px;background:var(--dl);border:1.5px dashed var(--d);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer}
.imp:hover{background:#faeec4}
.imp-icon{width:34px;height:34px;background:var(--d);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.imp-icon svg{width:18px;height:18px;fill:#fff}
.imp-text{flex:1}
.imp-title{font-size:13px;font-weight:700;color:var(--d)}
.imp-sub{font-size:11px;color:var(--mt);margin-top:2px}
.imp-status{font-size:11px;font-weight:700;color:var(--v);background:var(--vl);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
input.fhide{display:none}

/* FORM */
.frow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fg label{font-size:12px;color:var(--mt)}
.fg input,.fg select,.fg textarea{border:.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:#fff;outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fg textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:6px;font-size:13px;border:.5px solid #ccc;background:#fff;cursor:pointer;color:var(--tx);font-weight:500;white-space:nowrap}
.btn:hover{background:var(--vl)}
.bp{background:var(--v);color:#fff;border-color:var(--v)}
.bp:hover{background:var(--vd)}
.bd2{color:var(--red);border-color:#e8b4b4;padding:4px 10px;font-size:11px}
.bd2:hover{background:var(--redl)}
.bg2{background:#1D6B3A;color:#fff;border-color:#1D6B3A}
.bg2:hover{background:#145229}
.bsm{padding:4px 12px;font-size:12px}
.div{height:.5px;background:#eef1f0;margin:14px 0}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:8px 11px;text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:7px 11px;border-bottom:.5px solid #eef1f0;vertical-align:middle}
.tbl td.r{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f7faf9}
.tbl tr:hover td{background:#edf5f3}
.tbl tr.foot td{background:var(--v);color:#fff;font-weight:700}
.dbtn{color:var(--red);background:none;border:none;cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.ebtn{color:var(--v);background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;line-height:1}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.b-tot{background:var(--vl);color:var(--v)}
.b-par{background:var(--dl);color:var(--d)}
.b-pend{background:#EEF3FB;color:#185FA5}
.b-red{background:var(--redl);color:var(--red)}
.b-green{background:#E6F4EC;color:#1D6B3A}
.admin-badge{background:var(--d);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.mc{background:var(--vl);border-radius:8px;padding:13px 15px}
.mc.gold{background:var(--dl)}
.mc.blue{background:#EEF3FB}
.mc.red{background:var(--redl)}
.ml{font-size:11px;color:var(--mt);margin-bottom:4px}
.mv{font-size:20px;font-weight:700;color:var(--v)}
.mv.gold{color:var(--d)}
.mv.blue{color:#185FA5}
.mv.red{color:var(--red)}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:18px 20px}
.chart-title{font-size:13px;font-weight:700;color:var(--v);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--mt);margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.chart-full{grid-column:1/-1}
.chart-wrap-tall{position:relative;height:300px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:16px;font-weight:700;color:var(--v);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mt)}
.modal-close:hover{color:var(--red)}

/* RANK */
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:12px}
.rank-row:last-child{border-bottom:none}

}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseValor(v){if(typeof v==='number')return v;var s=String(v||'').trim().replace(/[R$ ]/g,'').replace(/[.]/g,'').replace(',','.');return parseFloat(s)||0;}
function getCol(row,keys){for(var i=0;i<keys.length;i++){for(var k in row){if(k.trim().toLowerCase()===keys[i].trim().toLowerCase())return row[k];}}return null;}
function fmt(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){if(v>=1000000)return'R$ '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'R$ '+(v/1000).toFixed(0)+'k';return fmt(v);}
function ini(n){return(n||'?').trim().split(' ').slice(0,2).map(function(x){return x[0].toUpperCase();}).join('');}
function avSt(i){var c=AVC[i%AVC.length];return'background:'+c.bg+';color:'+c.c+';';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
function normAdv(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function readXlsx(file,cb){var r=new FileReader();r.onload=function(e){var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});var ws=wb.Sheets[wb.SheetNames[0]];cb(XLSX.utils.sheet_to_json(ws,{defval:''}));};r.readAsArrayBuffer(file);}
function fmtDate(d){if(!d)return'—';var dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('pt-BR');}
function todayStr(){return new Date().toISOString().slice(0,10);}

function renderContent(n,btn){

function updPeriod(){

// ═══════════════════════════════════════════════════════════
// DASHBOARD

function pageDashboard(){
  var importHtml=currentUser.role==='admin'?`
  <div class="st">Importar planilha de liquidados</div>
  <label class="imp" for="file-dash">
    <input type="file" id="file-dash" class="fhide" accept=".xlsx,.xls" onchange="importDashboard(this)"/>
    <div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>
    <div class="imp-text"><div class="imp-title">Importar Liquidados (.xlsx)</div><div class="imp-sub">Ou use os processos cadastrados manualmente na aba Processos</div></div>
    <span class="imp-status" id="dash-status">`+(S.dashData?S.dashData.length+' proc':'Nenhum arquivo')+`</span>
  </label>`:'';

  // Build data from manual processos too
  var allData=buildDashDataFromProcessos();

  return importHtml+`
  <div class="metrics">
    <div class="mc"><div class="ml">Total liquidado</div><div class="mv" id="kpi-total">—</div><div style="font-size:11px;color:var(--mt)" id="kpi-proc">— processos</div></div>
    <div class="mc gold"><div class="ml">Liquidação total</div><div class="mv gold" id="kpi-tot-val">—</div><div style="font-size:11px;color:var(--mt)" id="kpi-tot-qtd">— processos</div></div>
    <div class="mc"><div class="ml">Liquidação parcial</div><div class="mv" id="kpi-par-val">—</div><div style="font-size:11px;color:var(--mt)" id="kpi-par-qtd">— processos</div></div>
    <div class="mc blue"><div class="ml">Previsão a receber</div><div class="mv blue" id="kpi-prev">—</div><div style="font-size:11px;color:var(--mt)" id="kpi-prev-qtd">— processos</div></div>
  </div>

    <div class="chart-card"><div class="chart-title">Volume: total vs parcial</div><div class="chart-sub">Valor em R$ por tipo</div><div class="chart-wrap"><canvas id="chart-tipo-val"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Processos por tipo</div><div class="chart-sub">Quantidade</div><div class="chart-wrap"><canvas id="chart-tipo-qtd"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card chart-full"><div class="chart-title">Volume liquidado por advogado</div><div class="chart-sub">Total vs Parcial em R$</div><div class="chart-wrap-tall"><canvas id="chart-adv-bar"></canvas></div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">Participação % — Liquidação Total</div><div class="chart-sub">Por advogado</div><div class="chart-wrap"><canvas id="chart-pie-tot"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Participação % — Liquidação Parcial</div><div class="chart-sub">Por advogado</div><div class="chart-wrap"><canvas id="chart-pie-par"></canvas></div></div>
  </div>
  <div class="card" id="dash-ranking"><div class="empty">Importe a planilha ou cadastre processos para ver o ranking.</div></div>`;
}

function buildDashDataFromProcessos(){
  var data=[];
  S.processos.forEach(function(p){
    if(!p.recebimentos||!p.recebimentos.length)return;
    var totalRec=p.recebimentos.reduce(function(s,r){return s+(r.valor||0);},0);
    var tipo=p.status==='liquidado_parcial'?'Parcial':'Total';
    var advName=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'?'}).name;
    data.push({adv:normAdv(advName),val:totalRec,tipo:tipo});
  });
  return data;
}

function importDashboard(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var data=[];
    rows.forEach(function(r){
      var adv=normAdv(r['ADVOGADO']||r['Advogado']||'');
      var val=parseFloat(r['VALOR']||r['Valor']||0)||0;
      var liq=String(r['LIQUIDAÇÃO']||r['Liquidação']||r['LIQUIDACAO']||'').trim().toUpperCase();
      if(!adv||adv==='ADVOGADO')return;
      data.push({adv:adv,val:val,tipo:liq.includes('PARCIAL')?'Parcial':'Total'});
    });
    S.dashData=data;
    var el=document.getElementById('dash-status');if(el)el.textContent=data.length+' proc';
    saveData();renderDashboardCharts(data);input.value='';
  });
}

function renderDashboardCharts(data){
  if(!data||!data.length){
    // try from processos
    data=buildDashDataFromProcessos();
    if(!data.length)return;
  }
  var total=data.reduce(function(s,r){return s+r.val;},0);
  var totLiq=data.filter(function(r){return r.tipo==='Total';});
  var parLiq=data.filter(function(r){return r.tipo==='Parcial';});
  var valTot=totLiq.reduce(function(s,r){return s+r.val;},0);
  var valPar=parLiq.reduce(function(s,r){return s+r.val;},0);
  var advSet=new Set(data.map(function(r){return r.adv;}));

  // Previsão from processos
  var prevTotal=S.processos.filter(function(p){return p.status==='pendente';}).reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var prevQtd=S.processos.filter(function(p){return p.status==='pendente';}).length;

  function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  set('kpi-total',fmt(total));set('kpi-proc',data.length+' processos');
  set('kpi-tot-val',fmt(valTot));set('kpi-tot-qtd',totLiq.length+' processos');
  set('kpi-par-val',fmt(valPar));set('kpi-par-qtd',parLiq.length+' processos');
  set('kpi-prev',fmt(prevTotal));set('kpi-prev-qtd',prevQtd+' processos');

  var advMap={};
  data.forEach(function(r){if(!advMap[r.adv])advMap[r.adv]={tot:0,par:0,qtdTot:0,qtdPar:0};if(r.tipo==='Total'){advMap[r.adv].tot+=r.val;advMap[r.adv].qtdTot++;}else{advMap[r.adv].par+=r.val;advMap[r.adv].qtdPar++;}});
  var advArr=Object.keys(advMap).map(function(k){return{name:k,tot:advMap[k].tot,par:advMap[k].par,qtdTot:advMap[k].qtdTot,qtdPar:advMap[k].qtdPar,total:advMap[k].tot+advMap[k].par};});
  advArr.sort(function(a,b){return b.total-a.total;});
  var labels=advArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();});

  function mkChart(id,type,d2,opts){var el=document.getElementById(id);if(!el)return;if(charts[id]){charts[id].destroy();delete charts[id];}charts[id]=new Chart(el,{type:type,data:d2,options:opts});}
  var pieOpts=function(ttFn){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ttFn}}}};};

  mkChart('chart-tipo-val','doughnut',{labels:['Total','Parcial'],datasets:[{data:[Math.round(valTot*100)/100,Math.round(valPar*100)/100],backgroundColor:['#0D5C52','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+fmt(c.parsed)+' ('+((c.parsed/total)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-tipo-qtd','doughnut',{labels:['Total','Parcial'],datasets:[{data:[totLiq.length,parLiq.length],backgroundColor:['#0D5C52','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.parsed+' processos ('+((c.parsed/data.length)*100).toFixed(1)+'%)';}}}}}); 
  mkChart('chart-adv-bar','bar',{labels:labels,datasets:[{label:'Liq. Total',data:advArr.map(function(x){return Math.round(x.tot*100)/100;}),backgroundColor:'#0D5C52',borderRadius:3,borderSkipped:false},{label:'Liq. Parcial',data:advArr.map(function(x){return Math.round(x.par*100)/100;}),backgroundColor:'#B8860B',borderRadius:3,borderSkipped:false}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},padding:14,boxWidth:12}},tooltip:{callbacks:{label:function(c){return' '+c.dataset.label+': '+fmt(c.parsed.y);}}}},scales:{x:{stacked:true,ticks:{font:{size:11},color:'#5e7572'},grid:{display:false}},y:{stacked:true,ticks:{callback:function(v){return fmtK(v);},font:{size:11},color:'#5e7572'},grid:{color:'#eef1f0'}}}});
  var parAdvArr=advArr.filter(function(x){return x.par>0;});
  mkChart('chart-pie-tot','doughnut',{labels:labels,datasets:[{data:advArr.map(function(x){return Math.round(x.tot*100)/100;}),backgroundColor:PC.slice(0,advArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valTot>0?(c.parsed/valTot*100).toFixed(1):0)+'%)';}));
  mkChart('chart-pie-par','doughnut',{labels:parAdvArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();}),datasets:[{data:parAdvArr.map(function(x){return Math.round(x.par*100)/100;}),backgroundColor:PC.slice(0,parAdvArr.length),borderWidth:2,borderColor:'#fff'}]},pieOpts(function(c){return' '+fmt(c.parsed)+' ('+(valPar>0?(c.parsed/valPar*100).toFixed(1):0)+'%)';}));

  var maxVal=advArr[0]?advArr[0].total:1;
  var rrows=advArr.map(function(x,i){
    var pct=(total>0?x.total/total*100:0).toFixed(1);
    var pctT=(valTot>0?x.tot/valTot*100:0).toFixed(1);
    var pctP=(valPar>0?x.par/valPar*100:0).toFixed(1);
    return'<div class="rank-row"><div class="rank-n">'+(i+1)+'</div>'+
    '<div class="rank-name">'+x.name.charAt(0)+x.name.slice(1).toLowerCase()+
    ' <span class="badge b-tot">'+x.qtdTot+'T</span><span class="badge b-par" style="margin-left:3px">'+x.qtdPar+'P</span></div>'+
    '<div class="rank-bar-bg"><div class="rank-bar-fill" style="width:'+(x.total/maxVal*100).toFixed(0)+'%;background:'+PC[i%PC.length]+'"></div></div>'+
    '<div class="rank-val">'+fmt(x.total)+'</div><div class="rank-pct">'+pct+'%</div>'+
    '<div class="rank-val" style="color:#0D5C52">'+fmt(x.tot)+'</div><div class="rank-pct" style="color:#0D5C52">'+pctT+'%</div>'+
    '<div class="rank-val" style="color:#B8860B">'+fmt(x.par)+'</div><div class="rank-pct" style="color:#B8860B">'+pctP+'%</div></div>';
  }).join('');
  var el=document.getElementById('dash-ranking');
  if(el)el.innerHTML='<div class="rank-row" style="border-bottom:1.5px solid var(--v);padding-bottom:6px;font-size:10px;font-weight:700;color:var(--mt)"><div style="width:20px"></div><div style="flex:1">Advogado</div><div style="width:100px"></div><div style="width:90px;text-align:right">Total geral</div><div style="width:38px;text-align:right">%</div><div style="width:90px;text-align:right;color:#0D5C52">Liq. Total</div><div style="width:38px;text-align:right;color:#0D5C52">%</div><div style="width:90px;text-align:right;color:#B8860B">Liq. Parcial</div><div style="width:38px;text-align:right;color:#B8860B">%</div></div>'+rrows;
}

function filterProcTable(){
  var q=(document.getElementById('proc-search').value||'').toLowerCase();
  var st=document.getElementById('proc-status-filter').value;
  var adv=document.getElementById('proc-adv-filter').value;
  var rows='';
  var filtered=S.processos.filter(function(p){
    var advName=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||''}).name;
    var matchQ=!q||(p.numero||'').toLowerCase().includes(q)||(p.cliente||'').toLowerCase().includes(q)||advName.toLowerCase().includes(q);
    var matchSt=st==='todos'||p.status===st;
    var matchAdv=adv==='todos'||p.advogadoId===adv;
    return matchQ&&matchSt&&matchAdv;
  });
  rows=filtered.map(function(p){
    var advN=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var totalRec=p.recebimentos?p.recebimentos.reduce(function(s,r){return s+(r.valor||0);},0):0;
    var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':p.status==='liquidado_parcial'?'<span class="badge b-par">Parcial</span>':'<span class="badge b-pend">Pendente</span>';
    return'<tr><td style="font-size:11px">'+p.numero+'</td><td>'+p.cliente+'</td><td>'+advN+'</td><td>'+sb+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+fmt(totalRec)+'</td><td>'+fmtDate(p.dataCompra)+'</td><td style="white-space:nowrap"><button class="ebtn" onclick="modalRecebimentos(\''+p.id+'\')">💰</button><button class="ebtn" onclick="modalEditProc(\''+p.id+'\')">✏️</button><button class="dbtn" onclick="deleteProc(\''+p.id+'\')">×</button></td></tr>';
  }).join('');
  if(!rows)rows='<tr><td colspan="9" class="empty">Nenhum resultado.</td></tr>';
  document.getElementById('proc-tbody').innerHTML=rows;
}

function getAdvOpts(sel){
  return S.lawyers.map(function(l){return'<option value="'+l.id+'"'+(sel===l.id?' selected':'')+'>'+l.name+'</option>';}).join('');

function calcVComp(){
  var vcli=parseFloat(document.getElementById('m-vcli').value)||0;
  var pct=parseFloat(document.getElementById('m-pcomp').value)||0;
  if(vcli&&pct){document.getElementById('m-vcomp').value=(vcli*pct/100).toFixed(2);}
}

function salvarProc(id){
  var num=document.getElementById('m-num').value.trim();
  var cli=document.getElementById('m-cli').value.trim();
  var adv=document.getElementById('m-adv').value;
  if(!num||!cli||!adv){alert('Preencha N° Processo, Cliente e Advogado.');return;}
  var proc={
    id:id||uid(),numero:num,cliente:cli,advogadoId:adv,
    atendente:document.getElementById('m-ate').value.trim(),
    reu:document.getElementById('m-reu').value.trim(),
    materia:document.getElementById('m-mat').value.trim(),
    foro:document.getElementById('m-foro').value.trim(),
    comarca:document.getElementById('m-com').value.trim(),
    vara:document.getElementById('m-var').value.trim(),
    estado:document.getElementById('m-est').value.trim(),
    dataCompra:document.getElementById('m-datc').value,
    valorCondenacao:parseFloat(document.getElementById('m-vcond').value)||0,
    valorCliente:parseFloat(document.getElementById('m-vcli').value)||0,
    percCompra:parseFloat(document.getElementById('m-pcomp').value)||0,
    valorCompra:parseFloat(document.getElementById('m-vcomp').value)||0,
    status:'pendente',recebimentos:[]
  };
  if(id){var idx=S.processos.findIndex(function(p){return p.id===id;});if(idx>=0){proc.status=S.processos[idx].status;proc.recebimentos=S.processos[idx].recebimentos;S.processos[idx]=proc;}}
  else{S.processos.push(proc);}
  closeModal();saveData();renderContent(currentTabIdx);
}

function modalRecebimentos(procId){
  var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;

function renderModalRec(p){
  var recs=p.recebimentos||[];
  var totalRec=recs.reduce(function(s,r){return s+(r.valor||0);},0);
  var faturamento=totalRec-(p.valorCompra||0);
  var rrows=recs.map(function(r){
    return'<tr><td>'+fmtDate(r.data)+'</td><td>'+r.banco+'</td><td class="r">'+fmt(r.valor)+'</td><td class="r">'+(r.valorDevolucao?fmt(r.valorDevolucao):'—')+'</td><td><button class="dbtn" onclick="deleteRec(\''+p.id+'\',\''+r.id+'\')">×</button></td></tr>';
  }).join('');
  var statusOpts=['pendente','liquidado_total','liquidado_parcial'].map(function(s){return'<option value="'+s+'"'+(p.status===s?' selected':'')+'>'+{pendente:'Pendente',liquidado_total:'Liquidado Total',liquidado_parcial:'Liquidado Parcial'}[s]+'</option>';}).join('');

  showModal(`
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-title">Recebimentos — ${p.numero}</div>
  <div style="background:var(--vl);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px">
    <div style="font-weight:600;margin-bottom:4px">${p.cliente}</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <span>Vl. Condenação: <strong>${fmt(p.valorCondenacao)}</strong></span>
      <span>Vl. Compra: <strong>${fmt(p.valorCompra)}</strong></span>
      <span>Total Recebido: <strong>${fmt(totalRec)}</strong></span>
      <span>Faturamento: <strong style="color:${faturamento>=0?'#1D6B3A':'#A32D2D'}">${fmt(faturamento)}</strong></span>
    </div>
  </div>
  <div class="fg" style="max-width:220px;margin-bottom:16px">
    <label>Status do processo</label>
    <select id="proc-status-sel" onchange="updateProcStatus('${p.id}',this.value)">${statusOpts}</select>
  </div>
  <div class="st" style="margin-top:0">Novo recebimento</div>
  <div class="g4" style="margin-bottom:12px">
    <div class="fg"><label>Data *</label><input type="date" id="rec-data" value="${todayStr()}"/></div>
    <div class="fg"><label>Banco *</label><input type="text" id="rec-banco" placeholder="Ex: Banco Genial"/></div>
    <div class="fg"><label>Valor (R$) *</label><input type="number" id="rec-valor" min="0" step="0.01" placeholder="0,00"/></div>
    <div class="fg"><label>Valor Devolução</label><input type="number" id="rec-dev" min="0" step="0.01" placeholder="0,00"/></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <button class="btn bp" onclick="addRec('${p.id}')">+ Adicionar Recebimento</button>
  </div>
  <table class="tbl">
    <thead><tr><th>Data</th><th>Banco</th><th class="r">Valor</th><th class="r">Vl. Devolução</th><th>Ação</th></tr></thead>
    <tbody>${rrows||'<tr><td colspan="5" class="empty">Nenhum recebimento.</td></tr>'}</tbody>
  </table>
  <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px">
    <button class="btn" onclick="closeModal()">Fechar</button>
  </div>`);
}

function updateProcStatus(id,status){
  var p=S.processos.find(function(x){return x.id===id;});if(p){p.status=status;saveData();}
}

function addRec(procId){
  var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;
  var data=document.getElementById('rec-data').value;
  var banco=document.getElementById('rec-banco').value.trim();
  var valor=parseFloat(document.getElementById('rec-valor').value)||0;
  var dev=parseFloat(document.getElementById('rec-dev').value)||0;
  if(!data||!banco||!valor){alert('Preencha Data, Banco e Valor.');return;}
  if(!p.recebimentos)p.recebimentos=[];
  p.recebimentos.push({id:uid(),data:data,banco:banco,valor:valor,valorDevolucao:dev||null});
  saveData();renderModalRec(p);
}

function deleteRec(procId,recId){
  var p=S.processos.find(function(x){return x.id===procId;});if(!p)return;
  p.recebimentos=p.recebimentos.filter(function(r){return r.id!==recId;});
  saveData();renderModalRec(p);
}

// Importa planilha geral de liquidados para o relatório (sem filtro por advogado)
function importRelLiqGeral(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var data=[];
    rows.forEach(function(r){
      var adv=normAdv(r['ADVOGADO']||r['Advogado']||'');
      var val=parseFloat(r['VALOR']||r['Valor']||0)||0;
      var liq=String(r['LIQUIDAÇÃO']||r['Liquidação']||r['LIQUIDACAO']||'').trim();
      var proc=String(r['PROCESSOS']||r['Processo']||'').trim();
      var datRaw=r['DATA']||r['Data']||'';
      var dat='';
      if(datRaw){
        try{
          var d=new Date(datRaw);
          if(!isNaN(d))dat=d.toISOString().slice(0,10);
        }catch(e){}
      }
      if(!adv||adv==='ADVOGADO')return;
      data.push({
        adv:adv,
        advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),
        proc:proc,
        val:val,
        tipo:liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total',
        data:dat
      });
    });
    relLiqImportData=data;
    var el=document.getElementById('rel-liq-status');
    if(el)el.textContent=data.length+' processos importados';
    showToast(data.length+' processos importados!');
    input.value='';
  });
}

function renderRelLiq(){
  var tipo=document.getElementById('liq-tipo-filter').value;
  var advFiltId=document.getElementById('liq-adv-filter').value;
  var dtIni=document.getElementById('liq-dt-ini').value;
  var dtFim=document.getElementById('liq-dt-fim').value;

  // Decide fonte: importados ou cadastrados
  var usandoImport=relLiqImportData&&relLiqImportData.length>0&&(tipo==='todos'||tipo==='Total'||tipo==='Parcial');
  var usandoCadastro=!usandoImport||(tipo==='liquidado_total'||tipo==='liquidado_parcial');

  var html='';

  // ── Bloco 1: dados importados via xlsx ──────────────────
  if(usandoImport&&(tipo==='todos'||tipo==='Total'||tipo==='Parcial')){
    var filtImport=relLiqImportData.filter(function(r){
      if(tipo!=='todos'&&r.tipo!==tipo)return false;
      // filtro advogado por nome normalizado
      if(advFiltId!=='todos'){
        var l=S.lawyers.find(function(x){return x.id===advFiltId;});
        if(l){var fn=normAdv(l.name).split(' ')[0];if(!r.adv.startsWith(fn))return false;}
      }
      if(dtIni&&r.data&&r.data<dtIni)return false;
      if(dtFim&&r.data&&r.data>dtFim)return false;
      return true;
    });

    if(filtImport.length){
      var totVal=filtImport.reduce(function(s,r){return s+r.val;},0);
      var totTot=filtImport.filter(function(r){return r.tipo==='Total';}).reduce(function(s,r){return s+r.val;},0);
      var totPar=filtImport.filter(function(r){return r.tipo==='Parcial';}).reduce(function(s,r){return s+r.val;},0);
      var qtdTot=filtImport.filter(function(r){return r.tipo==='Total';}).length;
      var qtdPar=filtImport.filter(function(r){return r.tipo==='Parcial';}).length;

      // Agrupar por advogado
      var byAdv={};
      filtImport.forEach(function(r){
        if(!byAdv[r.adv])byAdv[r.adv]={nome:r.advNome,tot:0,par:0,qtdTot:0,qtdPar:0,rows:[]};
        if(r.tipo==='Total'){byAdv[r.adv].tot+=r.val;byAdv[r.adv].qtdTot++;}
        else{byAdv[r.adv].par+=r.val;byAdv[r.adv].qtdPar++;}
        byAdv[r.adv].rows.push(r);
      });

      var procRows=filtImport.map(function(r){
        var sb=r.tipo==='Total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';
        return'<tr><td>'+r.advNome+'</td><td style="font-size:10px">'+r.proc+'</td><td>'+sb+'</td>'+
          '<td class="r">'+fmt(r.val)+'</td>'+
          '<td>'+fmtDate(r.data)+'</td></tr>';
      }).join('');

      // Resumo por advogado
      var advRows=Object.keys(byAdv).sort().map(function(k){
        var a=byAdv[k];
        var total=a.tot+a.par;
        var pct=(totVal>0?total/totVal*100:0).toFixed(1);
        return'<tr><td>'+a.nome+'</td>'+
          '<td class="r">'+a.qtdTot+'</td><td class="r">'+fmt(a.tot)+'</td>'+
          '<td class="r">'+a.qtdPar+'</td><td class="r">'+fmt(a.par)+'</td>'+
          '<td class="r"><strong>'+fmt(total)+'</strong></td>'+
          '<td class="r">'+pct+'%</td></tr>';
      }).join('');

      html+=`
      <div class="metrics" style="margin-bottom:16px">
        <div class="mc"><div class="ml">Total processos</div><div class="mv">${filtImport.length}</div></div>
        <div class="mc gold"><div class="ml">Total liquidado</div><div class="mv gold">${fmt(totVal)}</div></div>
        <div class="mc"><div class="ml">Liq. Total (${qtdTot})</div><div class="mv">${fmt(totTot)}</div></div>
        <div class="mc blue"><div class="ml">Liq. Parcial (${qtdPar})</div><div class="mv blue">${fmt(totPar)}</div></div>
      </div>

      <div class="st">Resumo por advogado</div>
      <div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">
        <table class="tbl">
          <thead><tr><th>Advogado</th><th class="r">Qtd Total</th><th class="r">Vl. Total</th><th class="r">Qtd Parcial</th><th class="r">Vl. Parcial</th><th class="r">Total Geral</th><th class="r">%</th></tr></thead>
          <tbody>${advRows}</tbody>
          <tfoot><tr class="foot"><td>TOTAL</td>
            <td class="r">${qtdTot}</td><td class="r">${fmt(totTot)}</td>
            <td class="r">${qtdPar}</td><td class="r">${fmt(totPar)}</td>
            <td class="r">${fmt(totVal)}</td><td class="r">100%</td>
          </tr></tfoot>
        </table>
      </div>

      <div class="st">Detalhe por processo</div>
      <div class="card" style="padding:0;overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Advogado</th><th>N° Processo</th><th>Tipo</th><th class="r">Valor</th><th>Data</th></tr></thead>
          <tbody>${procRows}</tbody>
          <tfoot><tr class="foot"><td colspan="3">TOTAL</td><td class="r">${fmt(totVal)}</td><td></td></tr></tfoot>
        </table>
      </div>`;
    } else {
      html+='<div class="empty">Nenhum registro encontrado com os filtros aplicados na planilha importada.</div>';
    }
  }

  // ── Bloco 2: processos cadastrados manualmente ──────────
  if(!usandoImport||(tipo==='liquidado_total'||tipo==='liquidado_parcial')){
    var tipoFiltCad=tipo==='liquidado_total'?'liquidado_total':tipo==='liquidado_parcial'?'liquidado_parcial':'';
    var filtCad=S.processos.filter(function(p){
      if(p.status==='pendente')return false;
      if(tipoFiltCad&&p.status!==tipoFiltCad)return false;
      if(!tipoFiltCad&&tipo!=='todos'&&p.status==='pendente')return false;
      if(advFiltId!=='todos'&&p.advogadoId!==advFiltId)return false;
      var recs=p.recebimentos||[];
      if(dtIni||dtFim){
        var ok=recs.some(function(r){
          if(!r.data)return false;
          if(dtIni&&r.data<dtIni)return false;
          if(dtFim&&r.data>dtFim)return false;
          return true;
        });
        if(!ok)return false;
      }
      return true;
    });

    if(filtCad.length){
      var tComp=filtCad.reduce(function(s,p){return s+(p.valorCompra||0);},0);
      var tRec=filtCad.reduce(function(s,p){return s+((p.recebimentos||[]).reduce(function(sr,r){return sr+(r.valor||0);},0));},0);
      var tFat=tRec-tComp;
      var tCond=filtCad.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);

      var cadRows=filtCad.map(function(p){
        var advN=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
        var totalRecP=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);
        var fat=totalRecP-(p.valorCompra||0);
        var desag=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;
        var lastRec=(p.recebimentos||[]).slice(-1)[0];
        var sb=p.status==='liquidado_total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';
        return'<tr><td>'+p.cliente+'</td><td style="font-size:10px">'+p.numero+'</td><td>'+advN+'</td><td>'+sb+'</td>'+
          '<td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCompra)+'</td>'+
          '<td class="r">'+fmt(totalRecP)+'</td>'+
          '<td class="r" style="color:'+(fat>=0?'#1D6B3A':'#A32D2D')+'">'+fmt(fat)+'</td>'+
          '<td class="r">'+desag+'%</td>'+
          '<td>'+(lastRec?fmtDate(lastRec.data):'—')+'</td><td>'+(lastRec?lastRec.banco:'—')+'</td></tr>';
      }).join('');

      html+=(usandoImport?'<div class="st" style="margin-top:24px">Processos do cadastro</div>':'')+`
      <div class="metrics" style="margin-bottom:16px;margin-top:8px">
        <div class="mc"><div class="ml">Processos</div><div class="mv">${filtCad.length}</div></div>
        <div class="mc gold"><div class="ml">Total Recebido</div><div class="mv gold">${fmt(tRec)}</div></div>
        <div class="mc"><div class="ml">Vl. Compra</div><div class="mv">${fmt(tComp)}</div></div>
        <div class="mc blue"><div class="ml">Faturamento</div><div class="mv blue">${fmt(tFat)}</div></div>
      </div>
      <div class="card" style="padding:0;overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Tipo</th><th class="r">Vl. Condenação</th><th class="r">Vl. Compra</th><th class="r">Vl. Liquidado</th><th class="r">Faturamento</th><th class="r">Deságio %</th><th>Último Rec.</th><th>Banco</th></tr></thead>
          <tbody>${cadRows}</tbody>
          <tfoot><tr class="foot"><td colspan="4">TOTAL</td><td class="r">${fmt(tCond)}</td><td class="r">${fmt(tComp)}</td><td class="r">${fmt(tRec)}</td><td class="r">${fmt(tFat)}</td><td></td><td></td><td></td></tr></tfoot>
        </table>
      </div>`;
    } else if(!usandoImport){
      html='<div class="empty">Nenhum processo encontrado. Importe uma planilha ou cadastre processos na aba Processos.</div>';
    }
  }

  if(!html)html='<div class="empty">Nenhum dado encontrado com os filtros selecionados.</div>';
  document.getElementById('rel-liq-content').innerHTML=html;
}

function renderPrevisao(){
  var adv=document.getElementById('prev-adv-filter').value;
  var mat=(document.getElementById('prev-mat-filter').value||'').toLowerCase();
  var q=(document.getElementById('prev-search').value||'').toLowerCase();

  var filtered=S.processos.filter(function(p){
    if(p.status!=='pendente')return false;
    if(adv!=='todos'&&p.advogadoId!==adv)return false;
    if(mat&&!(p.materia||'').toLowerCase().includes(mat))return false;
    if(q&&!(p.cliente||'').toLowerCase().includes(q)&&!(p.numero||'').toLowerCase().includes(q))return false;
    return true;
  });

  var totalPrev=filtered.reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var totalComp=filtered.reduce(function(s,p){return s+(p.valorCompra||0);},0);
  var totalCond=filtered.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
  var totalFat=totalPrev-totalComp;

  var rows=filtered.map(function(p){
    var advN=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'—'}).name;
    var prevGanho=(p.valorCliente||0)-(p.valorCompra||0);
    var desag=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;
    var diasComp=p.dataCompra?Math.floor((new Date()-new Date(p.dataCompra))/(1000*60*60*24)):0;
    return'<tr>'+
      '<td>'+p.cliente+'</td>'+
      '<td style="font-size:10px">'+p.numero+'</td>'+
      '<td>'+advN+'</td>'+
      '<td>'+p.materia+'</td>'+
      '<td>'+fmtDate(p.dataCompra)+'</td>'+
      '<td class="r">'+diasComp+'</td>'+
      '<td class="r">'+fmt(p.valorCondenacao)+'</td>'+
      '<td class="r">'+fmt(p.valorCliente)+'</td>'+
      '<td class="r">'+fmt(p.valorCompra)+'</td>'+
      '<td class="r" style="color:#1D6B3A">'+fmt(prevGanho)+'</td>'+
      '<td class="r">'+desag+'%</td>'+
    '</tr>';
  }).join('');

  var html='';
  if(!filtered.length){html='<div class="empty">Nenhum processo pendente encontrado.</div>';}
  else{
    html=`
    <div class="metrics" style="margin-bottom:16px">
      <div class="mc blue"><div class="ml">Processos pendentes</div><div class="mv blue">${filtered.length}</div></div>
      <div class="mc"><div class="ml">Vl. Total Condenação</div><div class="mv">${fmt(totalCond)}</div></div>
      <div class="mc gold"><div class="ml">Previsão de Entrada</div><div class="mv gold">${fmt(totalPrev)}</div></div>
      <div class="mc"><div class="ml">Prev. Faturamento</div><div class="mv">${fmt(totalFat)}</div></div>
    </div>
    <div class="card" style="padding:0;overflow-x:auto">
    <table class="tbl">
      <thead><tr><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Matéria</th><th>Data Compra</th><th class="r">Dias</th><th class="r">Vl. Condenação</th><th class="r">Vl. Cliente</th><th class="r">Vl. Compra</th><th class="r">Prev. Ganho</th><th class="r">Deságio %</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="foot"><td colspan="6">TOTAL</td><td class="r">${fmt(totalCond)}</td><td class="r">${fmt(totalPrev)}</td><td class="r">${fmt(totalComp)}</td><td class="r">${fmt(totalFat)}</td><td></td></tr></tfoot>
    </table></div>`;
  }
  document.getElementById('prev-content').innerHTML=html;
}

function imprimirPrevisao(){
  renderPrevisao();
  setTimeout(function(){window.print();},300);
}

// LANÇAMENTOS (importação planilhas gerais)
// ═══════════════════════════════════════════════════════════
function pageLancamentos(){

  var list=!S.lawyers.length?'<div class="empty">Nenhum advogado cadastrado.</div>':
    S.lawyers.map(function(l,i){return'<div class="lrow"><div class="av" style="'+avSt(i)+'">'+ini(l.name)+'</div><div class="ln">'+l.name+'</div><div style="font-size:12px;color:var(--mt)">Pró-labore: '+fmt(l.prolabore)+'</div><button class="btn bd2" onclick="removeLawyer(\''+l.id+'\')">Remover</button></div>';}).join('');
  return`
  <div class="st">Advogados cadastrados</div>
  <div class="card">
    <div class="frow">
      <div class="fg" style="flex:2"><label>Nome</label><input type="text" id="nn" placeholder="Nome do advogado"/></div>
      <div class="fg"><label>Pró-labore (R$)</label><input type="number" id="np" placeholder="0,00" min="0" step="0.01"/></div>
      <button class="btn bp" onclick="addLawyer()">Adicionar</button>
    </div>
  </div>

    <p style="font-size:12px;color:var(--mt);margin-bottom:14px">Importe as planilhas mensais — o sistema distribui automaticamente para cada advogado.</p>
    <label class="imp" for="file-liq-g"><input type="file" id="file-liq-g" class="fhide" accept=".xlsx,.xls" onchange="importLiqGeral(this)"/>
      <div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>
      <div class="imp-text"><div class="imp-title">Importar Liquidados (geral)</div><div class="imp-sub">Distribui processos para todos os advogados · Colunas: ADVOGADO · PROCESSOS · VALOR · LIQUIDAÇÃO</div></div>
      <span class="imp-status" id="s-liq">Nenhum arquivo</span>
    </label>
    <label class="imp" for="file-val-g"><input type="file" id="file-val-g" class="fhide" accept=".xlsx,.xls" onchange="importValGeral(this)"/>
      <div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>
      <div class="imp-text"><div class="imp-title">Importar Validação / Distribuição</div><div class="imp-sub">Conta processos e contratos validados · Colunas: ADVOGADO · OBS</div></div>

    </label>
    <label class="imp" for="file-dil-g"><input type="file" id="file-dil-g" class="fhide" accept=".xlsx,.xls" onchange="importDilGeral(this)"/>
      <div class="imp-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L13 11l-5 6z"/></svg></div>
      <div class="imp-text"><div class="imp-title">Importar Diligências (Capa a Capa)</div><div class="imp-sub">Preenche capa a capa por advogado · Colunas: VAL. · VALOR · CONTRATO</div></div>
      <span class="imp-status" id="s-dil">Nenhum arquivo</span>
    </label>

      <div class="fg" style="max-width:240px"><label>Advogado</label><select id="sel-man"><option value="">Selecione...</option>${lawyerOpts}</select></div>
      <div class="fg"><label>Auditoria (qtd)</label><input type="number" id="man-au" min="0" placeholder="0"/></div>
      <button class="btn bp" onclick="saveManual()">Salvar ajuste</button>
    </div>
