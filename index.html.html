function addLawyer(){
  var n=(document.getElementById('nn').value||'').trim();
  var p=parseFloat(document.getElementById('np').value)||0;
  if(!n){alert('Informe o nome.');return;}
  var id=n.toLowerCase().replace(/\s+/g,'-').normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  S.lawyers.push({id:id,name:n,prolabore:p});
  document.getElementById('nn').value='';document.getElementById('np').value='';
  saveData();renderContent(currentTabIdx);
}
function removeLawyer(id){if(!confirm('Remover?'))return;S.lawyers=S.lawyers.filter(function(l){return l.id!==id;});delete S.entries[id];saveData();renderContent(currentTabIdx);}

function importLiqGeral(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var byAdv={};
    rows.forEach(function(r){
      var adv=normAdv(r['ADVOGADO']||r['Advogado']||'');
      var val=parseFloat(r['VALOR']||r['Valor']||0)||0;
      var liq=String(r['LIQUIDAÇÃO']||r['Liquidação']||'').trim();
      var proc=String(r['PROCESSOS']||r['Processo']||'').trim();
      if(!adv||adv==='ADVOGADO')return;
      if(!byAdv[adv])byAdv[adv]=[];
      byAdv[adv].push({ref:proc,valor:val,tipo:liq.toUpperCase().includes('PARCIAL')?'Parcial':'Total'});
    });
    var matched=0,total=0;
    S.lawyers.forEach(function(l){
      var key=normAdv(l.name);var fn=key.split(' ')[0];
      var found=byAdv[key]||byAdv[Object.keys(byAdv).find(function(k){return k.startsWith(fn);})||''];
      if(found){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].processos=found;S.entries[l.id].volLiquidado=found.reduce(function(s,p){return s+p.valor;},0);matched++;total+=found.length;}
    });
    var el=document.getElementById('s-liq');if(el)el.textContent=total+' proc · '+matched+' adv';
    saveData();input.value='';showToast('Liquidados importados!');
  });
}
function importValGeral(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var byAdv={};
    rows.forEach(function(r){
      var adv=normAdv(r['ADVOGADO']||r[2]||'');
      var obs=String(r['OBS']||r[3]||'').toUpperCase();
      if(!adv||adv==='ADVOGADO')return;
      if(!byAdv[adv])byAdv[adv]={pv:0,cv:0};
      if(obs.includes('VALIDADO')&&!obs.includes('NAO APROVADO')&&!obs.includes('NÃO APROVADO')&&!obs.includes('FALTA CONTRATO')){if(obs.includes('CONTRATO'))byAdv[adv].cv++;else byAdv[adv].pv++;}
    });
    var matched=0;
    S.lawyers.forEach(function(l){
      var key=normAdv(l.name);var fn=key.split(' ')[0];
      var found=byAdv[key]||byAdv[Object.keys(byAdv).find(function(k){return k.startsWith(fn);})||''];
      if(found){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].procValid=found.pv;S.entries[l.id].contValid=found.cv;matched++;}
    });
    var el=document.getElementById('s-val');if(el)el.textContent=matched+' adv';
    saveData();input.value='';showToast('Validações importadas!');
  });
}
function importDilGeral(input){
  if(!input.files.length)return;
  readXlsx(input.files[0],function(rows){
    var byInit={};
    rows.forEach(function(r){
      var contrato=String(r['CONTRATO']||'').trim().toUpperCase();
      var val2=String(r['VAL.']||r['VAL']||'').trim().toUpperCase();
      var valor=parseFloat(r['VALOR']||0)||0;
      if(contrato!=='PAGO'||!val2)return;
      if(!byInit[val2])byInit[val2]={qtd:0,vol:0};
      byInit[val2].qtd++;byInit[val2].vol+=valor;
    });
    var matched=0;
    S.lawyers.forEach(function(l){
      var initials=l.name.trim().split(' ').slice(0,2).map(function(x){return x[0].toUpperCase();}).join('');
      if(byInit[initials]){if(!S.entries[l.id])S.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};S.entries[l.id].capaCapa=byInit[initials].qtd;S.entries[l.id].volEntradas=byInit[initials].vol;matched++;}
    });
    var el=document.getElementById('s-dil');if(el)el.textContent=matched+' adv';
    saveData();input.value='';showToast('Diligências importadas!');
  });
}
function saveManual(){
  var lid=document.getElementById('sel-man').value;if(!lid){showToast('Selecione um advogado.');return;}
  if(!S.entries[lid])S.entries[lid]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
  S.entries[lid].auditoria=parseInt(document.getElementById('man-au').value)||0;
  saveData();showToast('Ajuste salvo!');
}

// ═══════════════════════════════════════════════════════════
// CAMPANHAS
// ═══════════════════════════════════════════════════════════
function pageCampanhas(){
  var lo=S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('');
  var list=!S.campanhas.length?'<div class="empty">Nenhuma campanha.</div>':
    S.campanhas.map(function(c){var ln=c.lawyer==='todos'?'Todos':(S.lawyers.find(function(l){return l.id===c.lawyer;})||{name:'—'}).name;
    return'<div class="lrow"><div style="flex:1">'+c.nome+'</div><span class="badge b-par">'+fmt(c.valor)+'</span><div style="font-size:11px;color:var(--mt);margin:0 8px">'+ln+'</div><button class="btn bd2 bsm" onclick="removeCamp(\''+c.id+'\')">✕</button></div>';}).join('');
  return`
  <div class="st">Campanhas do período</div>
  <div class="card">
    <div class="frow">
      <div class="fg" style="flex:2"><label>Nome</label><input type="text" id="cn" placeholder="Ex: Meta de acordos"/></div>
      <div class="fg"><label>Advogado</label><select id="cl"><option value="todos">Todos</option>${lo}</select></div>
      <div class="fg" style="max-width:130px"><label>Valor (R$)</label><input type="number" id="cv3" min="0" placeholder="0"/></div>
      <button class="btn bp" onclick="addCamp()">Adicionar</button>
    </div>
  </div>

function addCamp(){var n=(document.getElementById('cn').value||'').trim();var l=document.getElementById('cl').value;var v=parseFloat(document.getElementById('cv3').value)||0;if(!n){alert('Informe o nome.');return;}S.campanhas.push({id:uid(),nome:n,lawyer:l,valor:v});document.getElementById('cn').value='';document.getElementById('cv3').value='';saveData();renderContent(currentTabIdx);}
function removeCamp(id){S.campanhas=S.campanhas.filter(function(c){return c.id!==id;});saveData();renderContent(currentTabIdx);}

// ═══════════════════════════════════════════════════════════
// CALC ENGINE
// ═══════════════════════════════════════════════════════════
function calc(lid){
  var l=S.lawyers.find(function(x){return x.id===lid;});if(!l)return null;
  var e=S.entries[lid]||{processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
  var cP=(e.processos||[]).reduce(function(s,p){return s+(p.valor<10000?50:100);},0);
  var cPV=(e.procValid||0)*5,cCV=(e.contValid||0)*2,cCapa=(e.capaCapa||0)*10,cAud=(e.auditoria||0)*10;
  var ve=e.volEntradas||0,cEnt=ve>=500000?Math.floor(ve/100000)*100:0;
  var vl=e.volLiquidado||0,cLiq=vl>=600000?Math.floor(vl/100000)*100:0;
  var cCamp=S.campanhas.reduce(function(s,c){return s+(c.lawyer==='todos'||c.lawyer===lid?c.valor:0);},0);
  var total=l.prolabore+cP+cPV+cCV+cCapa+cAud+cEnt+cLiq+cCamp;
  return{lawyer:l,entry:e,cP:cP,cPV:cPV,cCV:cCV,cCapa:cCapa,cAud:cAud,cEnt:cEnt,cLiq:cLiq,cCamp:cCamp,total:total};
}

// ═══════════════════════════════════════════════════════════
// ADVOGADOS — detail
// ═══════════════════════════════════════════════════════════
function pageAdvogados(){
  var opts=S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('');
  return'<div class="st">Selecione o advogado</div>'+
  '<div class="fg" style="max-width:300px;margin-bottom:16px"><select id="detail-sel" onchange="showDetail(this.value)"><option value="">Selecione...</option>'+opts+'</select></div>'+
  '<div id="detail-content"><div class="empty">Selecione um advogado.</div></div>';
}
function showDetail(lid){
  if(!lid)return;
  var c=calc(lid);if(!c)return;
  var e=c.entry;
  var items=[{l:'Pró-labore fixo',v:c.lawyer.prolabore},{l:'Processos liquidados ('+(e.processos||[]).length+')',v:c.cP},{l:'Processos validados ('+(e.procValid||0)+')',v:c.cPV},{l:'Contratos validados ('+(e.contValid||0)+')',v:c.cCV},{l:'Capa a capa ('+(e.capaCapa||0)+')',v:c.cCapa},{l:'Auditoria ('+(e.auditoria||0)+')',v:c.cAud},{l:'Bônus entradas',v:c.cEnt},{l:'Bônus liquidação',v:c.cLiq},{l:'Campanhas',v:c.cCamp}];
  var m='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px"><div class="mc"><div class="ml">Total</div><div class="mv">'+fmt(c.total)+'</div></div><div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div><div class="mc gold"><div class="ml">Comissões</div><div class="mv gold">'+fmt(c.total-c.lawyer.prolabore)+'</div></div></div>';
  var rows=items.map(function(it){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:13px"><div style="color:var(--mt)">'+it.l+'</div><div>'+fmt(it.v)+'</div></div>';}).join('');
  document.getElementById('detail-content').innerHTML=m+'<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}

// ═══════════════════════════════════════════════════════════
// MINHA COMISSÃO (lawyer)
// ═══════════════════════════════════════════════════════════
function pageMinhaComissao(){
  if(!currentUser||!currentUser.lawyerId)return'<div class="empty">Sem dados.</div>';
  var lid=currentUser.lawyerId;
  var l=S.lawyers.find(function(x){return x.id===lid;});
  if(!l)return'<div class="card"><div class="empty">Perfil ainda não configurado pelo administrador.</div></div>';
  var c=calc(lid);var e=c.entry;
  var items=[{l:'Pró-labore fixo',v:c.lawyer.prolabore},{l:'Processos liquidados ('+(e.processos||[]).length+')',v:c.cP},{l:'Processos validados ('+(e.procValid||0)+')',v:c.cPV},{l:'Contratos validados ('+(e.contValid||0)+')',v:c.cCV},{l:'Capa a capa ('+(e.capaCapa||0)+')',v:c.cCapa},{l:'Auditoria ('+(e.auditoria||0)+')',v:c.cAud},{l:'Bônus entradas',v:c.cEnt},{l:'Bônus liquidação',v:c.cLiq},{l:'Campanhas',v:c.cCamp}];
  var m='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="mc"><div class="ml">Total a receber</div><div class="mv">'+fmt(c.total)+'</div></div><div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div><div class="mc gold"><div class="ml">Comissões</div><div class="mv gold">'+fmt(c.total-c.lawyer.prolabore)+'</div></div></div>';
  var rows=items.map(function(it){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:13px"><div style="color:var(--mt)">'+it.l+'</div><div>'+fmt(it.v)+'</div></div>';}).join('');
  return'<div class="st">Olá, '+c.lawyer.name+' — '+document.getElementById('period-lbl').textContent+'</div>'+m+
    '<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}

// ═══════════════════════════════════════════════════════════
// RESUMO
// ═══════════════════════════════════════════════════════════
function pageResumo(){
  return'<div class="st">Resumo geral</div><div class="g4" style="margin-bottom:16px" id="res-metrics"></div><div class="card" id="res-table"><div class="empty">Clique em "Calcular" para gerar.</div></div>';
}
function recalc(){
  updPeriod();saveData();
  if(!S.lawyers.length){showToast('Cadastre advogados primeiro.');return;}
  var tabs=document.querySelectorAll('.tb');tabs.forEach(function(t,i){t.classList.toggle('on',i===5);});
  document.getElementById('main-content').innerHTML=pageResumo();
  var res=S.lawyers.map(function(l){return calc(l.id);});
  var tP=res.reduce(function(s,r){return s+r.lawyer.prolabore;},0);
  var tC=res.reduce(function(s,r){return s+(r.total-r.lawyer.prolabore);},0);
  var tG=tP+tC;
  document.getElementById('res-metrics').innerHTML='<div class="mc"><div class="ml">Total geral</div><div class="mv">'+fmt(tG)+'</div></div><div class="mc gold"><div class="ml">Pró-labore</div><div class="mv gold">'+fmt(tP)+'</div></div><div class="mc"><div class="ml">Comissões</div><div class="mv">'+fmt(tC)+'</div></div><div class="mc"><div class="ml">Advogados</div><div class="mv">'+S.lawyers.length+'</div></div>';
  var tbody=res.map(function(r,i){var bg=i%2===0?'':'background:#f7faf9;';return'<tr><td style="'+bg+'"><div style="display:flex;align-items:center;gap:9px"><div class="av" style="width:28px;height:28px;font-size:10px;'+avSt(i)+'">'+ini(r.lawyer.name)+'</div>'+r.lawyer.name+'</div></td><td class="r" style="'+bg+'">'+fmt(r.lawyer.prolabore)+'</td><td class="r" style="'+bg+'">'+fmt(r.total-r.lawyer.prolabore)+'</td><td class="r" style="'+bg+';font-weight:700">'+fmt(r.total)+'</td></tr>';}).join('');
  document.getElementById('res-table').innerHTML='<table class="tbl"><thead><tr><th>Advogado</th><th class="r">Pró-labore</th><th class="r">Comissões</th><th class="r">Total</th></tr></thead><tbody>'+tbody+'<tr class="foot"><td>Total</td><td class="r">'+fmt(tP)+'</td><td class="r">'+fmt(tC)+'</td><td class="r">'+fmt(tG)+'</td></tr></tbody></table>';
  currentTabIdx=5;
}

// ═══════════════════════════════════════════════════════════
// USUÁRIOS
// ═══════════════════════════════════════════════════════════
function pageUsuarios(){
  var rows=USERS.map(function(u,i){
    var rb=u.role==='admin'?'<span class="badge b-green">Admin</span>':'<span class="badge b-par">Advogado</span>';
    return'<div class="lrow"><div class="av" style="'+avSt(i)+'">'+ini(u.name)+'</div><div class="ln">'+u.name+'</div><div style="font-size:11px;color:var(--mt)">@'+u.username+'</div>'+rb+'<div style="font-size:11px;font-family:monospace;background:#f4f4f4;padding:3px 8px;border-radius:6px;margin-left:8px">'+u.password+'</div></div>';
  }).join('');
  return'<div class="st">Usuários do sistema</div><div class="card" style="margin-bottom:8px"><p style="font-size:12px;color:var(--mt)">Cada advogado acessa apenas sua própria comissão. O Admin vê tudo.</p></div><div class="card">'+rows+'</div>';
}
