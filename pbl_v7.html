<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBL — Gestão de Comissões</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#0D5C52;--vd:#083f38;--vl:#E6F2F0;
  --d:#B8860B;--dl:#FDF6E3;--dm:#C9970D;
  --bd:#d0dbd9;--tx:#1c1c1c;--mt:#5e7572;
  --bg:#f0f3f2;--red:#A32D2D;--redl:#FCEBEB;
  --sb:240px;
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}

/* ── LOGIN ─────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v)}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
.login-title{font-size:20px;font-weight:700;color:var(--v)}
.login-sub{font-size:12px;color:var(--mt);margin-top:2px}
.lf{margin-bottom:16px}
.lf label{font-size:12px;color:var(--mt);display:block;margin-bottom:5px;font-weight:600}
.lf input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 13px;font-size:14px;outline:none;transition:border-color .2s}
.lf input:focus{border-color:var(--v)}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{background:var(--vd)}
.login-err{background:var(--redl);color:var(--red);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:14px;display:none}

/* ── APP SHELL ──────────────────────────────────── */
.app-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:var(--v);display:flex;align-items:stretch;height:56px;flex-shrink:0;z-index:300}
.hdr-brand{width:var(--sb);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-right:1px solid rgba(255,255,255,.12)}
.hdr-title{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.hdr-subtitle{color:rgba(255,255,255,.5);font-size:10px;display:block}
.hdr-right{flex:1;display:flex;align-items:center;gap:10px;padding:0 20px}
.hdr-period{color:rgba(255,255,255,.7);font-size:12px;flex:1}
.hdr-user{color:rgba(255,255,255,.85);font-size:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
input[type=month]{padding:5px 9px;border-radius:6px;border:none;font-size:12px;background:rgba(255,255,255,.18);color:#fff;outline:none;cursor:pointer}
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7}
.btn-calc{background:var(--d);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-calc:hover{background:var(--dm)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.admin-badge{background:var(--d);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}

/* ── BODY ───────────────────────────────────────── */
.body-area{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar{width:var(--sb);background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:7px;margin:1px 8px;font-size:13px;color:var(--tx);border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .12s,color .12s;white-space:nowrap}
.nav-item:hover{background:var(--vl);color:var(--v)}
.nav-item.active{background:var(--vl);color:var(--v);font-weight:700}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.55}
.nav-item.active svg,.nav-item:hover svg{opacity:1}

/* accordion */
.sb-group{}
.sb-group-hdr{display:flex;align-items:center;gap:9px;padding:8px 14px 8px 22px;cursor:pointer;font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;border:none;background:none;width:100%;text-align:left}
.sb-group-hdr:hover{color:var(--v)}
.sb-group-hdr svg{width:14px;height:14px;opacity:.55}
.sb-chevron{margin-left:auto;font-size:10px;transition:transform .2s;line-height:1}
.sb-children{display:none;padding-bottom:4px}
.sb-children.open{display:block}
.sb-children .nav-item{padding-left:36px;font-size:12px;margin-left:12px;width:calc(100% - 20px)}

/* ── MAIN ───────────────────────────────────────── */
.main{flex:1;overflow-y:auto;padding:24px 28px;min-width:0}

/* ── CARDS / FORM ───────────────────────────────── */
.page-title{font-size:17px;font-weight:700;color:var(--v);display:flex;align-items:center;gap:10px;margin-bottom:18px}
.page-title svg{width:20px;height:20px;flex-shrink:0}
.st{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px}
.st:first-child{margin-top:0}
.card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.frow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fg label{font-size:12px;color:var(--mt)}
.fg input,.fg select,.fg textarea{border:.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:#fff;outline:none;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fg textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.div{height:.5px;background:#eef1f0;margin:14px 0}

/* ── BUTTONS ────────────────────────────────────── */
.btn{padding:7px 15px;border-radius:6px;font-size:13px;border:.5px solid #ccc;background:#fff;cursor:pointer;color:var(--tx);font-weight:500;white-space:nowrap}
.btn:hover{background:var(--vl)}
.bp{background:var(--v);color:#fff;border-color:var(--v)}
.bp:hover{background:var(--vd)}
.bd2{color:var(--red);border-color:#e8b4b4;padding:4px 10px;font-size:11px}
.bd2:hover{background:var(--redl)}
.bsm{padding:4px 12px;font-size:12px}
.print-btn{background:#1D6B3A;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
.print-btn:hover{background:#145229}

/* ── TABLE ──────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:8px 11px;text-align:left;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:7px 11px;border-bottom:.5px solid #eef1f0;vertical-align:middle}
.tbl td.r{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#f7faf9}
.tbl tr:hover td{background:#edf5f3}
.tbl tr.foot td{background:var(--v);color:#fff;font-weight:700}
.dbtn{color:var(--red);background:none;border:none;cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.ebtn{color:var(--v);background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;line-height:1}

/* ── BADGES ─────────────────────────────────────── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.b-tot{background:var(--vl);color:var(--v)}
.b-par{background:var(--dl);color:var(--d)}
.b-pend{background:#EEF3FB;color:#185FA5}
.b-red{background:var(--redl);color:var(--red)}
.b-green{background:#E6F4EC;color:#1D6B3A}
.b-compra{background:#EEF3FB;color:#185FA5}
.b-venda{background:#E6F4EC;color:#1D6B3A}
.b-desp{background:var(--redl);color:var(--red)}
.section-badge{background:var(--v);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:10px;vertical-align:middle}

/* ── METRICS ────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.mc{background:var(--vl);border-radius:8px;padding:13px 15px}
.mc.gold{background:var(--dl)}
.mc.blue{background:#EEF3FB}
.mc.red{background:var(--redl)}
.mc.green{background:#E6F4EC}
.ml{font-size:11px;color:var(--mt);margin-bottom:4px}
.mv{font-size:20px;font-weight:700;color:var(--v)}
.mv.gold{color:var(--d)}
.mv.blue{color:#185FA5}
.mv.red{color:var(--red)}
.mv.green{color:#1D6B3A}

/* ── CHARTS ─────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border:.5px solid var(--bd);border-radius:10px;padding:18px 20px}
.chart-title{font-size:13px;font-weight:700;color:var(--v);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--mt);margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.chart-full{grid-column:1/-1}
.chart-wrap-tall{position:relative;height:300px}

/* ── MODAL ──────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:16px;font-weight:700;color:var(--v);margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--mt)}
.modal-close:hover{color:var(--red)}

/* ── RANK ───────────────────────────────────────── */
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:12px}
.rank-row:last-child{border-bottom:none}
.rank-n{width:20px;font-size:11px;font-weight:700;color:var(--mt);text-align:center}
.rank-name{flex:1;font-weight:500}
.rank-bar-bg{width:120px;height:8px;background:#eef1f0;border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px}
.rank-val{width:90px;text-align:right;font-size:11px}
.rank-pct{width:38px;text-align:right;font-size:11px;color:var(--mt)}

/* ── MISC ───────────────────────────────────────── */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ln{flex:1;font-size:13px;font-weight:500}
.lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid #eef1f0}
.lrow:last-child{border-bottom:none}
.empty{font-size:13px;color:var(--mt);padding:12px 0;text-align:center}
.toast{position:fixed;bottom:20px;right:20px;background:var(--v);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;padding:14px 16px;background:#fff;border:.5px solid var(--bd);border-radius:10px}
.search-input{border:.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;flex:1;min-width:160px}
.search-input:focus{border-color:var(--v)}
.imp{display:flex;align-items:center;gap:12px;background:var(--dl);border:1.5px dashed var(--d);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer}
.imp:hover{background:#faeec4}
.imp-icon{width:34px;height:34px;background:var(--d);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.imp-icon svg{width:18px;height:18px;fill:#fff}
.imp-text{flex:1}
.imp-title{font-size:13px;font-weight:700;color:var(--d)}
.imp-sub{font-size:11px;color:var(--mt);margin-top:2px}
.imp-status{font-size:11px;font-weight:700;color:var(--v);background:var(--vl);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
input.fhide{display:none}

/* fluxo caixa */
.fc-in{color:#1D6B3A;font-weight:700}
.fc-out{color:var(--red);font-weight:700}
.fc-saldo-pos{background:#E6F4EC;color:#1D6B3A;padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}
.fc-saldo-neg{background:var(--redl);color:var(--red);padding:2px 8px;border-radius:6px;font-weight:700;font-size:12px}

/* ── PRINT ──────────────────────────────────────── */
@media print{
  .hdr,.sidebar,.no-print,.modal-close,.dbtn,.ebtn,.print-btn,.filter-bar,.btn,.imp{display:none!important}
  .body-area{display:block}
  .main{padding:0;overflow:visible}
  body{background:#fff}
  .card{border:1px solid #ccc;border-radius:0}
  .tbl th{background:#0D5C52!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:768px){
  :root{--sb:200px}
  .metrics,.g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .chart-full{grid-column:auto}
  .main{padding:16px}
}

/* EMPRESA BADGES */
.b-pbl{background:#E6F2F0;color:#0D5C52}
.b-fidc{background:#EEF3FB;color:#185FA5}
.b-entrada{background:#E6F4EC;color:#1D6B3A}
.b-saida{background:#FCEBEB;color:#A32D2D}
.emp-pbl{background:#0D5C52;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.emp-fidc{background:#185FA5;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
/* CALCULADORA DESAGIO */
.calc-desagio{background:#FDF6E3;border:.5px solid var(--d);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--d);font-weight:600;margin-top:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <svg width="44" height="38" viewBox="0 0 120 100"><g fill="#B8860B"><path d="M18 58C10 50 10 38 20 32L42 20C48 17 54 20 54 28L54 38L38 30C34 28 30 30 30 35L30 50Z"/><path d="M102 58C110 50 110 38 100 32L78 20C72 17 66 20 66 28L66 38L82 30C86 28 90 30 90 35L90 50Z"/><path d="M30 50L54 38L66 38L90 50L80 65C74 72 62 75 60 75C58 75 46 72 40 65Z"/></g></svg>
      <div><div class="login-title">PBL</div><div class="login-sub">Gestão de Comissões</div></div>
    </div>
    <div class="login-err" id="login-err">Usuário ou senha incorretos.</div>
    <div class="lf"><label>Usuário</label><input type="text" id="inp-user" placeholder="usuario" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="lf"><label>Senha</label><input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="app-wrap" style="display:none">
  <div class="hdr">
    <div class="hdr-brand">
      <svg width="36" height="30" viewBox="0 0 120 100"><g fill="#B8860B"><path d="M18 58C10 50 10 38 20 32L42 20C48 17 54 20 54 28L54 38L38 30C34 28 30 30 30 35L30 50Z"/><path d="M102 58C110 50 110 38 100 32L78 20C72 17 66 20 66 28L66 38L82 30C86 28 90 30 90 35L90 50Z"/><path d="M30 50L54 38L66 38L90 50L80 65C74 72 62 75 60 75C58 75 46 72 40 65Z"/></g></svg>
      <div><div class="hdr-title">PBL<span class="hdr-subtitle">Gestão de Comissões</span></div></div>
    </div>
    <div class="hdr-right">
      <span class="hdr-period" id="period-lbl"></span>
      <input type="month" id="mes-ref" oninput="updPeriod();saveData()"/>
      <button class="btn-calc" id="btn-calc-main" onclick="recalc()" style="display:none">⚡ Calcular</button>
      <span class="hdr-user" id="hdr-user"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="body-area">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main" id="main-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>


<script>

// ════════════════════════════════════════════════════════════
// USERS
// ════════════════════════════════════════════════════════════
var USERS=[
  {id:'admin',    username:'admin',     password:'pbl@2026',    role:'admin',  name:'Administrador', lawyerId:null},
  {id:'jessica',  username:'jessica',   password:'jessica123',  role:'lawyer', name:'Jessica',       lawyerId:'jessica'},
  {id:'bruno',    username:'bruno',     password:'bruno123',    role:'lawyer', name:'Bruno',         lawyerId:'bruno'},
  {id:'evelly',   username:'evelly',    password:'evelly123',   role:'lawyer', name:'Evelly',        lawyerId:'evelly'},
  {id:'luciano',  username:'luciano',   password:'luciano123',  role:'lawyer', name:'Luciano',       lawyerId:'luciano'},
  {id:'karen',    username:'karen',     password:'karen123',    role:'lawyer', name:'Karen',         lawyerId:'karen'},
  {id:'joao',     username:'joao',      password:'joao123',     role:'lawyer', name:'João',          lawyerId:'joao'},
  {id:'caio',     username:'caio',      password:'caio123',     role:'lawyer', name:'Caio',          lawyerId:'caio'},
  {id:'guilherme',username:'guilherme', password:'guilherme123',role:'lawyer', name:'Guilherme',     lawyerId:'guilherme'},
  {id:'richard',  username:'richard',   password:'richard123',  role:'lawyer', name:'Richard',       lawyerId:'richard'},
  {id:'otavio',   username:'otavio',    password:'otavio123',   role:'lawyer', name:'Otávio',        lawyerId:'otavio'},
];
var AVC=[{bg:'#E6F2F0',c:'#0D5C52'},{bg:'#FDF6E3',c:'#7a5800'},{bg:'#EEF3FB',c:'#185FA5'},{bg:'#FCEBEB',c:'#A32D2D'},{bg:'#F0EFF9',c:'#534AB7'},{bg:'#E6F4EC',c:'#1D6B3A'},{bg:'#FFF0F3',c:'#993556'},{bg:'#F4F0FF',c:'#3C3489'}];
var PC=['#0D5C52','#B8860B','#2E6DB4','#A32D2D','#534AB7','#1D6B3A','#993556','#3C3489','#854F0B','#185FA5'];

// ── STATE ──────────────────────────────────────────────────
var S={
  lawyers:[],
  campanhas:[],
  processos:[],          // globais
  // dados por mês: meses['2026-03'] = {entries, dashData, financeiro, relLiqData}
  meses:{},
  mes:new Date().toISOString().slice(0,7),
};
// Dados do mês ativo (referência ao S.meses[S.mes])
function getMes(){
  if(!S.meses[S.mes])S.meses[S.mes]={entries:{},dashData:null,financeiro:[],relLiqData:[]};
  return S.meses[S.mes];
}
var currentUser=null;
var charts={};
var currentPage='dashboard';

// ── PERSIST ────────────────────────────────────────────────
function saveData(){
  try{localStorage.setItem('pbl_v7',JSON.stringify(S));}catch(e){}
  showToast('Salvo!');
}
function loadData(){
  try{
    var r=localStorage.getItem('pbl_v7');
    if(r){var d=JSON.parse(r);Object.assign(S,d);if(!S.meses)S.meses={};if(!S.processos)S.processos=[];if(!S.campanhas)S.campanhas=[];}
    // Migração do formato antigo
    var old=localStorage.getItem('pbl_v4');
    if(old&&!r){
      try{
        var od=JSON.parse(old);
        if(od.lawyers&&od.lawyers.length)S.lawyers=od.lawyers;
        if(od.campanhas&&od.campanhas.length)S.campanhas=od.campanhas;
        if(od.processos&&od.processos.length)S.processos=od.processos;
        if(od.mes)S.mes=od.mes;
        if(od.entries&&Object.keys(od.entries).length){getMes().entries=od.entries;}
        if(od.financeiro&&od.financeiro.length){getMes().financeiro=od.financeiro;}
        if(od.dashData&&od.dashData.length){getMes().dashData=od.dashData;}
        saveData();
      }catch(ex){}
    }
  }catch(e){}
}

// ── UTILS ──────────────────────────────────────────────────

function fmtK(v){if(v>=1000000)return'R$ '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'R$ '+(v/1000).toFixed(0)+'k';return fmt(v);}

// ── XLSX HELPER ROBUSTO ────────────────────────────────────
// Lê coluna de xlsx procurando por substring normalizada no nome da coluna
function xlsxGet(row,keys,subs,isNum){
  var v=isNum?0:'';
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    var kn=k.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    for(var j=0;j<subs.length;j++){
      if(kn.indexOf(subs[j])>=0){
        if(isNum){var n=parseFloat(String(row[k]).replace(',','.'));if(!isNaN(n)&&n!==0){v=n;break;}}
        else{var sv=String(row[k]||'').trim();if(sv){v=sv;break;}}
      }
    }
    if(v!==''&&v!==0)break;
  }
  return v;
}
function parseDataBR(s){
  if(!s)return'';
  var st=String(s).trim();
  var parts=st.split('/');
  if(parts.length===3&&parts[2].length===4)return parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
  try{var d=new Date(st);if(!isNaN(d))return d.toISOString().slice(0,10);}catch(e){}
  return '';
}
// Distribui dados importados para entries dos advogados
function distribuirEntries(byAdv){
  var matched=0;
  S.lawyers.forEach(function(l){
    var key=normAdv(l.name);
    var fn=key.split(' ')[0];
    // busca: exata, por primeiro nome, ou advogado da planilha começa com primeiro nome do sistema
    var foundKey=null;
    var keys2=Object.keys(byAdv);
    for(var i=0;i<keys2.length;i++){
      var k=keys2[i];
      var kfn=k.split(' ')[0];
      if(k===key||kfn===fn||k.startsWith(fn)||fn.startsWith(kfn)){foundKey=k;break;}
    }
    if(foundKey){
      var m=getMes();
      if(!m.entries[l.id])m.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
      m.entries[l.id].processos=byAdv[foundKey];
      m.entries[l.id].volLiquidado=byAdv[foundKey].reduce(function(s,p){return s+p.valor;},0);
      matched++;
    }
  });
  return matched;
}
// Lança entradas no financeiro automaticamente para processos liquidados importados
function lancarEntradasFinanceiro(relData){
  var m=getMes();
  if(!m.financeiro)m.financeiro=[];
  var novos=0;
  relData.forEach(function(r){
    if(!r.val||r.val<=0)return;
    // Verifica se já existe lançamento para este processo/adv/valor no mês
    var jaExiste=m.financeiro.some(function(f){
      return f.origem==='importacao'&&f.proc===r.proc&&Math.abs(f.valor-r.val)<0.01;
    });
    if(!jaExiste){
      var empresa=r.empresa||'PBL';
      m.financeiro.push({
        id:uid(),
        empresa:empresa,
        tipo:'entrada',
        subtipo:r.tipo==='Parcial'?'liquidacao_parcial':'liquidacao_total',
        data:r.data||todayStr(),
        valor:r.val,
        banco:'',
        descricao:'Liquidação '+(r.tipo||'Total')+' — '+r.advNome,
        processoId:'',
        proc:r.proc,
        advogado:r.adv,
        categoria:'Liquidação',
        obs:'Importado automaticamente',
        origem:'importacao'
      });
      novos++;
    }
  });
  return novos;
}

function buildDashData(){
  var data=[];
  S.processos.forEach(function(p){
    if(p.status==='pendente')return;
    var rec=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);
    var advN=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'?'}).name;
    data.push({adv:normAdv(advN),val:rec,tipo:p.status==='liquidado_parcial'?'Parcial':'Total',empresa:p.empresa||'PBL'});
  });
  return data;
}

// ══ IMPORTAÇÃO DASHBOARD ════════════════════════════════════
function importDashboard(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true,raw:false});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){showToast('Arquivo vazio!');input.value='';return;}
      var keys=Object.keys(rows[0]);
      var data=[],byAdv={},relData=[];
      rows.forEach(function(r){
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false));
        var val=xlsxGet(r,keys,['VALOR'],true);
        var liq=xlsxGet(r,keys,['LIQUID','LIQUIDAC'],false);
        var proc=xlsxGet(r,keys,['PROCESSO'],false);
        var datRaw=xlsxGet(r,keys,['DATA'],false);
        var tit=xlsxGet(r,keys,['TITULARIDADE','TITULAR'],false).toUpperCase();
        var empresa=tit.includes('FIDC')?'FIDC':'PBL';
        var dat=parseDataBR(datRaw);
        if(!adv||adv==='ADVOGADO')return;
        var tipo=liq.toUpperCase().indexOf('PARCIAL')>=0?'Parcial':'Total';
        data.push({adv:adv,val:val,tipo:tipo,empresa:empresa});
        relData.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat,empresa:empresa});
        if(!byAdv[adv])byAdv[adv]=[];
        byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      });
      if(!data.length){showToast('Nenhum dado encontrado. Verifique as colunas ADVOGADO e VALOR.');input.value='';return;}
      var m=getMes();
      m.dashData=data;
      m.relLiqData=relData;
      var matched=distribuirEntries(byAdv);
      var novosLanc=lancarEntradasFinanceiro(relData);
      var el=document.getElementById('dash-status');
      if(el)el.textContent=data.length+' proc · '+matched+' adv';
      saveData();
      renderDashCharts(data);
      showToast(data.length+' processos carregados! '+novosLanc+' entradas lançadas no financeiro.');
    }catch(err){showToast('Erro ao ler arquivo: '+err.message);console.error(err);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function renderDashCharts(data){
  if(!data||!data.length)return;
  var total=data.reduce(function(s,r){return s+r.val;},0);
  var totArr=data.filter(function(r){return r.tipo==='Total';});
  var parArr=data.filter(function(r){return r.tipo==='Parcial';});
  var valTot=totArr.reduce(function(s,r){return s+r.val;},0);
  var valPar=parArr.reduce(function(s,r){return s+r.val;},0);
  var pblV=data.filter(function(r){return(r.empresa||'PBL')==='PBL';}).reduce(function(s,r){return s+r.val;},0);
  var fidcV=data.filter(function(r){return r.empresa==='FIDC';}).reduce(function(s,r){return s+r.val;},0);
  function set(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  set('kpi-total',fmt(total));set('kpi-proc',data.length+' processos');
  set('kpi-tot-v',fmt(valTot));set('kpi-tot-q',totArr.length+' processos');
  set('kpi-par-v',fmt(valPar));set('kpi-par-q',parArr.length+' processos');
  set('kpi-pbl',fmt(pblV));set('kpi-fidc',fmt(fidcV));
  var advMap={};
  data.forEach(function(r){if(!advMap[r.adv])advMap[r.adv]={tot:0,par:0,qtdT:0,qtdP:0};if(r.tipo==='Total'){advMap[r.adv].tot+=r.val;advMap[r.adv].qtdT++;}else{advMap[r.adv].par+=r.val;advMap[r.adv].qtdP++;}});
  var advArr=Object.keys(advMap).map(function(k){return{name:k,tot:advMap[k].tot,par:advMap[k].par,qtdT:advMap[k].qtdT,qtdP:advMap[k].qtdP,total:advMap[k].tot+advMap[k].par};}).sort(function(a,b){return b.total-a.total;});
  var labels=advArr.map(function(x){return x.name.charAt(0)+x.name.slice(1).toLowerCase();});
  function mk(id,type,d2,opts){var el=document.getElementById(id);if(!el)return;if(charts[id]){charts[id].destroy();delete charts[id];}charts[id]=new Chart(el,{type:type,data:d2,options:opts});}
  var pieOpts=function(fn){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:fn}}}};};
  mk('chart-tipo-val','doughnut',{labels:['Total','Parcial'],datasets:[{data:[valTot,valPar],backgroundColor:['#0D5C52','#B8860B'],borderWidth:2,borderColor:'#fff'}]},{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:function(c){return' '+fmt(c.parsed)+' ('+(total>0?(c.parsed/total*100).toFixed(1):0)+'%)';}}}}});

function calcDesagio(){
  var cond=parseFloat(document.getElementById('m-vcond').value)||0;
  var cli=parseFloat(document.getElementById('m-vcli').value)||0;
  var comp=parseFloat(document.getElementById('m-vcomp').value)||0;
  var pct=document.getElementById('m-pcomp');var el=document.getElementById('desagio-calc');
  if(cli&&pct&&pct.value)comp=(cli*parseFloat(pct.value)/100);
  if(cond&&comp){
    var desag=((cond-comp)/cond*100).toFixed(2);
    var fat=comp>0?((cli||cond)-comp):0;
    if(el)el.textContent='Deságio: '+desag+'% | Prev. Faturamento: '+fmt(fat);
  }else{if(el)el.textContent='';}
  if(cli&&pct&&pct.value){var vc=document.getElementById('m-vcomp');if(vc)vc.value=(cli*parseFloat(pct.value)/100).toFixed(2);}
}

// ── IMPORTAR PROCESSOS ──────────────────────────────────────
function importProcessos(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true,raw:false});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){showToast('Arquivo vazio!');input.value='';return;}
      var keys=Object.keys(rows[0]);
      var novos=0,ignorados=0;
      rows.forEach(function(r){
        var num=xlsxGet(r,keys,['PROCESSO','NUMERO','N°','NO'],false);
        var cli=xlsxGet(r,keys,['CLIENTE','AUTOR'],false);
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false));
        var emp=xlsxGet(r,keys,['EMPRESA','TITULARIDADE','TITULAR'],false).toUpperCase();
        var empresa=emp.indexOf('FIDC')>=0?'FIDC':'PBL';
        var cond=xlsxGet(r,keys,['CONDENACAO','CONDENA','CONDENAÇÃO'],true);
        var vcli=xlsxGet(r,keys,['VALOR CLIENTE','VALORCLI'],true)||cond;
        var vcomp=xlsxGet(r,keys,['VALOR COMPRA','VALORCOMP','COMPRA'],true);
        var datc=parseDataBR(xlsxGet(r,keys,['DATA COMPRA','DATA'],false));
        var mat=xlsxGet(r,keys,['MATERIA','MATÉRIA'],false);
        var reu=xlsxGet(r,keys,['REU','RÉU'],false);
        if(!num||!cli){ignorados++;return;}
        if(S.processos.find(function(p){return p.numero===num;})){ignorados++;return;}
        var l=S.lawyers.find(function(x){var k=normAdv(x.name);return k===adv||k.split(' ')[0]===adv.split(' ')[0];});
        S.processos.push({
          id:uid(),empresa:empresa,numero:num,cliente:cli,
          advogadoId:l?l.id:'',atendente:'',reu:reu,materia:mat,
          foro:'',comarca:'',dataCompra:datc,
          valorCondenacao:cond,valorCliente:vcli,percCompra:0,valorCompra:vcomp,
          status:'pendente',recebimentos:[]
        });
        novos++;
      });
      saveData();navigate('processos');
      showToast(novos+' processos importados. '+ignorados+' ignorados (duplicados ou sem dados).');
    }catch(err){showToast('Erro: '+err.message);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function addFin(){

  var proc=document.getElementById('fin-proc')?document.getElementById('fin-proc').value:'';
  var cat=(document.getElementById('fin-cat').value||'').trim();
  if(!data||!valor||!desc){alert('Preencha Data, Valor e Descrição.');return;}
  var m=getMes();if(!m.financeiro)m.financeiro=[];
  m.financeiro.push({id:uid(),empresa:emp,tipo:tipo,subtipo:'',data:data,valor:valor,banco:banco,descricao:desc,processoId:proc,proc:'',categoria:cat,obs:'',origem:'manual'});

function deleteFin(id){if(!confirm('Excluir lançamento?'))return;var m=getMes();m.financeiro=m.financeiro.filter(function(f){return f.id!==id;});saveData();navigate('financeiro');}
function filterFin(){
  var m=getMes();var fin=m.financeiro||[];
  var empF=(document.getElementById('fin-emp-f')||{value:'todos'}).value;
  var tipo=(document.getElementById('fin-tf')||{value:'todos'}).value;
  var di=(document.getElementById('fin-di')||{value:''}).value;
  var df=(document.getElementById('fin-df')||{value:''}).value;

  var rows=fin.filter(function(f){
    return(empF==='todos'||(f.empresa||'PBL')===empF)&&
      (tipo==='todos'||f.tipo===tipo)&&
      (!di||f.data>=di)&&(!df||f.data<=df)&&
      (!q||(f.descricao||'').toLowerCase().indexOf(q)>=0);
  }).sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(f){
    var emp2=f.empresa==='FIDC'?'<span class="emp-fidc">FIDC</span>':'<span class="emp-pbl">PBL</span>';

  }).join('');

// Importar liquidados direto para o financeiro
function importLiqFinanceiro(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true,raw:false});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){showToast('Arquivo vazio!');input.value='';return;}
      var keys=Object.keys(rows[0]);
      var relData=[];
      rows.forEach(function(r){
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false));
        var val=xlsxGet(r,keys,['VALOR'],true);
        var liq=xlsxGet(r,keys,['LIQUID'],false);
        var proc=xlsxGet(r,keys,['PROCESSO'],false);
        var datRaw=xlsxGet(r,keys,['DATA'],false);
        var tit=xlsxGet(r,keys,['TITULARIDADE','TITULAR'],false).toUpperCase();
        var empresa=tit.indexOf('FIDC')>=0?'FIDC':'PBL';
        var dat=parseDataBR(datRaw);
        if(!adv||adv==='ADVOGADO'||!val)return;
        var tipo=liq.toUpperCase().indexOf('PARCIAL')>=0?'Parcial':'Total';
        relData.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat,empresa:empresa});
      });
      var novos=lancarEntradasFinanceiro(relData);
      saveData();navigate('financeiro');
      showToast(novos+' entradas lançadas no financeiro!');
    }catch(err){showToast('Erro: '+err.message);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function pageFluxoCaixa(){
  var m=getMes();var fin=m.financeiro||[];
  var byMes={};
  fin.forEach(function(f){
    var mes=(f.data||'').slice(0,7);if(!mes)return;
    if(!byMes[mes])byMes[mes]={ent:0,sai:0,pbl_ent:0,pbl_sai:0,fidc_ent:0,fidc_sai:0};
    if(f.tipo==='entrada'){byMes[mes].ent+=f.valor;if(f.empresa==='FIDC')byMes[mes].fidc_ent+=f.valor;else byMes[mes].pbl_ent+=f.valor;}
    else{byMes[mes].sai+=f.valor;if(f.empresa==='FIDC')byMes[mes].fidc_sai+=f.valor;else byMes[mes].pbl_sai+=f.valor;}
  });
  var meses=Object.keys(byMes).sort().reverse();
  var rows=meses.map(function(mes){
    var b=byMes[mes];var res=b.ent-b.sai;var d=new Date(mes+'-02');var ml=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    return'<tr><td>'+ml+'</td><td class="r" style="color:#1D6B3A">'+fmt(b.ent)+'</td><td class="r" style="color:#A32D2D">'+fmt(b.sai)+'</td><td class="r" style="color:'+(res>=0?'#1D6B3A':'#A32D2D');+'"<strong>'+fmt(res)+'</strong></td>'+
    '<td class="r">'+fmt(b.pbl_ent)+'</td><td class="r">'+fmt(b.fidc_ent)+'</td></tr>';
  }).join('');
  return'<div class="page-title">'+I.fluxo+' Fluxo de Caixa</div>'+
  '<div class="card" style="padding:0;overflow-x:auto">'+
    '<table class="tbl"><thead><tr><th>Mês</th><th class="r">Entradas</th><th class="r">Saídas</th><th class="r">Resultado</th><th class="r">PBL Entradas</th><th class="r">FIDC Entradas</th></tr></thead>'+
    '<tbody>'+(rows||'<tr><td colspan="6" class="empty">Nenhum lançamento.</td></tr>')+'</tbody></table>'+
  '</div>';
}

      var byAdv={},dashArr=[],relArr=[];
      rows.forEach(function(r){
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false));
        var val=xlsxGet(r,keys,['VALOR'],true);
        var liq=xlsxGet(r,keys,['LIQUID'],false);
        var proc=xlsxGet(r,keys,['PROCESSO'],false);
        var datRaw=xlsxGet(r,keys,['DATA'],false);
        var tit=xlsxGet(r,keys,['TITULARIDADE','TITULAR'],false).toUpperCase();
        var empresa=tit.indexOf('FIDC')>=0?'FIDC':'PBL';
        var dat=parseDataBR(datRaw);
        if(!adv||adv==='ADVOGADO')return;
        var tipo=liq.toUpperCase().indexOf('PARCIAL')>=0?'Parcial':'Total';
        if(!byAdv[adv])byAdv[adv]=[];
        byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
        dashArr.push({adv:adv,val:val,tipo:tipo,empresa:empresa});
        relArr.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat,empresa:empresa});
      });
      var m=getMes();
      m.dashData=dashArr;m.relLiqData=relArr;
      var matched=distribuirEntries(byAdv);
      var novosL=lancarEntradasFinanceiro(relArr);
      var el=document.getElementById('s-liq');if(el)el.textContent=dashArr.length+' proc · '+matched+' adv';
      saveData();showToast(dashArr.length+' proc para '+matched+' adv. '+novosL+' entradas financeiro!');
    }catch(err){showToast('Erro: '+err.message);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function importValGeral(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true,raw:false});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      var keys=Object.keys(rows[0]);
      var byAdv={};
      rows.forEach(function(r){
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false)||String(r[Object.keys(r)[2]]||''));
        var obs=(xlsxGet(r,keys,['OBS'],false)||String(r[Object.keys(r)[3]]||'')).toUpperCase();
        if(!adv||adv==='ADVOGADO')return;
        if(!byAdv[adv])byAdv[adv]={pv:0,cv:0};
        if(obs.indexOf('VALIDADO')>=0&&obs.indexOf('NAO APROVADO')<0&&obs.indexOf('NÃO APROVADO')<0&&obs.indexOf('FALTA CONTRATO')<0){
          if(obs.indexOf('CONTRATO')>=0)byAdv[adv].cv++;else byAdv[adv].pv++;
        }
      });
      var matched=0;var m=getMes();
      S.lawyers.forEach(function(l){
        var key=normAdv(l.name);var fn=key.split(' ')[0];
        var fk=Object.keys(byAdv).find(function(k){return k===key||k.split(' ')[0]===fn||fn===k.split(' ')[0];});
        if(fk){if(!m.entries[l.id])m.entries[l.id]={processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};m.entries[l.id].procValid=byAdv[fk].pv;m.entries[l.id].contValid=byAdv[fk].cv;matched++;}
      });
      var el=document.getElementById('s-val');if(el)el.textContent=matched+' adv';
      saveData();showToast('Validações importadas: '+matched+' advogados!');
    }catch(err){showToast('Erro: '+err.message);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function importDilGeral(input){

// CALC ENGINE
// ════════════════════════════════════════════════════════════
function calc(lid){
  var l=S.lawyers.find(function(x){return x.id===lid;});if(!l)return null;
  var m=getMes();var e=m.entries[lid]||{processos:[],procValid:0,contValid:0,capaCapa:0,auditoria:0,volEntradas:0,volLiquidado:0};
  var cP=(e.processos||[]).reduce(function(s,p){return s+(p.valor<10000?50:100);},0);
  var cPV=(e.procValid||0)*5,cCV=(e.contValid||0)*2,cCapa=(e.capaCapa||0)*10,cAud=(e.auditoria||0)*10;
  var ve=e.volEntradas||0,cEnt=ve>=500000?Math.floor(ve/100000)*100:0;
  var vl=e.volLiquidado||0,cLiq=vl>=600000?Math.floor(vl/100000)*100:0;
  var cCamp=S.campanhas.reduce(function(s,c){return s+(c.lawyer==='todos'||c.lawyer===lid?c.valor:0);},0);
  var total=l.prolabore+cP+cPV+cCV+cCapa+cAud+cEnt+cLiq+cCamp;
  return{lawyer:l,entry:e,cP:cP,cPV:cPV,cCV:cCV,cCapa:cCapa,cAud:cAud,cEnt:cEnt,cLiq:cLiq,cCamp:cCamp,total:total};
}

function importRelLiq(input){
  if(!input.files.length)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true,raw:false});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){showToast('Arquivo vazio!');input.value='';return;}
      var keys=Object.keys(rows[0]);
      var data=[],byAdv={},dashArr=[];
      rows.forEach(function(r){
        var adv=normAdv(xlsxGet(r,keys,['ADVOGADO'],false));
        var val=xlsxGet(r,keys,['VALOR'],true);
        var liq=xlsxGet(r,keys,['LIQUID'],false);
        var proc=xlsxGet(r,keys,['PROCESSO'],false);
        var datRaw=xlsxGet(r,keys,['DATA'],false);
        var tit=xlsxGet(r,keys,['TITULARIDADE','TITULAR'],false).toUpperCase();
        var empresa=tit.indexOf('FIDC')>=0?'FIDC':'PBL';
        var dat=parseDataBR(datRaw);
        if(!adv||adv==='ADVOGADO')return;
        var tipo=liq.toUpperCase().indexOf('PARCIAL')>=0?'Parcial':'Total';
        data.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:proc,val:val,tipo:tipo,data:dat,empresa:empresa});
        dashArr.push({adv:adv,val:val,tipo:tipo,empresa:empresa});
        if(!byAdv[adv])byAdv[adv]=[];
        byAdv[adv].push({ref:proc,valor:val,tipo:tipo});
      });
      if(!data.length){showToast('Nenhum dado. Verifique as colunas ADVOGADO e VALOR.');input.value='';return;}
      var m=getMes();
      m.relLiqData=data;m.dashData=dashArr;
      var matched=distribuirEntries(byAdv);
      var novosL=lancarEntradasFinanceiro(data);
      var el=document.getElementById('rel-liq-status');if(el)el.textContent=data.length+' processos';
      saveData();
      showToast(data.length+' processos! '+matched+' adv. '+novosL+' entradas lançadas!');
    }catch(err){showToast('Erro: '+err.message);console.error(err);}
    input.value='';
  };
  reader.readAsArrayBuffer(input.files[0]);
}
function renderRelLiq(){
  var m=getMes();
  var data=m.relLiqData||[];
  // Também pegar de processos cadastrados se não tiver importação
  if(!data.length){
    S.processos.filter(function(p){return p.status!=='pendente';}).forEach(function(p){
      var rec=(p.recebimentos||[]).reduce(function(s,r){return s+(r.valor||0);},0);
      var adv=normAdv((S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:p.advogadoId||'?'}).name);
      data.push({adv:adv,advNome:adv.charAt(0)+adv.slice(1).toLowerCase(),proc:p.numero,val:rec,tipo:p.status==='liquidado_parcial'?'Parcial':'Total',data:((p.recebimentos||[])[0]||{}).data||'',empresa:p.empresa||'PBL'});
    });
  }
  var tipo=document.getElementById('rl-tipo').value;
  var empF=document.getElementById('rl-emp').value;
  var advF=document.getElementById('rl-adv').value;
  var di=document.getElementById('rl-di').value;
  var df=document.getElementById('rl-df').value;
  var f=data.filter(function(r){
    var l=advF!=='todos'?(S.lawyers.find(function(x){return x.id===advF;})||{name:''}):{name:''};
    var advMatch=advF==='todos'||normAdv(l.name)===r.adv||r.adv.startsWith(normAdv(l.name).split(' ')[0]);
    return(tipo==='todos'||r.tipo===tipo)&&(empF==='todos'||(r.empresa||'PBL')===empF)&&advMatch&&(!di||r.data>=di)&&(!df||r.data<=df||!r.data);
  });
  var totV=f.reduce(function(s,r){return s+r.val;},0);
  var totT=f.filter(function(r){return r.tipo==='Total';}).reduce(function(s,r){return s+r.val;},0);
  var totP=f.filter(function(r){return r.tipo==='Parcial';}).reduce(function(s,r){return s+r.val;},0);
  var rows=f.map(function(r){
    var sb=r.tipo==='Total'?'<span class="badge b-tot">Total</span>':'<span class="badge b-par">Parcial</span>';
    var emp2=r.empresa==='FIDC'?'<span class="emp-fidc">FIDC</span>':'<span class="emp-pbl">PBL</span>';
    return'<tr><td>'+fmtDate(r.data)+'</td><td>'+emp2+'</td><td>'+esc(r.advNome)+'</td><td style="font-size:11px">'+esc(r.proc)+'</td><td>'+sb+'</td><td class="r">'+fmt(r.val)+'</td></tr>';
  }).join('');
  var html=f.length?
    '<div class="metrics" style="margin-bottom:14px">'+
      '<div class="mc"><div class="ml">Total processos</div><div class="mv">'+f.length+'</div></div>'+
      '<div class="mc gold"><div class="ml">Total liquidado</div><div class="mv gold">'+fmt(totV)+'</div></div>'+
      '<div class="mc"><div class="ml">Liq. Total</div><div class="mv">'+fmt(totT)+'</div></div>'+
      '<div class="mc blue"><div class="ml">Liq. Parcial</div><div class="mv blue">'+fmt(totP)+'</div></div>'+
    '</div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Data</th><th>Empresa</th><th>Advogado</th><th>N° Processo</th><th>Tipo</th><th class="r">Valor</th></tr></thead>'+
    '<tbody>'+rows+'</tbody><tfoot><tr class="foot"><td colspan="5">TOTAL</td><td class="r">'+fmt(totV)+'</td></tr></tfoot></table></div>':
    '<div class="empty">Nenhum resultado com os filtros selecionados.</div>';
  document.getElementById('rel-liq-content').innerHTML=html;
}
function imprimirRelLiq(){renderRelLiq();setTimeout(function(){window.print();},300);}

// ════════════════════════════════════════════════════════════
// PREVISÃO DE ENTRADAS
// ════════════════════════════════════════════════════════════
function pagePrevisaoEntradas(){
  return'<div class="page-title">'+I.previsao+' Previsão de Entradas <button class="print-btn no-print" onclick="imprimirPrev()">Imprimir / PDF</button></div>'+
  '<div class="filter-bar no-print">'+
    '<div class="fg"><label>Empresa</label><select id="prev-emp"><option value="todos">Todas</option><option value="PBL">PBL</option><option value="FIDC">FIDC</option></select></div>'+
    '<div class="fg"><label>Advogado</label><select id="prev-adv"><option value="todos">Todos</option>'+S.lawyers.map(function(l){return'<option value="'+l.id+'">'+l.name+'</option>';}).join('')+'</select></div>'+
    '<div class="fg"><label>Matéria</label><input type="text" id="prev-mat" placeholder="RPV, Precatório..."/></div>'+
    '<input class="search-input" id="prev-q" placeholder="Buscar cliente ou processo..."/>'+
    '<button class="btn bp" onclick="renderPrev()">Filtrar</button>'+
  '</div>'+
  '<div id="prev-content"><div class="empty">Clique em Filtrar.</div></div>';
}
function renderPrev(){
  var empF=document.getElementById('prev-emp').value;
  var adv=document.getElementById('prev-adv').value;
  var mat=(document.getElementById('prev-mat').value||'').toLowerCase();
  var q=(document.getElementById('prev-q').value||'').toLowerCase();
  var f=S.processos.filter(function(p){
    if(p.status!=='pendente')return false;
    if(empF!=='todos'&&(p.empresa||'PBL')!==empF)return false;
    if(adv!=='todos'&&p.advogadoId!==adv)return false;
    if(mat&&!(p.materia||'').toLowerCase().includes(mat))return false;
    if(q&&!(p.cliente||'').toLowerCase().includes(q)&&!(p.numero||'').toLowerCase().includes(q))return false;
    return true;
  });
  var tP=f.reduce(function(s,p){return s+(p.valorCliente||0);},0);
  var tC=f.reduce(function(s,p){return s+(p.valorCompra||0);},0);
  var tCn=f.reduce(function(s,p){return s+(p.valorCondenacao||0);},0);
  var rows=f.map(function(p){
    var an=(S.lawyers.find(function(l){return l.id===p.advogadoId;})||{name:'—'}).name;
    var de=p.valorCondenacao?(((p.valorCondenacao-p.valorCompra)/p.valorCondenacao)*100).toFixed(2):0;
    var di=p.dataCompra?Math.floor((new Date()-new Date(p.dataCompra))/(864e5)):0;
    var emp2=p.empresa==='FIDC'?'<span class="emp-fidc">FIDC</span>':'<span class="emp-pbl">PBL</span>';
    return'<tr><td>'+emp2+'</td><td>'+esc(p.cliente)+'</td><td style="font-size:10px">'+esc(p.numero)+'</td><td>'+esc(an)+'</td><td>'+fmtDate(p.dataCompra)+'</td><td class="r">'+di+'</td><td class="r">'+fmt(p.valorCondenacao)+'</td><td class="r">'+fmt(p.valorCliente)+'</td><td class="r">'+fmt(p.valorCompra)+'</td><td class="r">'+de+'%</td></tr>';
  }).join('');
  var html=f.length?
    '<div class="metrics" style="margin-bottom:14px"><div class="mc blue"><div class="ml">Pendentes</div><div class="mv blue">'+f.length+'</div></div><div class="mc"><div class="ml">Vl. Condenação</div><div class="mv">'+fmt(tCn)+'</div></div><div class="mc gold"><div class="ml">Previsão Entrada</div><div class="mv gold">'+fmt(tP)+'</div></div><div class="mc"><div class="ml">Prev. Faturamento</div><div class="mv">'+fmt(tP-tC)+'</div></div></div>'+
    '<div class="card" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Empresa</th><th>Cliente</th><th>N° Processo</th><th>Advogado</th><th>Data Compra</th><th class="r">Dias</th><th class="r">Vl. Condenação</th><th class="r">Vl. Cliente</th><th class="r">Vl. Compra</th><th class="r">Deságio %</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr class="foot"><td colspan="6">TOTAL</td><td class="r">'+fmt(tCn)+'</td><td class="r">'+fmt(tP)+'</td><td class="r">'+fmt(tC)+'</td><td></td></tr></tfoot></table></div>':
    '<div class="empty">Nenhum processo pendente.</div>';
  document.getElementById('prev-content').innerHTML=html;
}
function imprimirPrev(){renderPrev();setTimeout(function(){window.print();},300);}

// ════════════════════════════════════════════════════════════
// MINHA COMISSÃO / USUÁRIOS
// ════════════════════════════════════════════════════════════
function pageMinhaComissao(){
  if(!currentUser||!currentUser.lawyerId)return'<div class="empty">Sem dados.</div>';
  var lid=currentUser.lawyerId;var l=S.lawyers.find(function(x){return x.id===lid;});
  if(!l)return'<div class="card"><div class="empty">Perfil não configurado pelo administrador ainda.</div></div>';
  var c=calc(lid);var e=c.entry;
  var items=[{l:'Pró-labore fixo',v:c.lawyer.prolabore},{l:'Processos liquidados ('+(e.processos||[]).length+')',v:c.cP},{l:'Processos validados ('+(e.procValid||0)+')',v:c.cPV},{l:'Contratos validados ('+(e.contValid||0)+')',v:c.cCV},{l:'Capa a capa ('+(e.capaCapa||0)+')',v:c.cCapa},{l:'Auditoria ('+(e.auditoria||0)+')',v:c.cAud},{l:'Bônus entradas',v:c.cEnt},{l:'Bônus liquidação',v:c.cLiq},{l:'Campanhas',v:c.cCamp}];
  var m2='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="mc"><div class="ml">Total a receber</div><div class="mv">'+fmt(c.total)+'</div></div><div class="mc"><div class="ml">Pró-labore</div><div class="mv">'+fmt(c.lawyer.prolabore)+'</div></div><div class="mc gold"><div class="ml">Comissões</div><div class="mv gold">'+fmt(c.total-c.lawyer.prolabore)+'</div></div></div>';
  var rows=items.map(function(it){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #eef1f0;font-size:13px"><div style="color:var(--mt)">'+it.l+'</div><div>'+fmt(it.v)+'</div></div>';}).join('');
  var per=document.getElementById('period-lbl')?document.getElementById('period-lbl').textContent:'';
  return'<div class="page-title">'+I.comissao+' Olá, '+esc(c.lawyer.name)+'</div>'+
  '<div style="font-size:12px;color:var(--mt);margin-bottom:16px">Período: '+per+'</div>'+m2+
  '<div class="card">'+rows+'<div style="display:flex;justify-content:space-between;padding:11px 0 0;font-size:15px;font-weight:700"><div>Total a pagar</div><div style="color:var(--v)">'+fmt(c.total)+'</div></div></div>';
}
function pageUsuarios(){
  var rows=USERS.map(function(u,i){
    var rb=u.role==='admin'?'<span class="badge b-green">Admin</span>':'<span class="badge b-par">Advogado</span>';
    return'<div class="lrow"><div class="av" style="'+avSt(i)+'">'+ini(u.name)+'</div><div class="ln">'+esc(u.name)+'</div><div style="font-size:11px;color:var(--mt)">@'+u.username+'</div>'+rb+'<div style="font-size:11px;font-family:monospace;background:#f4f4f4;padding:3px 8px;border-radius:6px;margin-left:8px">'+u.password+'</div></div>';
  }).join('');
  return'<div class="page-title">'+I.usuarios+' Usuários do Sistema</div>'+
  '<div class="card" style="margin-bottom:8px"><p style="font-size:12px;color:var(--mt)">Cada advogado acessa apenas sua própria comissão. O Admin vê tudo.</p></div>'+
  '<div class="card">'+rows+'</div>';
}
